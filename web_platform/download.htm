        animation-delay: -0.3s;

<br /><p>To receive the complimentary 4th night benefit, you must pay for your stay with your Citi Prestige Card, ThankYou points, or a combination of the two.</p></div>"},{"id":210836,"message":"<div><p>The Complimentary 4th Night Benefit is eligible for any hotel when you book a <strong>minimum of 4 consecutive nights.</strong> The following restrictions apply:</p><br /><ul><li>1. The reservation must be in the name of the Citi Prestige® primary cardholder or authorized user.</li><li>2. Use ThankYou Points, your Citi Prestige® Card, or a combination of the two.</li><li>3. This benefit cannot be used for two simultaneous bookings at the same hotel or at different hotels.</li><li>4. Cardmembers are eligible for no more than two Complimentary 4th Night Benefits per card account per calendar year.</li></ul><br /><p>The 4th Night Benefit is calculated based on the average nightly rate of your complete stay, excluding taxes and fees. Total cost of reservation will include the 4th night discount.</p></div>"},{"id":210841,"message":"Please give us a call at +1 (833) 737-1288."},{"id":177513,"message":"$100 off a single hotel stay of $500 or more when you pay with your Citi Premier® card."},{"id":177514,"message":"Another becomes available on {0}."},{"id":177888,"message":"$100 Annual Hotel Savings Benefit"},{"id":177893,"message":"<div><ul><li>Việc đặt phòng phải do chủ thẻ chính thực hiện. Có thể đặt phòng bằng tên của chủ thẻ chính hoặc của người dùng được quyền.</li><li> Giá trọn gói như hàng không và khách sạn, hoặc khách sạn và cho thuê xe hơi không đủ điều kiện để được hưởng lợi ích này.</li><li>Những đơn đặt phòng thông qua bất kỳ bên hoặc kênh nào khác ngoài thankyou.com hoặc 1-800-THANKYOU đều không được hưởng khoản tiết kiệm khách sạn hàng năm 100 $.</li><li>Không thể kết hợp lợi ích khoản tiết kiệm khách sạn hàng năm 100 $ trong cùng một giao dịch với Lưu trú Khách sạn Đêm thứ 4 Miễn phí của Thẻ Citi Prestige<sup>&reg;</sup> nếu quý khách có cả thẻ Citi Premier và Citi Prestige. Cũng không thể kết hợp lợi ích này với bất kỳ chương trình khuyến mại hoặc giảm giá nào khác trên thankyou.com.</li></ul></div>"},{"id":177892,"message":"<div><p>Mỗi năm theo lịch một lần, được giảm 100 $ cho một lần lưu trú khách sạn từ 500 $ trở lên, chưa bao gồm thuế và phí, khi đặt thông qua thankyou.com hoặc 1-800-THANKYOU (do Rocket Travel cung cấp. Citi Travel<span>&#8480;</span> do Rocket Travel Inc. cung cấp, một thành viên của Tập đoàn Booking Holdings cùng với Booking.com.) và phải theo các yêu cầu bổ sung nêu dưới đây. TTY: Sử dụng 711 hoặc Dịch vụ Tiếp âm Khác. Để nhận khoản tiết kiệm khách sạn hàng năm 100 $, quý khách phải trả trước cho toàn bộ thời gian ở của mình bằng Thẻ Citi Premier, Điểm ThankYou, hay một sự kết hợp nào đó. Nếu quý khách chọn sử dụng lợi ích, khoản tiết kiệm khách sạn hàng năm 100 $ sẽ được áp dụng tại thời điểm đặt phòng.</p><p>Nếu quý khách hủy phòng mà mình đã sử dụng khoản tiết kiệm khách sạn 100 $ thì lợi ích sẽ vẫn có sẵn để sử dụng trong cùng một năm theo lịch. Mọi đơn đặt phòng phải được đổi hoặc hủy thông qua thankyou.com hoặc bằng cách gọi 1-800-THANKYOU. TTY: Sử dụng 711 hoặc Dịch vụ Tiếp âm Khác.</p></div>"},{"id":356164,"message":"Enjoy up to $300 off a hotel stay of 2 nights or more through the Citi Travel(SM) portal when you pay with your Citi Strata Elite(SM) Card."},{"id":356165,"message":"You have ${0} of $300 remaining."},{"id":358043,"message":"Annual $300 Hotel Benefit"},{"id":358044,"message":"<p><strong>Terms and conditions</strong></p>\n<p>&nbsp;</p>\n<p><span style=\"font-weight: 400;\">Enjoy a Complimentary 4th Night hotel benefit stay after a minimum 4 consecutive night booking through thankyou.com or the Citi Travel(sm) site (Citi Travel is powered by Rocket Travel Inc., part of the Booking Holdings Inc. group of companies together with Booking.com) or by calling 1-800-THANKYOU (1-800-842-6596) (TTY:711).</span></p>\n<p>&nbsp;</p>\n<p><span style=\"font-weight: 400;\">This Complimentary 4th Night hotel benefit is subject to the additional requirements stated below. The Complimentary 4th Night hotel benefit is only available with properties listed on thankyou.com via the Citi Travel(sm) site.</span></p>\n<p>&nbsp;</p>\n<p><span style=\"font-weight: 400;\">Cardmembers are eligible for no more than two Complimentary 4th Night hotel benefits per Citi Prestige card account per calendar year.The Complimentary 4th Night hotel benefit is calculated based on the average nightly rate of your complete stay excluding taxes and fees.</span></p>\n<p>&nbsp;</p>\n<p><span style=\"font-weight: 400;\">To receive the Complimentary 4th Night hotel benefit, you must pay for your stay with your Citi Prestige Card, ThankYou points, or a combination of the two.</span></p>\n<p>&nbsp;</p>\n<p><strong>Eligibility Requirements</strong></p>\n<p>&nbsp;</p>\n<p><span style=\"font-weight: 400;\">Reservations can be made in the primary cardmember or authorized user's name.</span></p>\n<p><span style=\"font-weight: 400;\">Only one complimentary night is eligible per each stay. A stay is consecutive nights booked and stayed on one reservation and does not include back-to-back stays. Back-to-back stays are stays at the same hotel booked on two reservations. (As an example, you book four nights at a hotel on one reservation for Monday, Tuesday, Wednesday and Thursday and book another four nights on another reservation for Friday, Saturday, Sunday and Monday. In this situation, you would only be eligible for one complimentary night for the eight-night stay.)</span></p>\n<p><span style=\"font-weight: 400;\">For group reservations, or other reservations consisting of multiple rooms, only one room will qualify for one complimentary night.</span></p>\n<p><span style=\"font-weight: 400;\">Packaged rates such as air and hotel, or hotel and car rental do not qualify for this benefit</span></p>\n<p><span style=\"font-weight: 400;\">Hotel-imposed fees and incidental guest charges are the cardmember's responsibility and are not included in the calculation of the Complimentary 4th Night hotel benefit.</span></p>\n<p><span style=\"font-weight: 400;\">Reservations made through any party or channel other thank thankyou.com via the Citi Travel site or 1-800-THANKYOU (TTY: 711) are not eligible for the Complimentary 4th Night hotel benefit.</span></p>\n<p><span style=\"font-weight: 400;\">The Complimentary 4th Night hotel benefit is intended only for personal use by the primary cardmember and/or authorized user(s), and not for business travel.</span></p>\n<p>&nbsp;</p>\n<p><strong>Have more questions?</strong></p>\n<p><span style=\"font-weight: 400;\">For additional information, please visit the FAQ section at citi.com/</span></p>"},{"id":177261,"message":"Yêu cầu đủ điều kiện"},{"id":177263,"message":"Điều khoản và Điều kiện"},{"id":177265,"message":"Have more questions?"},{"id":177274,"message":"Please give us a call at +1 (833) 737-1288."},{"id":177512,"message":"Xem thông tin chi tiết."},{"id":177929,"message":"Đóng"},{"id":265944,"message":"Khuyến mại"},{"id":416985,"message":"Đóng cửa sổ"},{"id":178886,"message":"Quý khách có thể tích lũy và chi tiêu điểm Clubpoints trên những đơn đặt phòng và chuyến bay Club Travel. Chỉ cần đảm bảo quý khách đã đăng nhập vào Thành viên The Club."},{"id":178662,"message":"Có điểm Clubpoints? Hãy sử dụng ở đây để thanh toán đặt phòng và đặt chuyến bay!"},{"id":99784,"message":"Cần 10 phòng trở lên ư?"},{"id":99785,"message":"Hiện có giá đặc biệt với đối tác của chúng tôi HotelPlanner"},{"id":100059,"message":"Nhận giá cho nhóm"},{"id":92417,"message":"MỚI"},{"id":99216,"message":"Phòng {0}"},{"id":101650,"message":"Khách người lớn"},{"id":52326,"message":"{1} người lớn "},{"id":101655,"message":"Giường tiêu chuẩn và bữa ăn"},{"id":101651,"message":"Học sinh tiểu học"},{"id":101656,"message":"Cung cấp giường và, nếu ưu đãi bao gồm bữa ăn, bữa ăn cho người lớn (giảm khẩu phần/món)."},{"id":101652,"message":"Trẻ học mẫu gi y này. Tuy nhiên, đơn đặt chỗ chuyến bay khác của quý khách vẫn đang chờ hãng hàng không xác nhận. Một khi đã xác nhận, chúng tôi sẽ bắt đầu xử lý thanh toán của quý khách. Nếu quý khách không phải đang thanh toán bằng thẻ, khoản thanh toán có thể đã được thực hiện. Một thư xác nhận điện tử kèm theo chi tiết đơn đặt chỗ sẽ được gửi cho quý khách trong vòng sáu tiếng."},{"id":264803,"message":"Một trong các đặt vé máy bay của bạn đã được xác nhận, nhưng chúng tôi không thể xử lý giao dịch còn lại. Do phương thức thanh toán bạn đã chọn, bạn đã bị trừ tiền cho cả hai đặt chỗ này nhưng sẽ được hoàn tiền cho chuyến bay chưa được xác nhận. Vui lòng kiểm tra email để nhận xác nhận hoặc hướng dẫn thêm về việc hoàn tiền. Bạn có thể đặt lại chuyến bay này riêng lẻ hoặc gọi cho đội ngũ chăm sóc khách hàng của chúng tôi để được hỗ trợ thêm."},{"id":134185,"message":"Đặt khách sạn"},{"id":95818,"message":"Điều kiện đặt chỗ"},{"id":96727,"message":"Hành khách có trách nhiệm đảm bảo mọi giấy tờ du lịch cần thiết của họ đều hợp lệ và sẵn có khi du lịch."},{"id":96728,"message":"Vui lòng đảm bảo thông tin liên hệ của quý khách trong đơn đặt chỗ là chính xác. Chúng tôi không chịu trách nhiệm cho mọi vấn đề phát sinh từ việc thông tin liên hệ chi tiết không chính xác."},{"id":96729,"message":"Nếu quý khách thay đổi chuyến bay của mình trực tiếp với hãng hàng không hoặc hãng hàng không thực hiện thay đổi cho chuyến bay của quý khách, hãng hàng không có thể liên hệ trực tiếp với quý khách. Nếu hãng hàng không thông báo về bất kỳ thay đổi nào cho Agoda, chúng tôi sẽ thông báo với quý khách."},{"id":96730,"message":"Một khi đã xác nhận việc đặt chỗ, mọi thay đổi hoặc hủy sẽ phụ thuộc vào chính sách giá vé ước tính được đính kèm với đơn đặt chỗ của quý khách và có thể khác với chính sách của hãng hàng không. Một số vé không được thay đổi và không được hoàn lại. Tất cả vé đều không được chuyển nhượng trong bất kỳ trường hợp nào, trừ khi có thông báo khác."},{"id":95819,"message":"Xin lưu ý, mọi việc thay đổi hoặc hủy đơn đặt chỗ chuyến bay của quý khách qua Agoda có thể phải chịu khoản phụ thu lên đến 50 USD/khách/lần thay đổi. Lưu ý, đây là phí bổ sung cho mọi phí do các nhà cung cấp dịch vụ du lịch trung gian và hãng hàng không thu."},{"id":95820,"message":"Vui lòng truy cập trang web chính thức của hãng hàng không để biết thông tin chi tiết mới nhất về chuyến bay, bao gồm thời gian khởi hành, nhà ga, và các điều khoản và điều kiện vận chuyển. Các dịch vụ bổ sung như hành lý, ghế ngồi, bữa ăn và các dịch vụ khác có thể được thêm trực tiếp trên trang web chính thức của hãng hàng không và có thể phải trả thêm phụ phí."},{"id":136341,"message":"Trong trường hợp bất kỳ loại thuế nào do chính phủ áp dụng đối với dịch vụ vận chuyển hàng không đã mua bị tăng hoặc bắt buộc nộp trước chuyến bay theo lịch trình của quý khách, quý khách có thể phải trả loại thuế hoặc phí mới bắt buộc nộp hoặc tăng đó."},{"id":96726,"message":"Bằng cách tiến hành đặt chỗ này, tôi đồng ý với {Terms of Use} và {Privacy Policy} của Agoda."},{"id":108247,"message":"Giá vé của quý khách là sự kết hợp của 2 hoặc nhiều vé một chiều riêng. Mỗi chặng đều tùy thuộc vào các điều khoản đặt chỗ và du lịch, điều kiện và yêu cầu của hãng hàng không khai thác chặng bay đó, gồm cả các chính sách hủy và hoàn vé. Nếu một hoặc nhiều chặng bay trong hành trình của quý khách không thể được đặt trước hoặc bị từ chối thì chúng tôi sẽ chỉ trả lại chi phí của các chặng không thể được đặt trước hoặc bị từ chối. Nếu chuyến bay đi bị hủy hoặc xếp lại lịch thì chuyến bay tiếp theo và/hoặc trở về của quý khách sẽ không tự động được xếp lịch lại. Quý khách có thể cần bằng chứng về việc đi tiếp hoặc trở về cho các chuyến bay quốc tế."},{"id":227342,"message":"Khách sạn {}"},{"id":227343,"message":"Chuyến bay"},{"id":227092,"message":"Cộng"},{"id":96220,"message":"Đang xử lý"},{"id":96099,"message":"Chúng tôi đang xử lý đặt chỗ chuyến bay của quý khách."},{"id":96100,"message":"Mã Đặt Chỗ: {Booking_ID}"},{"id":96101,"message":"Chúng tôi đang làm việc với hãng hàng không để xác nhận đơn đặt chỗ của quý khách ngay khi có thể."},{"id":96102,"message":"Việc này thường mất chưa đến 2 giờ nhưng trong một vài trường hợp hiếm, có thể mất đến 24 giờ.  Nếu đã qua 24 giờ mà quý khách vẫn chưa nhận được thư xác nhận điện tử thì vui lòng liên hệ với dịch vụ khách hàng Agoda.  Quý khách cũng có thể theo dõi trạng thái của đơn đặt chỗ bằng cách truy cập Quản lý đơn đặt chỗ của tôi."},{"id":264804,"message":"Khi hãng hàng không xác nhận, một email xác nhận kèm chi tiết đặt chỗ sẽ được gửi đến bạn trong vòng 24 giờ tới. Do bạn đã chọn phương thức thanh toán này, khoản phí cho đặt chỗ đã được trừ. Nếu đặt chỗ của bạn không thể xác nhận, bạn sẽ được hoàn tiền. Vui lòng kiểm tra email để nhận xác nhận hoặc hướng dẫn thêm về việc hoàn tiền."},{"id":96103,"message":"Tìm thêm chuyến bay"},{"id":106214,"message":"Địa chỉ sao kê"},{"id":106215,"message":"Địa chỉ dòng 1"},{"id":106216,"message":"Địa chỉ dòng 2 (Không bắt buộc)"},{"id":106217,"message":"Quốc gia/vùng"},{"id":106218,"message":"Thành phố"},{"id":106219,"message":"Bang/tỉnh/vùng"},{"id":106220,"message":"Mã bưu điện"},{"id":106221,"message":"Địa chỉ không hợp lệ"},{"id":106222,"message":"Thành phố không hợp lệ"},{"id":106223,"message":"Mã bưu điện không hợp lệ"},{"id":107177,"message":"Quốc gia/vùng không hợp lệ"},{"id":107176,"message":"Bang/tỉnh/vùng không hợp lệ"},{"id":96246,"message":"Thông tin quan trọng"},{"id":110321,"message":"Việc xếp chỗ ngồi có thể thay đổi vì lý do an toàn hoặc vận hành"},{"id":96247,"message":"Tham chiếu đặt vé máy bay có thể được sử dụng để làm thủ tục, chọn chỗ ngồi, và mua bữa ăn hoặc hạn mức hành lý."},{"id":96248,"message":"Tất cả các ngày và giờ khởi hành/đến đều theo giờ địa phương."},{"id":96249,"message":"Vé phải được sử dụng theo đúng thứ tự ghi trên đặt chỗ."},{"id":96250,"message":"Vui lòng đến sân bay ít nhất 3 tiếng trước giờ khởi hành để đảm bảo quý khách có đủ thời gian để làm thủ tục."} "id":147673,"message":"Sẵn có bữa ăn nhẹ"},{"id":147674,"message":"Sẵn có bữa ăn"},{"id":147675,"message":"Sẵn có bữa ăn cao cấp"},{"id":147676,"message":"Sẵn có đồ ăn nhẹ cao cấp"},{"id":147677,"message":"Sẵn có đồ ăn nhẹ"},{"id":150956,"message":"Cách bố trí {0}"},{"id":147713,"message":"Ổ cắm dây điện và USB"},{"id":147714,"message":"Ổ cắm dây điện"},{"id":147715,"message":"Ổ cắm USB"},{"id":153631,"message":"Ổ cắm chuyển đổi"},{"id":147685,"message":"Sẵn có Wi-Fi cơ bản"},{"id":147686,"message":"Sẵn có Wi-Fi tốc độ nhanh"},{"id":147687,"message":"Sẵn có Wi-Fi"},{"id":97124,"message":"<p class=\"fontlargeb blue\">Điều khoản Sử dụng Agoda</p><br/>\n\n<p>Cập nhật mới nhất tháng 11 năm 2022</p>\n\n<p>Điều khoản Sử dụng này áp dụng cho việc quý khách sử dụng Trang web của Agoda và các dịch vụ được cung cấp qua đó. Việc quý khách sử dụng Trang web cho thấy quý khách chấp nhận Điều khoản Sử dụng, gồm cả các chính sách được kết hợp với Điều khoản Sử dụng bằng tham chiếu. Nếu quý khách không chấp nhận Điều khoản Sử dụng thì quý khách không được sử dụng Trang web hoặc các dịch vụ.</p>\n\n<p><strong>CHỈ DÀNH CHO KHÁCH HÀNG HOA KÌ:&nbsp; </strong><strong>Các Điều khoản Sử dụng này bao gồm việc đồng ý với trọng tài cưỡng chế, có nghĩa là quý khách đồng ý đệ trình bất kỳ tranh chấp nào liên quan đến trang web này, việc sử dụng các dịch vụ của chúng tôi, hoặc các điều khoản này lên trọng tài ràng buộc thay vì kiện ra tòa. Quý khách chỉ có thể không tham gia vào việc đồng ý với trọng tài cưỡng chế này bằng cách thực hiện các thủ tục dưới đây. Các điều khoản này cũng bao gồm việc miễn trừ phiên tòa.</strong></p>\n\n<p>Các định nghĩa sau đây áp dụng trong Điều khoản Sử dụng:</p>\n\n<p><strong>Agoda</strong> có nghĩa là Công ty TNHH Tư Nhân Agoda một công ty Singapore, có địa chỉ đã đăng ký tại 30 Cecil Street #19-08 Prudential Tower, Singapore 049712</p>\n\n<p><strong>Các công ty Liên quan</strong> có nghĩa là Công ty TNHH Dịch vụ Agoda, Công ty TNHH Tư nhân Quốc tế Agoda hoạt động ở Vương quốc Anh, Công ty TNHH Quốc tế Agoda (Hồng Kông), Công ty TNHH Quốc tế Agoda Hungary, Công ty CP Quốc tế Agoda Nhật Bản, Công ty TNHH Tư nhân Quốc tế Agoda (Malaysia). Tập đoàn Quốc tế Agoda Philippines, Công ty TNHH Quốc tế Agoda Hoa Kỳ, hoặc Công ty TNHH Quantum Growth Network Information Technology (Thượng Hải).</p>\n\n<p><strong>Trang web</strong> có nghĩa là các website và ứng dụng do Agoda sở hữu hoặc vận hành.</p>\n\n<p>Điều khoản Sử dụng kết hợp các chính sách khác nhau, gồm cả các chính sách được liệt kê phía dưới. Các chính sách có thể áp dụng cho các Dịch vụ hoặc chương trình cụ thể do Agoda cung cấp.</p> \n\n<p><a href=\"/info/agoda-privacy.html\">Chính sách Quyền riêng tư</a>, <a href=\"/info/agoda_policies.html#2\">Chính sách Mua sắm an toàn</a>, <a href=\"/info/agoda_policies.html#1\">Đảm bảo giá Agoda</a>, <a href=\"/info/agoda_policies.html#3\">Đảm bảo Đặt chỗ</a>, <a href=\"/info/agoda_policies.html#4\">Chính sách Hủy</a>, <a href=\"/info/agoda_policies.html#5\">Chính sách Hoàn tiền</a>, <a href=\"/info/agoda_policies.html#10\">Điều khoản Tiền Agoda</a>, <a href=\"/info/agoda_policies.html#8\">Chương trình Thưởng hoàn tiền mặt Agoda</a>, <a href=\"/rewards/HotelReviewGuidelines.html\">Nguyên tắc Đánh giá của Khách</a>, <a href=\"/info/agoda_policies.html#12\">Thanh toán ghi nợ Úc (eftpos)</a>, <a href=\"/info/agoda_faq.html\">Câu hỏi thường gặp</a></p>\n\n<p>Agoda đôi lúc có thể sửa đổi các Điều khoản Sử dụng bằng việc công bố các thay đổi trên trang web.</p>\n\n<p>Điều khoản Sử dụng tạo nên thỏa thuận tổng thể giữa quý khách, Agoda, và Các công ty Liên quan, và thay thế cho mọi thỏa thuận trước đó.</p>\n\n<p class=\"fontsmallb\"><strong>1. Phạm vi Dịch vụ của chúng tôi</strong></p>\n\n<p class=\"fontsmallb\"><strong>A. Tạo Điều Kiện Đặt Chỗ Ở</strong></p>\n\n<p>Qua Trang web, Agoda cung cấp một nền tảng trực tuyến nơi quý khách có thể xem qua các loại hình lưu trú và chỗ ở tạm thời khác nhau, bao gồm nhưng không nhất thiết giới hạn ở khách sạn, nhà trọ tập thể, căn hộ dịch vụ, B&amp;B, phòng cho thuê, nhà nhỏ, lữ quán, v.v. (được gọi chung là “(các) Chỗ ở”) và yêu cầu đặt phòng với các Chỗ ở như vậy, bao gồm thanh toán cho việc đặt các Chỗ ở đó trước bằng thẻ tín dụng, thẻ ghi nợ, ví điện tử, hoặc các phương thức thanh toán khác để tạo điều kiện cho quá trình xử lý thanh toán đó (“<strong>Công cụ Thanh toán</strong>”). Bằng việc đặt Chỗ ở qua Trang web, quý khách đưa ra đề nghị đặt chỗ với mức giá được niêm yết cho việc đặt chỗ đó và các điều khoản và điều kiện khác có liên quan đã nói trên Trang web. Việc này sẽ trở thành một hợp đồng ràng buộc được lập tại Singapore căn cứ theo Điều khoản Sử dụng khi được Chỗ ở cũng như Agoda chấp nhận. Quý khách sẽ nhận được bằng chứng về việc đặt Chỗ ở được xác nhận thông qua xác nhận e-mail (cùng phiếu đặt các Chỗ ở trả trước), có nghĩa là việc đặt phòng đã được Chỗ ở xác nhận. “Trang cảm ơn” có nghĩa là yêu cầu đặt phòng của quý khách đã được gửi đi và đã hoàn tất để tiến hành các bước xử lý cuối cùng, quý khách không cần làm gì thêm. Chúng tôi giữ quyền bác bỏ các đơn đặt phòng, như trình bày dưới đây.</p>\n        \t\n<p>Khi chúng tôi cung cấp các dịch vụ, thông tin mà chúng tôi tiết lộ về các Chỗ ở đều dựa trên thông tin do các nhà cung cấp cung cấp cho chúng tôi (bao gồm nhưng không nhất thiết giới hạn ở các Chỗ ở, các đại diện của họ, các nhà phân phối, các công ty quản lý điểm du lịch (DMC), quản lý kênh, các đối tác, v.v.). Như vậy, các Chỗ ở hoặc các đại diện của hãng được trao quyền truy cập vào một mạng diện rộng hoặc giải pháp kết nối khác, qua đó họ hoàn toàn chịu trách nhiệm cho việc cập nhật mức giá, tình trạng phòng trống, mô tả, hình ảnh, điều kiện đặt phòng, quy định của chỗ ở và các thông tin khác được hiển thị trên Trang web. Mặc dù chúng tôi sẽ sử dụng kỹ năng và sự cẩn trọng hợp lý về mặt thương mại trong việc cung cấp các dịch vụ của mình, chúng tôi sẽ không xác minh liệu, và không thể bảo đảm rằng, mọi thông tin là chính xác, đầy đủ, đúng đắn hoặc được cập nhật, và chúng tôi cũng không thể chịu trách nhiệm đối với bất cứ lỗi nào (kể cả các lỗi rõ ràng và lỗi in), gián đoạn (cho dù do Trang web gặp sự cố, được sửa chữa, nâng cấp hoặc bảo trì (tạm thời và/hoặc từng phần) hoặc các nguyên nhân khác), thông tin không chính xác, sai lệch hoặc không trung thực hoặc việc không cung cấp thông tin. Mỗi Chỗ ở sẽ luôn luôn chịu trách nhiệm về tính chính xác, tính đầy đủ và tính đúng đắn của các thông tin Chỗ ở được hiển thị trên Trang web. Những thay đổi về tình hình hoặc tình trạng thị trường có thể xảy ra mà không báo trước khiến cho các thông tin hiển thị trên Trang web trở nên không chính xác hoặc lỗi thời. Trong trường hợp có vấn đề, bộ phận Dịch vụ Khách hàng của chúng tôi sẽ thực hiện các nỗ lực thích đáng về mặt thương mại để hỗ trợ quý khách và là một đầu mối liên hệ với Chỗ ở. Xin lưu ý rằng Agoda là một trong nhiều kênh mà các Chỗ ở sử dụng để cung cấp phòng trống cho khách đặt trước. Khi một kết quả tìm kiếm chỉ ra rằng một Chỗ ở cụ thể không còn phòng nào trống, điều đó có nghĩa là không còn loại phòng đó để khách đặt trước qua Agoda.</p>\n        \t\n<p>Trang web không phải là và không nên được coi là sự giới thiệu hoặc xác nhận về (chất lượng, đánh giá hoặc mức dịch vụ của) bất kỳ Chỗ ở nào được đặt trên Trang web. Chúng tôi tại đây từ chối rõ ràng mọi việc đại diện, bảo đảm hay cam kết liên quan đến chất lượng, tình trạng hoặc tính thỏa đáng của bất kỳ Chỗ ở nào được đặt trên Trang web. Agoda hiện có chương trình \"Đối tác Ưu tiên\" mà nhờ đó một số Chỗ ở được lựa chọn nhất định có cơ hội cải thiện khả năng hiển thị của mình trên Trang web. Danh sách Đối tác Ưu tiên như vậy sẽ được đánh dấu hoặc chứa từ ngữ để cho rõ ràng. Trong những hoàn cảnh nhất định, Agoda cũng có thể cung cấp cho các Chỗ ở lựa chọn danh sách được tài trợ, tức là trả tiền cho vị trí dẫn đầu. Danh sách được tài trợ như vậy sẽ được đánh dấu hoặc chứa từ ngữ để cho rõ ràng.</p>\n        \n<p>Trong phạm vi cho phép của luật áp dụng, chúng tôi giữ quyền, và theo ý của chúng tôi, bác bỏ hoặc hủy phòng trong các trường hợp đặc biệt và sẽ thông báo cho quý khách về việc từ chối hoặc hủy qua thư điện tử đến địa chỉ quý khách đã cung cấp khi quý khách đặt phòng. Những lý do để bác bỏ hoặc hủy phòng điển hình bao gồm, nhưng không giới hạn ở: (Các) yêu cầu Chỗ ở hoặc Đối tác, thực tế hay nghỉ ngờ bán lại từng Chỗ ở hoặc hàng loạt Chỗ ở đã đặt qua Trang web mà không có sự đồng ý bằng văn bản của chúng tôi (sau đây gọi là \"Bán lại\"), vi phạm Điều khoản Sử dụng, những sự kiện bất khả kháng, những chế tài kinh tế hoặc thương mại, cấm vận, các hạn chế pháp lý, (nghi ngờ) ăn cắp hoặc giả mạo, có nghi ngờ hoạt động phạm tội, các đơn đặt phòng đáng ngờ, quý khách gửi thông tin sai lệch hoặc sai sót, các vấn đề về Công cụ Thanh toán, hành vi không phù hợp, đe dọa, lăng mạ, bạo lực, từ chối cung cấp thông tin, các cản trở thực tế, các vấn đề về giao tiếp, các sai sót hiển nhiên (xem dưới đây), lịch sử, nằm trong danh sách đen của các chính phủ hoặc các tổ chức quốc tế (Hoa Kỳ, Liên minh châu Âu, Liên Hiệp Quốc, Singapore), v.v. Nếu việc đặt phòng của quý khách bị Agoda bác bỏ hoặc hủy bỏ và thanh toán đã được thực hiện, quý khách sẽ được hoàn lại tổng giá trị đặt phòng, (trừ trường hợp Bán Lại trái phép hoặc trong bất cứ trường hợp nào khác như việc sử dụng trái phép Trang web hoặc việc sử dụng Trang web không phù hợp, và việc sử dụng đó có hại cho chúng tôi vì việc hoàn trả toàn bộ hay một phần giá trị đặt phòng là không chính đáng). Sẽ không được hoàn lại tiền trong trường hợp Bán lại trái phép do nhiều yếu tố tiêu cực bao gồm sự bất lợi mà hành động như vậy mang đến cho các đối tác liên kết có ký hợp đồng và được ủy quyền của chúng tôi, Chỗ ở cung cấp phòng trống cho Agoda theo hợp đồng và sự tín nhiệm, và gây ra thiệt hại và ảnh hưởng tiêu cực đến thương hiệu của Agoda do Bên Bán lại trái phép cố gắng bán rẻ hơn Agoda, có thể bao gồm cả việc đăng các phòng trống bán lại này trên trang web do đối thủ cạnh tranh của Agoda vận hành mà chúng tôi không biết. Chúng tôi cũng giữ quyền chặn (“ghi vào danh sách đen”) những người dùng truy cập vào Trang web, vĩnh viễn hoặc tạm thời, theo ý của chúng tôi. Bất kỳ người dùng nằm trong danh sách đen như vậy không được cố gắng sử dụng Trang web dưới bất kỳ tên nào khác hoặc thông qua bất kỳ người dùng nào khác. Hãy xem cả phần dưới đây dưới đề mục <strong>Thanh Toán - Thẻ Tín Dụng – “Đặt Ngay, Trả Tiền Sau” – Tuổi - Gian Lận </strong>để biết thêm thông tin về các cơ chế phòng chống gian lận của chúng tôi.<strong></strong></p>\n<p>Trong một số trường hợp hiếm hoi, chúng tôi cũng có thể phải hủy bỏ hoặc bác bỏ đơn đặt phòng hoặc chỉnh sửa đơn đặt phòng do “các lỗi hiển nhiên”, không phụ thuộc vào nguồn gốc của các lỗi đó. Để cho rõ ràng, một lỗi hiển nhiên là một lỗi trên Trang web (ví dụ về giá cả, điều kiện, điểm thưởng) mà một người lý trí sẽ không coi là bình thường. Nếu việc đặt phòng của quý khách bị ảnh hưởng bởi một lỗi rõ ràng thì chúng tôi sẽ thông báo cho quý khách qua thư điện tử tại địa chỉ quý khách đã cung cấp khi đặt phòng và sẽ điều chỉnh đơn đặt phòng hoặc điểm thưởng &nbsp;thích hợp, và sẽ hoàn trả một phần hoặc tất cả số tiền đã trả nếu phù hợp.</p>\n<p>Xin lưu ý rằng các đơn đặt phòng tập thể đáng ngờ cũng có thể bị Agoda hoặc Chỗ ở bác bỏ hoặc hủy bỏ vì hầu hết các Chỗ ở có những quy trình cụ thể đối với các đơn đặt phòng tập thể. Hãy liên hệ với <a href=\"/info/contact-agoda.html\">nhóm Dịch vụ Khách hàng</a> của chúng tôi để biết thêm chi tiết.</p>\n        \n<p>Các trường hợp như là việc sửa chữa đang trong quá trình thực hiện, các lỗi đặt phòng của Chỗ ở, và các nhu cầu cụ thể của khách có thể ảnh hưởng đến chất lượng lưu trú của quý khách. Nhớ báo cho Chỗ ở biết về bất cứ đề nghị hoặc yêu cầu đặc biệt nào của quý khách khi nhận phòng.</p>\n        \t\n<p class=\"fontsmallb\"><strong>Đôi lời về đánh giá sao</strong></p>\n        \t\n<p>Đánh giá sao của Chỗ ở, các đánh giá ký hiệu khác, hoặc bất kỳ tham chiếu nào trên Trang web đến một đánh giá trên Trang web (“<strong>Đánh giá Chỗ ở</strong>”) chỉ được cung cấp cho quý khách tham khảo và chỉ được cung cấp liên quan đến Chỗ ở. Đánh giá Chỗ ở dựa trên thông tin chúng tôi nhận được từ các nhà cung cấp của mình, bao gồm các Chỗ ở, và có thể tính đến cơ sở vật chất, mức giá, bài đánh giá, và dịch vụ của Chỗ ở. Đánh giá Chỗ ở không liên quan đến bất kỳ đánh giá nào khác do các cơ quan du lịch của chính phủ phân công. Chúng tôi không xác minh một cách độc lập các đánh giá sao. Một đánh giá sao chỉ biểu thị mức độ thoải mái mà quý khách có thể kỳ vọng ở một Chỗ ở cụ thể, một đánh giá sao cao hơn thường biểu thị mức độ thoải mái và tiện nghi cao hơn. Để biết thông tin cụ thể hơn, vui lòng kiểm tra mô tả chi tiết trên Trang web. Xin lưu ý rằng các đánh giá sao có thể khác nhau rất nhiều phụ thuộc vào vị trí, lựa chọn thay thế có sẵn, tình trạng thị trường địa phương, thông lệ hoặc các trường hợp khác. Do vậy, có thể là một đánh giá sao tại một quốc gia hoặc thành phố cụ thể không thể so sánh với cùng một đánh giá sao tại một quốc gia hoặc thành phố khác do các trường hợp như vậy. Các đánh giá sao không nhất thiết phản ánh tất cả các tiện nghi hay dịch vụ có thể có tại Chỗ ở, và có thể không có một số tiện nghi và tính năng trong mỗi phòng hay tại mỗi chỗ nghỉ có một đánh giá sao cụ thể. Nếu có những tiện nghi hoặc tính năng cụ thể quan trọng đối với quý khách thì vui lòng liên hệ với Dịch vụ Khách hàng của chúng tôi và hỏi về khả năng cung cấp các tiện nghi hoặc tính năng đó.</p>\n<p>Xếp hạng và bài đánh giá cho các Dịch vụ Hỗ trợ không được đề cập trong phần này mà được đề cập trong B. Các Dịch vụ Hỗ trợ Khác bên dưới.</p>\n<p class=\"fontsmallb\"><strong>B. Các Dịch vụ Hỗ trợ Khác</strong></p>\n\n<p>Agoda cung cấp một nền tảng trực tuyến mà qua đó quý khách có thể tìm các dịch vụ, bao gồm nhưng không nhất thiết giới hạn ở các chuyến bay, điểm thu hút và ô tô cho thuê (“Dịch vụ Hỗ trợ”) và đặt các Dịch vụ Hỗ trợ này. Tuy Trang web Agoda cung cấp nền tảng để quý khách có thể tìm và đặt các Dịch vụ Hỗ trợ, các Dịch vụ Hỗ trợ này được cung cấp bởi các bên thứ ba, công ty liên doanh hoặc đối tác của Agoda (“Đối tác”) mà Agoda đã chọn lựa. Ví dụ, các dịch vụ đặt chỗ, tìm kiếm và hiển thị chuyến bay trên Trang web Agoda hiện đang được cung cấp bởi các công ty Tập đoàn Booking Holdings như KAYAK hoặc priceline.com và các nhà cung cấp tương ứng của họ. Danh tính của từng Đối tác của chúng tôi sẽ được hiển thị trên Trang web khi duyệt qua các Dịch vụ Hỗ trợ và một đường liên kết được cung cấp đến các điều khoản và điều kiện sử dụng và/hoặc chính sách quyền riêng tư của Đối tác, điều chỉnh mối quan hệ giữa quý khách và Đối tác của chúng tôi trong việc đặt các Dịch vụ Hỗ trợ liên quan. Chúng tôi có thể được trả phí hoặc tiền hoa hồng nếu quý khách đặt trước Dịch vụ Hỗ trợ.</p>\n\n<p>Bằng việc thực hiện đặt Dịch vụ Hỗ trợ qua Trang web, quý khách đưa ra đề nghị đặt chỗ (như chuyến bay hoặc ô tô cho thuê) với mức giá được niêm yết cho đặt chỗ đó trên Trang web, và theo các điều khoản và điều kiện khác mà thỉnh thoảng bên Đối tác đã thông báo cho quý khách. Việc này cấu thành một hợp đồng ràng buộc khi đặt chỗ của quý khách được bên Đối tác chấp nhận. Bên Đối tác sẽ chi rõ việc chấp nhận đơn đặt Dịch vụ Hỗ trợ của quý khách qua xác nhận e-mail tới quý khách. Bên Đối tác giữ quyền bác bỏ các đơn đặt chỗ như được quy định tại các điều khoản và điều kiện của họ. Chúng tôi cũng giữ quyền bác bỏ việc đặt Dịch vụ Hỗ trợ của quý khách đúng với các điều khoản sử dụng này.</p>\n<p>Chúng tôi chỉ có thể hiển thị xếp hạng và bài đánh giá về Dịch vụ Hỗ trợ cho quý khách tham khảo. Đối tác có liên quan cung cấp, chịu trách nhiệm về nội dung của xếp hạng và bài đánh giá. Đánh giá và xếp hạng phải theo và tuân thủ các điều khoản và điều kiện của Đối tác.</p>\n\n<p><strong>Đôi lời về Đóng băng Giá cả</strong></p>\n<p>Dịch vụ Đóng băng Giá cả cho phép quý khách đóng băng thời gian ở tại Chỗ ở được chọn (i) với giá nhất định và (ii) trong một khoảng thời gian nhất định và sau đó quay lại để hoàn tất việc đặt phòng của quý khách, tùy vào tình trạng phòng sẵn có và các điều khoản và điều kiện khác được nêu ở đây. Giá đóng băng không kể thuế và phí, sẽ là một khoản tiền thêm được tính vào thời điểm đặt phòng.</p>\n<p>Dịch vụ Đóng băng Giá cả do Hopper (Hoa Kỳ), Inc. và các chi nhánh của Hopper (gọi chung là “<strong>Hopper</strong>”) cung cấp cho quý khách và phải theo/phù hợp với <a href=\"https://www.agoda.com/info/termsofuse.html?pricefreeze=true\" target=\"_blank\">Điều khoản Dịch vụ Đóng băng Giá cả của Hopper</a>, <a href=\"https://www.hopper.com/legal/terms-and-conditions/\" target=\"_blank\">Điều khoản Dịch vụ của Hopper</a>, và <a href=\"https://www.hopper.com/legal/privacy-notice/\" target=\"_blank\">Chính sách Quyền riêng tư của Hopper</a>. Bằng cách mua Dịch vụ Đóng băng Giá cả, quý khách đồng ý với tất cả những điều đã nói trên. Quý khách hiểu rằng Dịch vụ Đóng băng Giá cả KHÔNG PHẢI do Agoda cung cấp. Để biết thêm chi tiết, vui lòng đến <a href=\"https://www.agoda.com/info/termsofuse.html?pricefreeze=true\" target=\"_blank\">Điều khoản Dịch vụ Đóng băng Giá cả</a>.</p>\n\n<p class=\"fontsmallb\"><strong>2. Sử dụng Trang web</strong></p>\n\n<p>Agoda cũng làm việc với các công ty khác, bao gồm Booking.com B.V., để cung cấp các lựa chọn đặt Chỗ ở trên toàn thế giới cho khách hàng. Trong một vài trường hợp, quý khách sẽ nhận được xác nhận từ các công ty này. Agoda cũng có thể cung cấp lựa chọn đặt các Dịch vụ Hỗ trợ (chuyến bay, ô tô cho thuê) cộng tác với các Đối tác được chọn lựa như đã mô tả ở trên.</p>\n\n<p>Agoda cấp cho quý khách giấy phép trong giới hạn, hạn chế, cá nhân, không thể chuyển nhượng, không thể cấp phép lại cho người khác, có thể hủy ngang để truy cập và sử dụng Trang web chỉ trong phạm vi được cho phép rõ ràng trong Điều khoản Sử dụng. Ngoại trừ giấy phép trong giới hạn này, chúng tôi không cấp cho quý khách bất cứ quyền hoặc giấy phép nào khác liên quan đến Trang web; bất kỳ quyền hoặc giấy phép nào không được cấp một cách rõ ràng tại tài liệu này đều được bảo lưu. Nội dung và thông tin trên Trang web, cũng như phần mềm và cơ sở hạ tầng được sử dụng để cung cấp các nội dung và thông tin đó, thuộc quyền sở hữu của Agoda hoặc các nhà cung cấp, bao gồm cả Chỗ ở và Dịch vụ Hỗ trợ. Quý khách chỉ có thể sử dụng Trang web để tìm hiểu các đơn đặt phòng thực sự và hợp pháp và quý khách qua đây cam kết không thực hiện bất kỳ việc đặt phòng hay giữ phòng nào mang tính chất đầu cơ, lừa dối hay gian lận để dự phòng cho nhu cầu. Quý khách cam kết rằng các chi tiết thanh toán mà quý khách cung cấp cho chúng tôi khi thực hiện việc đặt phòng là hoàn toàn chính xác. Quý khách cũng cam kết cung cấp địa chỉ thư điện tử, bưu chính và/hoặc các chi tiết liên lạc khác đúng và chính xác cho Agoda và thừa nhận rằng Agoda có thể sử dụng các chi tiết này để liên lạc với quý khách trong trường hợp cần thiết. Vui lòng tham khảo thêm <a href=\"/info/agoda_privacy.html\">Chính sách Quyền riêng tư của chúng tôi</a>.</p>\n        \n<p>Theo đó, như là một điều kiện sử dụng Trang web, quý khách đồng ý không sử dụng Trang web hoặc các nội dung hoặc thông tin của Trang web vì bất kỳ mục đích thương mại hoặc phi cá nhân nào (trực tiếp hay gián tiếp) hoặc vì bất kỳ mục đích nào bất hợp pháp, trái pháp luật hoặc bị cấm theo Điều khoản Sử dụng. Trừ khi được chúng tôi viết giấy cho phép trước, quý khách đồng ý không sửa đổi, sao chép, phân phát, truyền tải, hiển thị, thực hiện, mô phỏng, xuất bản, cấp phép, tạo lập các nội dung phái sinh, chuyển nhượng, hoặc bán hay bán lại bất kỳ thông tin, phần mềm, sản phẩm, hoặc dịch vụ nào có được từ Trang web. Ngoài ra, quý khách đồng ý không: </p>\n\n<ul style=\"margin-left:40px\">\n<li>sử dụng Trang web hoặc các nội dung của Trang web vì bất kỳ mục đích thương mại nào không được ủy quyền (như tái phân phối hoặc bán lại các đơn đặt phòng mà không được phép);</li>\n<li>thực hiện bất kỳ việc đặt phòng nào mang tính chất đầu cơ, giả dối, hoặc gian lận; </li>\n<li>truy cập, giám sát hoặc sao chép bất kỳ nội dung hay thông tin nào của Trang web bằng cách sử dụng bất kỳ thiết bị tự động, phần mềm thu thập dữ liệu, hoặc các phương tiện tự động hóa khác hoặc bất kỳ quy trình thủ công nào vì bất kỳ mục đích nào mà không có sự cho phép rõ ràng trước đó bằng văn bản của chúng tôi; </li>\n<li>vi phạm các hạn chế trong bất kỳ danh mục loại trừ các thiết bị tự động nào trên Trang web hoặc phớt lờ hoặc trốn tránh các biện pháp khác được sử dụng để ngăn ngừa hoặc hạn chế việc truy cập Trang web; </li>\n<li>có bất cứ hành động nào áp đặt, hoặc có thể áp đặt, theo ý của chúng tôi, khối lượng tải lớn không hợp lý hay không cân xứng trên cơ sở hạ tầng của chúng tôi; </li>\n<li>liên kết trực tiếp tới bất kỳ phần nào của Trang web (bao gồm, nhưng không giới hạn ở, các đường dẫn về việc mua) vì bất kỳ mục đích nào mà không có sự cho phép rõ ràng trước đó bằng văn bản của chúng tôi; </li>\n<li>bán lại, sử dụng, sao chép, giám sát (ví dụ như các phần mềm thu thập dữ liệu), hiển thị, tải về hoặc mô phỏng bất kỳ nội dung hoặc thông tin, phần mềm, sản phẩm hoặc dịch vụ nào có trên Trang web vì bất kỳ hoạt động hay mục đích thương mại hoặc cạnh tranh nào; </li>\n<li>\"chắp ghép\", \"nhân bản\" hay lồng ghép theo cách khác bất kỳ phần nào của Trang web vào bất kỳ website nào khác mà chưa được chúng tôi viết giấy cho phép trước;</li>\n<li>đăng tải bất kỳ nội dung bất hợp pháp nào (theo bất kỳ và tất cả các điều luật hoặc quy định hiện hành) lên hoặc thông qua Trang web, hoặc bất kỳ nội dung nào ủng hộ hành động phi pháp;</li>\n<li>đăng tải, hoặc cung cấp các liên kết tới, bất kỳ nội dung nào có chứa tài liệu mà có thể được coi là có hại, tục tĩu, khiêu dâm, không đứng đắn, dâm ô, bạo lực, lạm dụng, xúc phạm, phân biệt chủng tộc, phân biệt đối xử, lăng mạ, đe dọa, không ngay thẳng, quấy rối, thù oán hay khó chịu;</li>\n<li>đăng tải hoặc cung cấp các liên kết tới, bất kỳ nội dung nào có chứa tài liệu mang tính chất phỉ báng, vu khống, giả dối hoặc bôi nhọ;</li>\n<li>đăng tải bất kỳ nội dung nào vi phạm hoặc xâm phạm quyền sở hữu trí tuệ hoặc quyền khác của bất kỳ tổ chức hoặc cá nhân nào, bao gồm, nhưng không giới hạn ở, bản quyền, bằng sáng chế, nhãn hiệu thương mại, các luật về bí mật thương mại, quyền riêng tư, hoặc công khai;</li>\n<li>đăng tải bất kỳ nội dung nào mà quý khách không có quyền cung cấp theo luật hoặc các mối quan hệ hợp đồng hoặc ủy thác;</li>\n<li>mạo danh một cá nhân hoặc tổ chức khác hoặc tuyên bố sai hoặc xuyên tạc mối liên kết của quý khách với một cá nhân hoặc tổ chức, hoặc mang nhận diện sai nếu mục đích của việc làm này là để lừa dối, đánh lừa, hoặc lừa đảo người khác; </li>\n<li>sửa đổi các định dạng, kể cả bằng cách giả mạo các danh mục, để che giấu nguồn gốc của bất kỳ nội dung nào mà quý khách đăng tải;</li>\n<li>sử dụng Trang web bằng bất cứ cách nào có thể gây tổn hại, vô hiệu hóa, quá tải, hoặc làm hư hại hoặc cản trở việc sử dụng Trang web hoặc thiết bị máy tính của người dùng khác, hoặc gây thiệt hại, gián đoạn hoặc hạn chế hoạt động của bất kỳ phần mềm, phần cứng, hoặc thiết bị viễn thông nào;</li>\n<li>cố gắng truy cập trái phép vào Trang web, bất kỳ website có liên quan nào, các tài khoản khác, hệ thống máy tính, hoặc các mạng kết nối vào Trang web, thông qua việc xâm nhập, khai thác mật khẩu, hoặc bất kỳ phương tiện nào khác; </li>\n<li>lấy hoặc cố gắng lấy bất kỳ tài liệu hoặc thông tin nào thông qua bất kỳ phương tiện nào không được cố ý cung cấp thông qua Trang web, kể cả việc khai thác hoặc thu thập các thông tin về những người khác như các địa chỉ thư điện tử; </li>\n<li>tham gia vào bất kỳ hành vi lừa đảo nào nhằm mục đích thao túng Trang Kết quả của Công cụ Tìm kiếm có hệ thống (Search Engine Results Page, SERP) hoặc sử dụng các kỹ thuật tối ưu hóa công cụ tìm kiếm (“SEO”) được coi là chống lại những quy định công cụ tìm kiếm phổ biến. các hành vi SEO được coi là phi đạo đức, hoặc “mũ đen” (hay còn gọi là “spamdexing”) bao gồm, mặc dù không giới hạn ở, việc che giấu thẻ tiêu đề và siêu dữ liệu, đạo nội dung, liên kết xấu, bom Google, nhồi nhét từ khoá, văn bản và liên kết ẩn, trang cầu nối và bị che giấu, nhóm các trang web cùng liên kết qua lại với nhau, bình luận rác trong blog, v.v.;</li>\n<li>làm bất cứ điều gì khác mà có thể gây thiệt hại cho Trang web, Agoda, Các công ty Liên quan, và từng nhân viên và danh tiếng của họ, hoặc sẽ có tác động tiêu cực khác; hoặc</li>\n<li>hỗ trợ hoặc tiếp tay cho các hoạt động trên.</li>\n</ul>\n\n<p>Trừ khi có sự cho phép rõ ràng khác, các website không thể liên kết vào bất kỳ trang nào vượt ra ngoài trang chủ của Trang web hoặc chắp ghép Trang web hoặc bất kỳ website hoặc tài liệu nào trong Điều khoản Sử dụng này, hoặc bất kể tổ chức nào cũng không thể liên kết bất kỳ khía cạnh nào của Trang web trong một thư điện tử vì các mục đích thương mại khi chưa có văn bản cho phép rõ ràng của Agoda.</p>\n\n<p>Khi đặt phòng trên Trang web, quý khách biểu lộ và đảm bảo rằng quý khách không phải chịu bất cứ chương trình trừng phạt quốc tế nào.</p>\n\n<p>Nếu và khi áp dụng, quý khách sẽ phải thỏa mãn các nghĩa vụ, thuế, khoản tạm giữ hay gì khác theo yêu cầu của quốc gia quý khách cư trú. </p>\n\n<p>Agoda có thể sử dụng công nghệ độc quyền hoặc bên thứ ba (ví dụ: Google reCAPTCHA v3) trên các trang của Trang web của mình để giữ cho Trang web an toàn khỏi những kẻ tấn công độc hại hoặc bất kỳ ai lạm dụng Trang web.</p>\n\n<p class=\"fontsmallb\"><strong>3. Giá, Đảm Bảo Giá Agoda, Phụ Thu, Thuế và Phí, tỉ giá hối đoái Agoda</strong></p>\n<p class=\"fontsmallb\">Xin lưu ý rằng, trừ phi có chú thích rõ ràng khác, tất cả các mức giá trên Trang web chỉ dành cho việc đặt phòng và cho đúng ngày lưu trú và số người quy định. Không ảnh hưởng đến những gì được trình bày dưới đây, trước khi quý khách xác nhận đặt phòng, Agoda sẽ hiển thị tổng giá phải trả, bao gồm thuế và phí dịch vụ, và những phí được tính vào. Khi quý khách lựa chọn các tùy chọn hoặc nêu rõ những chi tiết bổ sung, chúng tôi sẽ cập nhật tổng giá.</p>\n\n<p class=\"fontsmallb\"><strong>A. Giá và Đảm Bảo Giá Tốt Nhất cho Chỗ Ở</strong></p>\n\n<p>Chúng tôi cố gắng có giá cạnh tranh nhất và chúng tôi muốn quý khách trả mức giá thấp nhất có thể cho kỳ nghỉ tại một Chỗ ở. Nếu quý khách thấy đặt phòng Chỗ ở của mình, với cùng các điều kiện đặt phòng, có giá thấp hơn trên Internet sau khi quý khách đã đặt phòng qua chúng tôi, thì chúng tôi sẽ đáp ứng khoảng chênh lệch giữa giá của chúng tôi và giá thấp hơn đó theo các điều khoản và điều kiện của Đảm bảo Giá tốt nhất. Để một khiếu nại có thể chấp nhận theo đảm bảo này, khiếu nại đó phải thỏa mãn và được nộp phù hợp với tất cả các điều khoản và điều kiện có liên quan đến <a href=\"/info/agoda_policies.html#1\">Đảm bảo Giá tốt nhất</a> của chúng tôi. </p>\n\n<p>Đôi khi có các mức giá vé rẻ hơn trên Trang web cho một kỳ nghỉ cụ thể tại một Chỗ ở cho cùng một loại phòng, tuy nhiên, các mức giá do Chỗ ở đưa ra này có thể kèm theo hạn chế và điều kiện đặc biệt, ví dụ như đối với việc hủy và hoàn trả. Vui lòng kiểm tra kỹ loại phòng và chi tiết giá vé xem có điều kiện nào như vậy trước khi đặt phòng của mình. Cùng một loại phòng có thể có các mức giá khác nhau, tùy thuộc vào các hạn chế và điều kiện như vậy (xem thêm phần 6 dưới đây).</p>\n<p> Đảm bảo Giá tốt nhất không áp dụng cho các Dịch vụ Hỗ trợ được cung cấp trên Trang web. </p>\n\n<p class=\"fontsmallb\"><strong>B. Phụ Thu của Chỗ Ở</strong></p>\n\n<p> Ngoài giá đặt phòng, một số Chỗ ở sẽ tính phí dịch vụ bắt buộc, phụ phí, và thuế địa phương (ví dụ: phí nghỉ dưỡng hoặc tiện nghi, vận chuyển, và thuế du khách thành phố). Nếu chúng tôi biết về các phí dịch vụ và thuế địa phương này thì chúng tôi sẽ hiển thị chúng cùng với giá đặt phòng của quý khách. Các phí dịch vụ và thuế địa phương này có thể do Chỗ ở thu trực tiếp, ngoài mức giá quý khách phải trả cho việc đặt phòng của mình.<br/> Đặt phòng tiêu chuẩn là cho một hoặc hai người ở. Thêm khách hoặc giường thường sẽ phải chịu phụ thu. Chỗ ở có thể từ chối thêm khách ở trong phòng – quý khách phải ghi rõ đúng số người, bao gồm cả trẻ em sẽ ở mỗi phòng quý khách đặt. </p>\n<p>Quý khách sẽ phải chịu phụ phí tại Chỗ ở cho tất cả các dịch vụ và sản phẩm quý khách sử dụng mà không bao gồm trong giá đặt phòng theo mô tả rõ ràng của các điều kiện đặt phòng. Phí cho các tiện nghi quý khách sử dụng và các sản phẩm quý khách tiêu thụ trong thời gian quý khách ở lại đây (ví dụ: đỗ xe, truy cập internet, thực phẩm và đồ uống) không bao gồm trong giá đặt phòng trừ phi có chú thích.</p>\n<p>Trong các sự kiện và thời gian đặc biệt, một số Chỗ ở yêu cầu mỗi khách phải mua các dịch vụ bổ sung (ví dụ: bữa tối vào đêm Giao thừa). Nếu chúng tôi biết về dịch vụ bổ sung bắt buộc quý khách phải mua thì chúng tôi sẽ hiển thị nó trong các điều kiện đặt phòng hoặc cùng với giá đặt phòng của quý khách.</p>\n<p>Để di chuyển đến Chỗ ở tại một số địa điểm (ví dụ: các đảo ở Maldives), tất cả khách phải thu xếp việc vận chuyển đưa đón trước có phụ phí. Một số Chỗ ở yêu cầu Agoda thu tiền thanh toán cho việc vận chuyển khi thực hiện đặt phòng. Chúng tôi sẽ hiển thị các phụ phí vận chuyển này cùng với tổng giá của quý khách. Agoda không kiểm soát hoặc vận hành việc vận chuyển và không chịu bất kỳ trách nhiệm nào về chất lượng, độ an toàn, tần số hoặc mức dịch vụ của việc vận chuyển.</p>\n<p> Nếu quý khách không chắc chắn hoặc lo ngại về các khoản phụ thu thì vui lòng xác minh với Chỗ ở hoặc <a href=\"/info/contact-agoda.html\">Dịch vụ Khách hàng</a> những khoản phụ phí nào (nếu có) phải trả ngoài đặt phòng của quý khách.</p>\n<p class=\"fontsmallb\"><strong>C. Phụ Thu cho Các Dịch Vụ Hỗ Trợ</strong></p>\n\n<p>Vui lòng lưu ý rằng tất cả giá trên Trang web đối với các Dịch vụ Hỗ trợ do các Đối tác của chúng tôi đặt ra, nếu không có thông báo nêu rõ khác. Vui lòng tham khảo các điều khoản và điều kiện của bên Đối tác phù hợp về các loại phụ thu có thể áp dụng vào việc đặt chỗ của quý khách (ví dụ: thuế sân bay).</p>\n<p>Việc đặt chỗ của quý khách, và bất kỳ Dịch vụ Hỗ trợ nào quý khách mua, chưa bao gồm bảo hiểm, trừ khi được nói rõ ràng là bao gồm bảo hiểm.</p>\n<p class=\"fontsmallb\"><a name=\"12\"></a><strong>D. Lựa Chọn Đồng Tiền và Tác Động </strong></p>\n\n<p>Trang web cho phép quý khách đặt chỗ với các chỗ nghỉ và nhà cung cấp dịch vụ trên khắp thế giới. Do tính chất quốc tế của danh sách chỗ ở và cơ sở người dùng của chúng tôi, sẵn có một vài tùy chọn cho quý khách về đồng tiền mà quý khách bị tính phí và đồng tiền được hiển thị cho quý khách trên Trang web. Để biết thông tin thích hợp về giá, lựa chọn đồng tiền, và các lệ phí liên quan đến đồng tiền như vậy, vui lòng xem lại bảng bên dưới một cách trọn vẹn:</p>\n\n<p><table width=\"100%\" border=\"1\">\n  <tbody>\n    <tr>\n      <th scope=\"row\" style=\"padding: 6px;\">(a) Một vài Định nghĩa</th>\n\t\t<td style=\"padding: 6px;\"><p>(i) Đồng tiền của Thẻ nghĩa là đồng tiền mặc định của thẻ hoặc tài khoản thanh toán quý khách sử dụng để thanh toán cho việc đặt chỗ.&nbsp;</p>\n        <p>(ii) Đồng tiền Tính phí nghĩa là đồng tiền mà quý khách bị tính phí cho việc đặt chỗ mà quý khách có thể có quyền thay đổi.&nbsp;</p>\n        <p>(iii)&nbsp;Đồng tiền Hiển thị nghĩa là đồng tiền mà Trang web hiển thị giá niêm yết cho quý khách để quý khách tham khảo. Quý khách có thể chọn Đồng tiền Hiển thị từ nhiều tùy chọn khác nhau trên Trang web.&nbsp;</p>\n        <p>(iv) Đồng tiền Chỗ nghỉ nghĩa là đồng tiền mà chỗ nghỉ hoặc nhà cung cấp dịch vụ ra giá cho danh sách chỗ ở hoặc dịch vụ của mình. Đồng tiền Chỗ nghỉ là đồng tiền chính thức ở vùng mà chỗ nghỉ hoặc dịch vụ tọa lạc, trừ khi chỗ nghỉ hoặc nhà cung cấp dịch vụ có yêu cầu khác.&nbsp;</p>\n      <p>(v) Tỉ giá Bloomberg nghĩa là tỉ giá trung bình Tỉ giá Tổng hợp chung từ Bloomberg hiện hành vào ngày hiện tại. Các định nghĩa thích hợp khác cũng được đưa vào các phần dưới đây.</p></td>\n    </tr>\n    <tr>\n      <th scope=\"row\" style=\"padding: 6px;\">&nbsp;</th>\n      <td style=\"padding: 6px;\">NHẮC NHỞ: Giá cuối cùng được tính cho quý khách sẽ là giá theo Đồng tiền Tính phí được chọn.</td>\n    </tr>\n    <tr>\n      <th scope=\"row\" style=\"padding: 6px;\">(b) Khi liên quan đến các đồng tiền khác nhau, giá niêm yết được hiển thị trên Trang web, và giá cuối cùng được tính cho tôi, được tính toán như thế nào?</th>\n      <td style=\"padding: 6px;\"><p>(i) Giá Chỗ nghỉ. Mỗi danh sách chỗ ở hoặc dịch vụ trên Trang web đều dựa trên giá do nhà cung cấp dịch vụ hoặc chỗ nghỉ cung cấp (“Giá Chỗ nghỉ”). Tỉ giá Bloomberg hiện tại thường được dùng để:&nbsp;</p>\n        <p>&nbsp; (1) tính toán giá được hiển thị cho quý khách bằng Đồng tiền Hiển thị của quý khách (“Giá Hiển thị”) từ Giá Chỗ nghỉ, nếu Đồng tiền Chỗ nghỉ khác với Đồng tiền Hiển thị của quý khách; và&nbsp;</p>\n        <p>&nbsp; (2) tính toán giá được tính cho quý khách và phải trả bằng Đồng tiền Tính phí của quý khách (“Giá Tính phí”) từ Giá Chỗ nghỉ, nếu Đồng tiền Chỗ nghỉ khác với Đồng tiền Tính phí của quý khách.&nbsp;</p>\n      <p>(ii) Giá Hiển thị Sơ bộ. Trước khi chọn Đồng tiền Tính phí của quý khách, Giá Hiển thị chỉ là ước tính sơ bộ để quý khách tham khảo thuận tiện và không phản ánh sự tăng giá được mô tả bên dưới hoặc bất kỳ biến động nào của Tỉ giá Bloomberg. Quý khách nên luôn luôn kiểm tra tỉ mỉ Giá Tính phí sau khi chọn Đồng tiền Tính phí.</p></td>\n    </tr>\n    <tr>\n      <th scope=\"row\" style=\"padding: 6px;\">(c) Những đồng tiền nào có thể được chọn làm Đồng tiền Hiển thị hoặc Đồng tiền Tính phí của tôi?</th>\n      <td style=\"padding: 6px;\"><p>(i) Chọn Đồng tiền Hiển thị. Quý khách có thể chọn Đồng tiền Hiển thị từ nhiều tùy chọn đồng tiền trên Trang web.&nbsp;</p>\n      <p>(ii) Chọn Đồng tiền Tính phí. Nếu Đồng tiền Hiển thị của quý khách khác với Đồng tiền của Thẻ thì quý khách có thể có quyền chọn Đồng tiền Hiển thị hoặc Đồng tiền của Thẻ làm Đồng tiền Tính phí. Đồng tiền của Thẻ sẽ được xác định dựa trên thông tin thẻ mà quý khách nhập. Nếu Đồng tiền Hiển thị của quý khách giống với Đồng tiền của Thẻ thì Đồng tiền của Thẻ sẽ tự động được chọn làm Đồng tiền Tính phí của quý khách, trừ phi có chú thích khác.</p></td>\n    </tr>\n    <tr>\n      <th scope=\"row\" style=\"padding: 6px;\">&nbsp;</th>\n      <td style=\"padding: 6px;\">NHẮC NHỞ: Giá của quý khách có thể bị tăng lên tùy thuộc vào đồng tiền được chọn làm Đồng tiền Tính phí và Đồng tiền Hiển thị của quý khách.</td>\n    </tr>\n    <tr>\n      <th scope=\"row\" style=\"padding: 6px;\">(d) Làm thế nào mà giá của tôi có thể bị tăng dựa trên các lựa chọn đồng tiền của tôi?</th>\n      <td style=\"padding: 6px;\"><p>(i) Liên quan đến Đồng tiền Hiển thị. Nếu Đồng tiền Tính phí khác với Đồng tiền Hiển thị của quý khách thì sẽ áp dụng thêm 5% vào Giá Tính phí của quý khách, trừ khi: quý khách đang trả tiền bằng thẻ trả tiền của công ty phát hành Hoa Kỳ có đơn vị tiền tệ mặc định là USD; hoặc quý khách đang trả tiền bằng thẻ trả tiền của công ty phát hành Hoa Kỳ và đặt chỗ từ một địa chỉ IP nằm ở Hoa Kỳ.&nbsp;</p>\n        <p>(ii) Liên quan đến Đồng tiền Chỗ nghỉ. Quý khách có thể đặt phòng với lựa chọn Trả Sau hoặc một lựa chọn tương đương được chọn (“Đặt phòng Trả Sau”), trong trường hợp đó, quý khách sẽ đặt phòng như vậy vào một ngày nhất định (“Ngày Đặt phòng”) nhưng sẽ bị tính phí cho đơn đặt phòng như vậy vào một ngày sau (“Ngày Tính phí”). Nếu Đồng tiền Tính phí của quý khách khác với Đồng tiền Chỗ nghỉ cho Đặt phòng Trả Sau thì Giá Tính phí của quý khách sẽ được tính toán từ Giá Chỗ nghỉ bằng cách sử dụng Tỉ giá Bloomberg cộng thêm năm phần trăm (“Bloomberg +5%”) vào Ngày tính phí, trừ khi: quý khách đang đặt chỗ từ một địa chỉ IP nằm ở Vương quốc Anh; quý khách đang trả tiền bằng thẻ trả tiền của công ty phát hành Hoa Kỳ có đồng tiền mặc định là USD; hoặc quý khách đang trả tiền bằng thẻ trả tiền của công ty phát hành Hoa Kỳ và đặt chỗ từ một địa chỉ IP nằm ở Hoa Kỳ. Sự tăng giá này sẽ không áp dụng chung với sự tăng giá đã mô tả trong phần (i) trên đây, tức là nếu các điều kiện để áp dụng cả hai đều được đáp ứng thì chỉ sự tăng giá được mô tả trong phần (ii) này sẽ được áp dụng.&nbsp;</p>\n\t    <p>Về vấn đề trên, một đồng tiền trung gian, thường là USD, có thể được sử dụng để tính toán lượng tiền tệ. Như vậy, xin lưu ý rằng Giá Tính phí có thể được tính từ Giá Chỗ nghỉ bằng cách suy ra số tiền USD từ Giá Chỗ nghỉ và sau đó suy ra Giá Tính phí từ số tiền USD đó.</p>\n    </td>\n    </tr>\n    <tr>\n      <th scope=\"row\" style=\"padding: 6px;\">(e) Về Đơn đặt phòng Trả tiền ở Khách sạn và Tỉ giá Bên cấp Tài khoản</th>\n      <td style=\"padding: 6px;\"><p>(i) Đơn đặt phòng Trả tiền ở Khách sạn. Khi quý khách đặt phòng Trả tiền ở Khách sạn, tổng giá sẽ được cập nhật để hiển thị số tiền quý khách sẽ trả bằng Đồng tiền Chỗ nghỉ. Quý khách sẽ trả tiền trực tiếp cho Chỗ nghỉ, bằng Đồng tiền Chỗ nghỉ hoặc bất cứ đồng tiền nào mà Chỗ nghỉ đồng ý nhận. Nếu quý khách trả tiền bằng một đồng tiền khác, hoặc bằng một tài khoản thanh toán sử dụng một đồng tiền khác, thì số tiền thực tế quý khách sẽ phải trả cho việc đặt phòng sẽ phụ thuộc vào tỉ giá hối đoái được Chỗ nghỉ và bên cấp dịch vụ thanh toán của quý khách sử dụng. Những yếu tố này nằm ngoài tầm kiểm soát của Agoda.&nbsp;</p>\n      <p>(ii) Tỉ giá Bên cấp Tài khoản. Nếu Đồng tiền Tính phí của quý khách khác với Đồng tiền của Thẻ thì bên cấp tài khoản của quý khách (ví dụ: ngân hàng phát hành thẻ trả tiền mà quý khách sử dụng để trả tiền) sẽ quyết định tỉ giá hối đoái thích hợp khi giao dịch được tính vào tài khoản của quý khách. Bên cấp tài khoản của quý khách có thể đưa ra tỉ giá cao hơn hoặc thấp hơn so với Trang web, và có thể tính phụ phí cho giao dịch như vậy. Agoda không thể kiểm soát hoặc không hưởng lợi từ tỉ giá hối đoái hoặc phụ phí mà bên cấp tài khoản áp dụng.</p></td>\n    </tr>\n  </tbody>\n</table>\n</p>\n\n<p class=\"fontsmallb\"><strong>Đôi Lời về Các Khoản Thuế và Phí</strong></p>\n\n<p>Nhằm mục đích tạo điều kiện thuận lợi cho giao dịch Chỗ ở của quý khách, khoản phí từ Công cụ thanh toán của quý khách có thể tính cả thuế và phí (\"Thuế và Phí\") trừ phi có chú thích khác. Đối với Chỗ ở, khoản phí này bao gồm một số tiền ước tính để thu hồi số tiền mà Agoda trả cho Chỗ ở các khoản thuế mà Chỗ ở phải nộp liên quan đến tới việc đặt phòng của quý khách, bao gồm, nhưng không giới hạn ở, thuế bán hàng và sử dụng, thuế lưu trú, thuế phòng, thuế tiêu thụ gián tiếp, thuế giá trị gia tăng và/hoặc các loại thuế tương tự khác. Tại một số nơi, khoản tiền thuế cũng có thể bao gồm cả phí dịch vụ của chính phủ hoặc các khoản phí khác không được thanh toán trực tiếp cho cơ quan thuế nhưng theo quy định của pháp luật phải được Chỗ ở thu. Số tiền thuế thanh toán cho Chỗ ở liên quan tới đặt phòng của quý khách có thể thay đổi so với số tiền mà chúng tôi ước tính và gộp trong khoản phí tính cho quý khách. Số tiền còn lại từ khoản phí thanh toán Thuế và Phí, nếu có, là một khoản phí mà Agoda giữ lại làm một phần thù lao cho các dịch vụ của chúng tôi và để trang trải các chi phí đặt phòng của quý khách, bao gồm cả, ví dụ như, chi phí dịch vụ khách hàng. Nếu số dư là âm thì Agoda sẽ giữ khoản chênh lệch đó. Khoản tiền Thuế và Phí thay đổi dựa trên một số yếu tố bao gồm, nhưng không giới hạn ở, số tiền Agoda thanh toán cho Chỗ ở và vị trí của Chỗ ở nơi quý khách sẽ ở, và có thể bao gồm cả lợi nhuận mà Agoda giữ lại.</p>\n\n<p>Các nhà cung cấp Chỗ ở của chúng tôi, với tư cách là bên bán, gộp tất cả các loại thuế áp dụng trong số tiền lập hóa đơn và Agoda thanh toán số tiền đó trực tiếp cho các bên bán. Agoda không phải là một bên đồng bán hàng liên kết với bên bán hàng mà ở đó chúng tôi đặt phòng hay đặt chỗ cho chuyến du lịch của quý khách. Việc đánh thuế và thuế suất phù hợp và các loại thuế áp dụng khác nhau rất nhiều tùy theo địa điểm.</p>\n<p>Đối với các giao dịch liên quan đến các Chỗ ở thuộc một số quốc gia, việc thu tiền Thuế và Phí từ Công cụ thanh toán của quý khách bao gồm cả một khoản thanh toán thuế mà Agoda buộc phải thu và nộp cho nhà nước đối với khoản thuế đánh trên số tiền mà Agoda giữ lại làm thù lao cho các dịch vụ.</p>\n<p>Đối với các đơn đặt phòng mà quý khách cần thanh toán tại Chỗ ở, giá có thể có hoặc không bao gồm thuế và phí. Vui lòng xem xét lại các điều kiện đặt phòng và chứng từ hoặc thư xác nhận của quý khách hoặc liên hệ với nhóm Dịch vụ Khách hàng của chúng tôi.</p>\n<p> Ở một vài nơi, theo luật pháp địa phương, Chỗ ở có thể được yêu cầu tính và thu trực tiếp các loại thuế thành phố, giường, lưu trú du lịch hoặc tương đương.</p>\n<p> Thuế và phí cho các Dịch vụ Hỗ trợ mà quý khách có thể mua được mô tả trong điều kiện và điều khoản của Đối tác của chúng tôi.</p>\n<p class=\"fontsmallb\"><strong>4. Quyền riêng tư</strong></p>\n\n<p>Chúng tôi tôn trọng sự riêng tư của quý khách. Vui lòng xem <a href=\"/info/agoda_privacy.html\">Chính sách Quyền riêng tư</a> của chúng tôi để biết thêm thông tin.</p>\n\n<p class=\"fontsmallb\"><strong>5. Thanh Toán - Thẻ Tín Dụng – “Đặt Ngay, Trả Tiền Sau” – Tuổi - Gian Lận</strong></p>\n\n<p>Đối với các đơn đặt Chỗ ở với Agoda, quý khách ủy quyền cho chúng tôi thu thập và xử lý (gồm cả việc thu thập và xử lý thông qua một bên thứ ba) thông tin của quý khách cần thiết cho bên cung cấp dịch vụ xử lý hoặc tổ chức tài chính cấp Công cụ thanh toán cho quý khách như thẻ tín dụng hoặc ghi nợ để xác minh nhân dạng của quý khách. Thông tin cá nhân được thu thập về quý khách mà có thể được chia sẻ với bên thứ ba (bao gồm để xử lý giao dịch và/hoặc duy trì tài khoản của quý khách) đã được quy định tại Chính sách Quyền riêng tư.</p>\n<p>Để hoàn tất thanh toán cho các đơn đặt phòng Chỗ ở trả trước như vậy, quý khách ủy quyền cho Agoda hoặc Các công ty Liên quan để tính tiền hoặc ghi nợ vào Công cụ thanh toán của quý khách toàn bộ số tiền (đôi khi không được chọn hoàn tiền tùy theo điều kiện đặt phòng của Chỗ ở, xem bên dưới) khi đặt phòng và xác nhận đặt phòng hoặc, trong trường hợp đặt phòng “<strong>Đặt Ngay, Trả Tiền Sau</strong>”, tại một thời điểm trong tương lai được truyền tải thông qua thư điện tử xác nhận. Khi sử dụng “<strong>Đặt Ngay, Trả Tiền Sau</strong>”, vui lòng đảm bảo rằng Công cụ thanh toán của quý khách hợp lệ và có đủ nguồn tín dụng vào ngày thanh toán trong tương lai. Nếu không thể tính phí Công cụ thanh toán đó vào ngày đó vì bất cứ lí do gì thì việc đặt phòng sẽ bị hủy trừ khi quý khách có thể chắc rằng việc thanh toán thẻ có thể được xác minh đúng hạn. Vui lòng kiểm tra kỹ chi tiết đặt phòng xem có điều kiện nào như vậy trước khi đặt phòng của mình. Agoda hoặc Các công ty Liên quan sẽ xử lý hoàn lại tiền, nếu và khi áp dụng, trong một khung thời hạn hợp lý. Quý khách cũng ủy quyền ghi có vào Công cụ thanh toán của mình trong trường hợp có hủy bỏ, hoàn tiền, hoặc chỉnh sửa qua dịch vụ tạo điều kiện cho việc xử lý các giao dịch thanh toán. Đối với một vài Chỗ ở nhất định, Agoda sẽ không tính tiền Công cụ thanh toán của quý khách, vì quý khách sẽ thanh toán trực tiếp cho Chỗ ở đó cho kỳ nghỉ của mình (trả sau). Tuy nhiên, trong những trường hợp như vậy một số Chỗ ở có thể xác minh thẻ của quý khách, tính tiền cọc hoặc tính trọn giá đặt phòng trước. Chỗ ở có thể yêu cầu chi tiết thẻ tín dụng để đảm bảo việc đặt phòng của quý khách. Như vậy, Agoda sẽ gửi thông tin Công cụ thanh toán của quý khách trực tiếp đến Chỗ ở mà quý khách đặt phòng và cũng có thể xác minh Công cụ thanh toán của quý khách. Để bảo vệ và mã hóa thông tin Công cụ thanh toán của quý khách trong khi chuyển tới cho chúng tôi, chúng tôi sử dụng công nghệ \"<strong>Lớp Cổng Bảo Mật (SSL)</strong>\" cho các dịch vụ của chúng tôi. Vui lòng lưu ý ngân hàng của quý khách có thể tính phụ phí đối với giao dịch.</p>\n<p>Một số công ty Công cụ thanh toán có thu phí đối với khách hàng của họ để xử lý các \"<strong>giao dịch nước ngoài</strong>\". Nếu khách hàng thực hiện giao dịch thẻ và hoá đơn sử dụng ngân hàng ở một quốc gia khác quốc gia cấp thẻ, dịch vụ thẩm định quốc tế, phí giao dịch quốc tế hoặc các chi phí tương tự sẽ thu phí. Ngân hàng phát hành của quý khách có thể áp dụng phí này cho quý khách (chủ thẻ) hoặc có thể không. Vui lòng liên hệ ngân hàng cấp thẻ của quý khách để biết thêm thông tin chi tiết vì điều này nằm ngoài tầm kiểm soát của Agoda.</p>\n<p>Trong trường hợp các bên thứ ba có gian lận Công cụ thanh toán hoặc việc sử dụng trái phép Công cụ thanh toán của quý khách, quý khách phải liên hệ với ngân hàng hoặc nhà phát hành thẻ của mình ngay sau khi biết được việc sử dụng trái phép đó. Nếu quý khách nghi ngờ một đơn đặt phòng trái phép hoặc gian lận đã được thực hiện thông qua Agoda thì vui lòng liên hệ với nhóm Dịch vụ Khách hàng của chúng tôi ngay lập tức.  </p>\n\n<p>Để đặt phòng quý khách phải trên 18 tuổi (hoặc độ tuổi khác mà đến tuổi trưởng thành tại ở nước và vùng lãnh thổ của quý khách) và có đầy đủ năng lực pháp lý để thực hiện giao dịch (hoặc được người giám hộ pháp định của quý khách cho phép làm vậy). Quý khách cam kết rằng Công cụ thanh toán mà quý khách đang sử dụng là của riêng quý khách hoặc quý khách được ủy quyền hoàn thành việc đặt phòng bằng Công cụ thanh toán này và có đủ tiền để trả cho giao dịch. Quý khách chấp nhận trách nhiệm tài chính cho tất cả các giao dịch được thực hiện bằng tên hoặc tài khoản của quý khách.</p>\n<p>Quý khách cam kết rằng các thông tin chi tiết mà quý khách cung cấp cho chúng tôi khi thực hiện việc đặt phòng là đầy đủ và chính xác. Agoda giữ quyền không chấp nhận một số Công cụ thanh toán. Agoda có thể thêm hoặc loại bỏ các phương thức thanh toán khác theo sự suy xét và quyết định của mình. Để thuận tiện hơn, Agoda hiện cũng cung cấp tùy chọn lưu trữ chi tiết Công cụ thanh toán của quý khách một cách an toàn trong hồ sơ. Nếu quý khách chọn lưu thẻ tín dụng hoặc ghi nợ với Agoda thì chúng tôi không thể yêu cầu quý khách cung cấp Giá trị Kiểm chứng Thẻ hay mã an ninh vào lần tiếp theo quý khách sử dụng thẻ để đặt phòng. Để biết thêm chi tiết, hãy xem Chính sách Quyền riêng tư của chúng tôi.</p>\n<p>Chúng tôi đã triển khai cơ chế phát hiện và chống gian lận nghiêm ngặt. Trong một số trường hợp, chúng tôi có thể yêu cầu thêm thông tin hoặc xác minh để xác thực và xác nhận đặt chỗ, như được giải thích chi tiết trên Trang web. Một khoản phí xác minh nhỏ hoặc giao dịch xác minh cũng có thể được thực hiện vào thẻ của quý khách, cũng như khi sử dụng \"<strong>Đặt Ngay, Trả Tiền Sau</strong>\". Sẽ tính phí trên số dư sau khi xác nhận hoặc, trong trường hợp \"<strong>Đặt Ngay, Trả Tiền Sau</strong>\", vào ngày thanh toán trong tương lai (hãy xem chú thích ở trên về khả năng hủy chỗ trong trường hợp không thể tính tiền thẻ vào ngày đó dù với lý do gì chăng nữa). Các đơn đặt chỗ không được xác nhận cho đến khi quý khách nhận được thư điện tử xác nhận kèm chứng từ và có thể là Chỗ ở hoặc Dịch vụ Hỗ trợ có thể kín chỗ trong quá trình kiểm tra gian lận; trong trường hợp này đơn đặt chỗ sẽ không còn nữa. Agoda không bao giờ có thể chịu trách nhiệm trong những trường hợp như vậy. Thông tin bổ sung gửi đi sẽ được xử lý theo các tiêu chuẩn nghiêm ngặt của ngành để bảo vệ quyền riêng tư thông qua mã hóa để truyền tin và thông qua các cơ quan chuyên môn để xác minh. Nếu quý khách lựa chọn không gửi thông tin bổ sung hoặc nếu chúng tôi không hài lòng với thông tin nhận được thì việc đặt chỗ sẽ bị hủy bỏ do không hoàn thành và mọi số tiền đã tính (gồm cả phí xác minh nếu có) sẽ được hoàn trả.</p>\n\n<p class=\"fontsmallb\"><strong>Đôi lời về việc Trả góp</strong></p>\n<p>Trong các khu vực nằm trong phạm vi quyền hạn nhất định, Agoda hỗ trợ trả làm nhiều kỳ (“<strong>Trả góp</strong>” hoặc “<strong>Trả chậm</strong>”). Dịch vụ này không phải do Agoda mà do một bên thứ ba cung cấp (“<strong>Bên trợ giúp Trả góp</strong>”). Nếu quý khách muốn Trả góp thì quý khách cần phải nhất trí với các điều khoản và điều kiện của cấu trúc trả góp của Bên trợ giúp Trả góp và/hoặc với một thỏa thuận thanh toán bổ sung với Agoda được cung cấp tại website của Bên trợ giúp Trả góp. Nếu quý khách không đáp ứng yêu cầu hoặc quý khách không đáp ứng các điều khoản và điều kiện của Bên trợ giúp Trả góp thì tính năng trả góp sẽ không dành cho quý khách. Nếu quý khách vi phạm các điều khoản và điều kiện của Bên trợ giúp Trả góp thì quý khách sẽ phải chịu những hậu quả do các điều khoản và điều kiện của Bên trợ giúp Trả góp quy định. Agoda giữ quyền hủy phòng của quý khách, khi quý khách vi phạm các điều khoản và điều kiện của Bên trợ giúp Trả góp. Quý khách đồng ý thanh toán và một mình chịu trách nhiệm về toàn bộ số tiền đặt chỗ và quý khách đồng ý rằng Agoda có quyền chia phần tiền đặt phòng mà quý khách phải trả cho Bên trợ giúp Trả góp và/hoặc các bên bao thanh toán của mình. </p>\n\n<p class=\"fontsmallb\"><strong>Đôi lời về việc thanh toán thất bại</strong></p>\n<p>Vì nhiều lý do, việc thanh toán trên Trang web có thể thất bại. Trong những trường hợp như thế, Agoda sẽ đưa ra cho quý khách các lựa chọn thay thế (nếu có) để đảm bảo quý khách có thể tiến hành đặt phòng. Nếu quý khách có bất kỳ câu hỏi nào thì vui lòng liên hệ với phòng Dịch vụ Khách hàng của chúng tôi.</p>\n\n<p class=\"fontsmallb\"><strong>6. Các điều kiện đặt phòng – Hủy Phòng, Vắng Mặt, Trả Phòng Sớm và Trả Phòng Muộn – Quy Định Cụ Thể Của Chỗ Ở – Nhu Cầu Đặc Biệt – các dịch vụ hoặc sản phẩm Agoda bổ sung</strong></p>\n\n<p>Khi đặt Chỗ ở trên Trang web của chúng tôi, quý khách chấp nhận và đồng ý các điều kiện đặt phòng Chỗ ở có liên quan, bao gồm cả các chính sách về hủy phòng và việc đã đặt phòng và vắng mặt áp dụng đối với đặt phòng đó, và bất kỳ điều khoản và điều kiện (cung ứng) bổ sung nào của Chỗ ở có thể áp dụng đối với đặt phòng của quý khách hoặc trong thời gian quý khách ở lại đây, bao gồm các dịch vụ và/hoặc sản phẩm do Chỗ ở cung cấp (các điều khoản và điều kiện cung ứng của một Chỗ ở có thể được áp dụng với Chỗ ở có liên quan). Chính sách vắng mặt và hủy chỗ chung của mỗi Chỗ ở được cung cấp trên Trang web tại các trang thông tin về Chỗ ở hoặc trong \"Điều kiện Đặt phòng\", \"Chính sách Hủy bỏ\" hoặc các mục tương tự, và trong chứng từ và thư điện tử xác nhận. Xin lưu ý rằng quý khách có thể bị tính phí cho việc hủy phòng của mình theo chính sách hủy phòng và vắng mặt của Chỗ ở, trong một số trường hợp bị tính phí toàn bộ thời gian lưu trú hoặc đêm đầu tiên. Chúng tôi khuyên quý khách nên đọc chính sách hủy phòng và vắng mặt của Chỗ ở một cách cẩn thận trước khi đặt phòng của mình. Nếu quý khách không nhận phòng tại Chỗ ở đúng giờ vào ngày đặt phòng của mình và không báo cho Chỗ ở biết, thì phần còn lại của đặt phòng có thể bị hủy và quý khách có thể không được hoàn tiền, tùy thuộc vào các điều khoản và điều kiện của Chỗ ở áp dụng. Bất chấp chính sách hủy bỏ của Chỗ ở, Agoda giữ quyền tính phí hủy và điều này sẽ được nêu rõ trên Trang web. Vui lòng rà lại chi tiết Chỗ ở xem có điều kiện nào như vậy trước khi đặt phòng của mình. Một số Chỗ ở sẽ tính thêm phí cho việc trả phòng sớm hoặc muộn.</p>\n\n<p>Nếu quý khách muốn kiểm tra lại, điều chỉnh hoặc hủy phòng của mình thì vui lòng mở thư điện tử xác nhận và làm theo hướng dẫn trong đó, sử dụng công cụ tự phục vụ của chúng tôi hoặc liên hệ với bộ phận Dịch vụ Khách hàng.</p>\n\n<p>Nhiều Chỗ ở có chính sách đặc biệt cho trẻ em, khách đi cùng và/hoặc thú nuôi đi cùng. Như đã nêu trên, quý khách nên kiểm tra với Dịch vụ Khách hàng, trực tiếp với Chỗ ở hoặc xác minh các quy định của Chỗ ở.</p>\n\n<p>Các Nhu Cầu Đặc Biệt: Nếu quý khách có nhu cầu đặc biệt (ví dụ: phòng xe lăn vào được) thì quý khách phải liên hệ với Dịch vụ Khách hàng hoặc Chỗ ở và xác minh rằng các nhu cầu đặc biệt có thể được đáp ứng. Xin lưu ý rằng mọi yêu cầu đặc biệt đều lệ thuộc vào khả năng cung cấp và không được Agoda đảm bảo. Tùy theo chính sách của Chỗ ở áp dụng, đặt phòng của quý khách sẽ được hoàn tiền, hủy bỏ hoặc sửa đổi nếu các nhu cầu đặc biệt không thể được đáp ứng. Nếu có thể đáp ứng thì yêu cầu của quý khách sẽ được xác nhận khi đến nơi. Agoda sẽ không chịu trách nhiệm cho quý đối tác về bất kỳ thiệt hại hoặc chi phí nào mà quý khách phải chịu nếu Chỗ ở không đáp ứng nhu cầu đặc biệt của quý khách.</p>\n<a name=\"priceAlert\"></a>\n<p><strong>Đôi lời về Thông báo giá Agoda</strong></p>\n<p>Quý khách có thể chọn tạo lập “Thông báo giá” Agoda cho các Chỗ ở tìm thấy trên Trang web của chúng tôi. Nếu được chọn, chúng tôi sẽ gửi cho quý khách Thông báo giá khi mức giá tại (các) Chỗ ở trong khung thời gian mà quý khách đã chọn thay đổi trên Trang web của chúng tôi. Thông báo giá không cụ thể cho một loại phòng hoặc các đặc điểm khác liên quan đến Chỗ ở (ví dụ: gồm cả bữa sáng, ăn cả ngày, loại giường). Tối đa một Thông báo giá mỗi Chỗ ở mỗi ngày sẽ được gửi cho quý khách. Thông báo giá chỉ được gửi nếu mức giá của Chỗ ở thay đổi vượt ngưỡng \"cần thiết\" mà chúng tôi đặt ra. Loại Thông báo giá được gửi tới quý khách sẽ tùy thuộc vào phương tiện quý khách sử dụng, qua thư điện tử nếu Trang đã chọn là website Agoda và bằng thông báo tự động nếu Trang đã chọn là ứng dụng Agoda của chúng tôi. Quý khách phải chịu trách nhiệm cho việc cập nhật các cài đặt Thông báo giá của mình. Thông báo giá theo cài đặt của quý khách vẫn tiếp tục được gửi cho quý khách ngay cả khi đã đặt phòng cho Chỗ ở đã chọn hoặc một Chỗ ở khác trong khoảng thời gian đã chọn cho đến khi quý khách thay đổi cài đặt Thông báo giá. Chọn nhận Thông Báo Giá sẽ không ảnh hưởng đến các lựa chọn khác có liên quan đến việc nhận thông tin từ chúng tôi mà quý khách đã thực hiện. Ngoài ra, chúng tôi tất nhiên sẽ cung cấp cho quý khách khả năng không tham gia vào việc nhận Thông báo giá bất cứ lúc nào bằng cách bấm vào “tắt thông báo giá” hoặc một thông điệp tương tự trong Thông báo giá gửi cho quý khách. Để biết thêm thông tin về việc này, vui lòng xem Chính sách Quyền riêng tư của chúng tôi.</p>\n\n<p class=\"fontsmallb\"><strong>Đôi lời về Ưu đãi Bí mật Agoda</strong></p>\n\n<p>Qua chương trình “Ưu đãi Bí mật” của mình, Agoda có thể thường xuyên cung cấp phòng Chỗ ở chất lượng với mức giá vô cùng hấp dẫn, có nghĩa là quý khách tiết kiệm được nhiều cho chỗ ở chất lượng tại các chỗ nghỉ được chọn lựa trên toàn cầu, từ khách sạn năm sao sang trọng đến khách sạn nhỏ cao cấp quyến rũ. Vì nhiều lý do khác nhau, các Chỗ ở tham gia chương trình này muốn giấu tên cho đến khi đặt phòng được xác nhận và thanh toán.</p>\n\n<p>Ưu đãi Bí mật được đánh dấu bằng một biểu tượng cụ thể và quý khách có thể tìm và tham khảo thông tin then chốt về các chỗ nghỉ này (khu vực chung, mô tả, tiện nghi) trước khi đặt phòng, nhưng quý khách sẽ không biết đó là chỗ nghỉ nào. Khi quý khách hoàn thành đặt phòng, tên chỗ nghỉ, vị trí và chi tiết liên lạc sẽ được tiết lộ. Để đảm bảo cho Agoda có thể tiếp tục cung cấp các mức giá đặc biệt này một cách thường xuyên, các đơn đặt phòng Ưu đãi Bí mật sẽ không thể hủy và không hoàn tiền.</p>\n\n<p class=\"fontsmallb\"><strong>Đôi lời về PointsMAX</strong></p>\n\n<p>Qua chương trình “PointsMAX” của mình, Agoda đang đem lại cho quý khách cơ hội để tích điểm với một số chương trình khách hàng trung thành của bên thứ ba (ví dụ: chương trình dặm thưởng từ các hãng hàng không). Đối với một số Chỗ ở, quý khách sẽ có thể chọn một chương trình khách hàng trung thành của bên thứ ba từ lệnh đơn PointsMAX để xem các ưu đãi, kế bên ưu đãi phòng thông thường của chúng tôi. Nếu có, quý khách sẽ được đề xuất chọn đặt phòng PointsMAX có tích điểm với chương trình khách hàng trung thành của bên thứ ba mà quý khách đã chọn. Số điểm quý khách đang tích và tên chương trình sẽ được xác nhận lại trên phiếu đặt phòng của quý khách và thông báo xác nhận cảm ơn quý khách sẽ nhận được sau khi đặt phòng PointsMAX. Điểm sẽ được gửi trực tiếp vào tài khoản chương trình bên thứ ba của quý khách trong vòng 2 đến 8 tuần sau ngày trả phòng của quý khách. Để tránh sự nghi ngờ, chương trình PointsMAX không áp dụng cho các Dịch vụ Hỗ trợ được cung cấp trên Trang web.</p>\n\n<p>Một số lưu ý quan trọng về tất cả các đơn đặt phòng PointsMAX:</p>\n\n<ul style=\"margin-left:40px\">\n\n<li>Mã thành viên của đối tượng hưởng điểm thưởng của bên thứ ba phải thuộc về khách đang ở lại khách sạn (được xác định theo tên khách chính);</li>\n<li>Giá đặt phòng PointsMAX có thể khác với các đơn đặt phòng thông thường có cùng điều kiện;</li>\n<li>Giá đặt phòng PointsMAX không thể phân chia thành phần giá phòng và phần điểm;</li>\n<li>Mọi chính sách hủy phòng sẽ áp dụng đầy đủ cho các đơn đặt phòng PointsMAX;</li>\n<li>Chỉ có điểm thưởng hoặc dặm bay được tích lũy, không bao gồm điểm trạng thái và điểm;</li>\n<li>Các phòng đã hủy sẽ không được tích điểm, bất kể điều kiện hủy tài chính nào; </li>\n<li>Điểm không thể quy đổi thành tiền mặt và không được áp dụng chung với các ưu đãi khác;</li>\n<li>Đảm bảo giá Agoda không áp dụng cho các đơn đặt phòng PointsMAX; và</li>\n<li>Các điều khoản và điều kiện của các chương trình khách hàng trung thành của bên thứ ba sẽ áp dụng cho chương trình đó.</li>\n</ul>\n<p><strong>Đôi lời về Khuyến mại</strong></p>\nThỉnh thoảng Agoda có thể cung cấp giá khuyến mại, phiếu quà tặng, mã khuyến mại và phiếu giảm giá, chiết khấu, và khuyến mại đặc biệt (“Khuyến mại”). Trừ khi có quy định rõ ràng khác, Khuyến mại không được kết hợp với nhau và phải theo các quy tắc cũng như các điều khoản và điều kiện đặc biệt có thể bổ sung cho Điều khoản Sử dụng Agoda.\n<p><strong>Đôi lời về Mã khuyến mại và Phiếu giảm giá</strong></p>\n<ol type=\"1\">\n  <li>Mã khuyến mại hoặc phiếu giảm giá hợp lệ phải được áp dụng tại trang thanh toán để chúng áp dụng cho việc đặt chỗ của quý khách. </li>\n  <li>Trừ phi có chỉ định khác, mã khuyến mại và phiếu giảm giá không áp dụng cho thuế địa phương, phí dịch vụ, và các phụ phí.</li>\n  <li>Mã khuyến mại và phiếu giảm giá có thể loại trừ các khách sạn, loại phòng, hoặc ưu đãi nhất định. </li>\n  <li>Trừ phi có chỉ định khác, mã khuyến mại và phiếu giảm giá không được chuyển nhượng, không tích lũy, và không được kết hợp với các ưu đãi, phần thưởng, hoặc chương trình khách hàng trung thành khác.</li>\n  <li>Mã khuyến mại và phiếu giảm giá không thể được quy đổi hoặc đổi thành tiền mặt, tín dụng, hoặc các sản phẩm khác.</li>\n  <li>Trong trường hợp hủy chỗ, mã khuyến mại hoặc phiếu giảm giá không có giá trị tiền mặt hoặc hoàn trả.</li>\n  <li>Một số mã khuyến mại hoặc phiếu giảm giá có thể chỉ sẵn sàng để dùng ở các lãnh thổ nhất định hoặc cho cư dân các lãnh thổ nhất định.</li>\n  <li>Agoda giữ quyền ngưng việc sử dụng mã khuyến mại hoặc phiếu giảm giá của người dùng nếu họ được coi là đã lạm dụng mã khuyến mại hoặc phiếu giảm giá.</li>\n  <li>Agoda giữ quyền thay đổi các điều khoản mà không cần thông báo trước. </li>\n  <li>Trong trường hợp tranh chấp, quyết định cuối cùng sẽ là của Agoda.</li>\n</ol> \n<p><strong>Đôi lời về các đơn đặt chỗ kết hợp và nhiều đơn đặt chỗ bằng Xe đẩy hàng Agoda</strong></p>\n<p>Agoda cung cấp lựa chọn tìm kiếm và đặt trước các đơn đặt chỗ kết hợp và/hoặc nhiều đơn đặt chỗ bằng Xe đẩy hàng Agoda cho các Gói Chỗ ở/Chuyến bay/Du lịch được chọn. Không phải tất cả các Gói Chỗ ở/Chuyến bay/Du lịch được đưa ra trên Website Agoda đều có thể được đặt như một phần của đơn đặt chỗ kết hợp hoặc nhiều đơn đặt chỗ và những gói có thể được đặt như một phần của đơn đặt chỗ kết hợp hoặc nhiều đơn đặt chỗ sẽ được xác định như vậy trong quá trình đặt phòng.</p>\n<p>Các Gói Chỗ ở/Chuyến bay/Du lịch đủ tiêu chuẩn trên Trang web sẽ được xác định trong khi quý khách đang tìm kiếm/khi quý khách chọn lựa chọn Xe đẩy hàng trên Trang web. Việc thực hiện các đơn đặt chỗ kết hợp hoặc nhiều đơn đặt chỗ có thể mở khóa khoản tiết kiệm cao hơn với giá cạnh tranh của chúng tôi cho các Gói Chỗ ở/Chuyến bay/Du lịch riêng lẻ và khoản tiết kiệm sẽ được xác định sớm nhất có thể trong quá trình đặt phòng là \"Tiết kiệm trọn gói\".</p>\n<p>Trừ khi được xác định, những điều khoản và điều kiện áp dụng cho Xe đẩy hàng là sự bổ sung và kết hợp với các điều khoản sử dụng cho Gói Chỗ ở/Chuyến bay/Du lịch.</p>\n<p>Xin lưu ý rằng giá/mức giá/giá vé của/cho Gói Chỗ ở/Chuyến bay/Du lịch được hiển thị trên Trang web của chúng tôi có thể thay đổi ngay cả đối với Gói Chỗ ở/Chuyến bay/Du lịch cùng loại hoặc tương tự. Sự khác biệt này có thể bao gồm ngày và giờ của đơn đặt chỗ của quý khách, những gì được tính vào tổng giá và các điều khoản và điều kiện mà giá/mức giá/giá vé được đưa ra, đặc biệt liên quan đến các điều khoản và điều kiện hủy và hoàn. Đơn đặt chỗ kết hợp hoặc nhiều đơn đặt chỗ có thể được hoàn thành và thanh toán trong một lần duy nhất đến Trang web và nếu đơn đặt chỗ không được hoàn thành trong quá trình đặt chỗ thì Gói Chỗ ở/Chuyến bay/Du lịch được chọn của quý khách sẽ được lưu tạm thời để bạn hoàn thành việc mua trong một lần sau. Những lựa chọn đã lưu nhưng chưa mua của quý khách sẽ được giải phóng sau một khoảng thời gian và quý khách sẽ cần bắt đầu đặt chỗ lại. Xin lưu ý rằng Gói Chỗ ở/Chuyến bay/Du lịch được chọn từ trước có thể được bán hết hoặc giá thay đổi. Những đơn đặt chỗ bằng Xe đẩy hàng Agoda đều phải được thực hiện bằng tên của quý khách và quý khách phải là người nắm giữ quyền sở hữu Công cụ Thanh toán để thanh toán cho mỗi đơn đặt chỗ bằng Xe đẩy hàng Agoda.</p>\n<p>Nếu quý khách không tiến hành đơn đặt chỗ kết hợp hoặc nhiều đơn đặt chỗ của Gói Chỗ ở/Chuyến bay/Du lịch thì giá của Gói Chỗ ở/Chuyến bay/Du lịch riêng lẻ sẽ được hiển thị.</p>\n<p>Nếu quý khách thực hiện đơn đặt chỗ kết hợp hoặc nhiều đơn đặt chỗ thì các điều khoản và điều kiện của từng Gói Chỗ ở/Chuyến bay/Du lịch sẽ áp dụng cho đơn đặt chỗ đó. Xin lưu ý rằng các điều khoản và điều kiện khác nhau có thể áp dụng ngay cả khi quý khách thực hiện đơn đặt chỗ kết hợp hoặc nhiều đơn đặt chỗ, gồm cả trường hợp quý khách thực hiện nhiều hơn một đơn đặt chỗ cho cùng một Gói Chỗ ở/Chuyến bay/Du lịch.</p>\n<p class=\"fontsmallb\"><strong>7. Quyền Sở Hữu Trí Tuệ - Thông Báo Thương Hiệu</strong></p>\n\n<p>Thương hiệu \"Agoda\", cũng như một số bản chuyển ngữ theo ngôn ngữ địa phương, là nhãn hiệu đã đăng ký của hoặc được cấp phép cho Agoda và/hoặc các công ty thành viên của hãng tại nhiều quốc gia trên thế giới, bao gồm nhưng không giới hạn ở Hoa Kỳ, Liên minh châu Âu (EU) Canada, Singapore, Thái Lan, Nhật Bản, Trung Quốc, Ấn Độ, Malaysia, Úc, Nga, Hàn Quốc, Indonesia, Các tiểu vương quốc Ả Rập thống nhất, Thụy Sĩ, v.v... Các tên sản phẩm và công ty khác được xác định trên Trang web có thể là tên, thương hiệu, tên thương mại, ký hiệu dịch vụ, biểu tượng, biểu trưng hoặc tên gọi độc quyền khác của Agoda, bên nhượng quyền hoặc các công ty liên kết của Agoda hoặc một bên thứ ba. Việc sử dụng trên Trang web bất kỳ tên, tên thương mại, thương hiệu, ký hiệu dịch vụ, biểu tượng, biểu trưng nào hoặc tên gọi hay dấu hiệu độc quyền khác của hoặc thuộc về bất kỳ bên thứ ba nào, và tình trạng sẵn có của các hàng hóa hoặc dịch vụ cụ thể từ bên thứ ba đó thông qua Trang web, không được hiểu là một sự bảo đảm hoặc tài trợ Trang web bởi bất kỳ bên thứ ba nào như vậy, hoặc sự tham gia của bên thứ ba đó trong việc cung cấp hàng hoá, dịch vụ hoặc thông tin thông qua Trang web. Agoda sở hữu bản quyền Trang web. Quý khách không thể sử dụng tài sản trí tuệ Agoda mà chúng tôi chưa đồng ý.</p>\n\n<p>Trang web chứa tài liệu về bản quyền, tên thương mại và các thông tin thuộc quyền sở hữu khác, bao gồm, nhưng không giới hạn ở, văn bản, phần mềm, hình ảnh, đồ họa và có thể trong tương lai bao gồm cả video, đồ họa, âm nhạc và âm thanh. Toàn bộ nội dung của Trang web được bảo vệ bằng luật bản quyền. Chúng tôi, và các bên nhượng quyền của chúng tôi, sở hữu bản quyền và/hoặc quyền cơ sở dữ liệu trong việc lựa chọn, phối hợp, sắp xếp và củng cố các nội dung này, cũng như các nội dung gốc của các nội dung này. Quý khách không thể chỉnh sửa, xuất bản, truyền tải, tham gia vào việc chuyển nhượng hay bán, tạo ra tác phẩm phái sinh, hoặc khai thác bằng bất cứ cách nào, bất kỳ nội dung nào, toàn bộ hoặc từng phần ngoại trừ theo quy định tại các Điều khoản Sử dụng.</p>\n\n<p>Trừ khi có quy định khác, các phần mềm cần thiết cho các dịch vụ của chúng tôi hoặc có sẵn tại Trang web hoặc được Trang web sử dụng và các
