 quyền sở hữu trí tuệ (bao gồm cả các nhãn hiệu thương mại, ký hiệu dịch vụ, biểu tượng, thiết kế, bản quyền, v.v.) trong nội dung và thông tin và tài liệu trên Trang web đều thuộc sở hữu của Agoda, các công ty trực thuộc hoặc liên kết, các bên nhượng quyền, các nhà cung cấp của Agoda (gồm cả Chỗ ở). Agoda không chịu trách nhiệm trả bất kỳ khoản nợ nào đối với các tài liệu có bản quyền do các bên thứ ba cung cấp hoặc bất kỳ hành vi xâm phạm quyền sở hữu trí tuệ nào do các bên thứ ba đó gây ra.</p>\n\n<p>Quý khách chỉ có thể sử dụng thông tin từ Trang web cho chính cá nhân mình sử dụng. Trừ khi có sự cho phép rõ ràng theo luật bản quyền, sẽ không được phép sao chép, phân phối lại, truyền tải lại, xuất bản hoặc khai thác các tài liệu tải về kiếm lời khi chưa có sự cho phép rõ ràng của chúng tôi và của người sở hữu bản quyền. Trong trường hợp được phép sao chép, phân phối lại hoặc xuất bản các tài liệu bản quyền, thì sẽ không được thay đổi hay xóa bỏ đóng góp của tác giả, chú giải thương hiệu hoặc thông báo bản quyền. Quý khách thừa nhận rằng mình không có được bất kỳ quyền sở hữu nào bằng cách tải về các tài liệu bản quyền.</p>\n\n<p>Chúng tôi có thể cung cấp các liên kết siêu văn bản đến các trang web khác do những người khác vận hành. Khi sử dụng một liên kết như vậy, quý khách thừa nhận việc rời khỏi Trang web và tự chịu trách nhiệm khi tiếp tục.</p>\n\n<p class=\"fontsmallb\"><strong>Khiếu Nại Vi Phạm Bản Quyền</strong></p>\n\n<p>Nếu quý khách, một cách thiện chí, tin rằng các tài liệu chúng tôi lưu trữ vi phạm bản quyền của quý khách, thì quý khách hoặc đại diện của quý khách (“người khiếu nại”) có thể gửi cho chúng tôi một thông báo bằng văn bản bao gồm các thông tin sau đây: </p>\n\n<p>1. tên và địa chỉ của người khiếu nại;</p>\n\n<p>2. tên và địa chỉ của người sở hữu bản quyền hoặc người được cấp giấy phép độc quyền (trường hợp người khiếu nại không phải là người sở hữu bản quyền hoặc người được cấp giấy phép độc quyền);</p>\n\n<p>3. địa chỉ nhận thư của người khiếu nại ở Singapore (trường hợp người khiếu nại không phải là cư dân ở Singapore);</p>\n\n<p>4. số điện thoại, số fax (nếu có) và một địa chỉ thư điện tử để có thể liên lạc được với người khiếu nại;</p>\n\n<p>5. đầy đủ chi tiết để chúng tôi có thể nhận diện được tác phẩm được cho là đã bị vi phạm bản quyền;</p>\n\n<p>6. đầy đủ chi tiết để chúng tôi có thể nhận diện và định vị được bản sao điện tử bị cáo buộc vi phạm, gồm cả vị trí trực tuyến của bản sao điện tử;</p>\n\n<p>7. một tuyên bố rằng người khiếu nại yêu cầu chúng tôi loại bỏ hoặc vô hiệu hóa truy cập vào bản sao điện tử;</p>\n\n<p>8. một tuyên bố rằng người khiếu nại tin một cách thiện chí rằng bản sao điện tử vi phạm bản quyền tác phẩm được xác định trong đoạn 5 bên trên;</p>\n\n<p>9. một tuyên bố rằng các thông tin trong thông báo là chính xác;</p>\n\n<p>10. một tuyên bố rằng người khiếu nại (a) là chủ sở hữu hoặc người được cấp giấy phép bản quyền độc quyền đối với tác phẩm được xác định trong đoạn 5 bên trên, hoặc (b) được ủy quyền làm việc thay chủ sở hữu hoặc người được cấp giấy phép độc quyền đó; và</p>\n\n<p>11. một tuyên bố rằng người khiếu nại đệ trình các thủ tục tố tụng lên thẩm quyền của tòa án tại Singapore theo các quy định liên quan của Đạo Luật Bản Quyền Singapore.</p>\n\n<p>Thông báo phải có chữ ký của người khiếu nại và được gửi cho chúng tôi bằng bưu phẩm bảo đảm đến địa chỉ được đề cập trong Mục 14, nhờ Phòng Pháp chế chuyển giúp – Khiếu nại Bản quyền.</p>\n\n<p>Chúng tôi sẽ xem xét và gửi tất cả các thông báo tuân thủ các yêu cầu trên đây theo quy định của pháp luật hiện hành.</p>\n\n<p>Chúng tôi đề nghị quý khách nên tham khảo ý kiến cố vấn pháp lý của mình trước khi gửi thông báo. Ngoài ra, hãy lưu ý rằng quý khách có thể bị buộc tội hoặc chịu trách nhiệm bồi thường thiệt hại nếu quý khách đưa ra một khiếu nại sai về vi phạm bản quyền.</p>\n\n<p class=\"fontsmallb\"><strong>8. Bài đánh giá – Thư từ sau này – Quyền đối với Nội Dung Người Dùng - Dịch vụ khác</strong></p>\n\n<p>Bằng việc hoàn thành một đơn đặt phòng, quý khách đồng ý nhận các thông báo xác nhận (thư điện tử và/hoặc tin nhắn), cũng như là một thư mời khách hoàn thành mẫu đánh giá mà chúng tôi gửi ngay cho quý khách sau kỳ nghỉ của quý khách tại Chỗ ở, theo sau đó là một hoặc vài thư nhắc nhở. Không bắt buộc phải hoàn thành. Để cho rõ ràng, các thông báo xác nhận và mời khách đánh giá (thư điện tử, tin nhắn) có tính chất giao dịch và không phải là một phần của thư tiếp thị mà quý khách có thể bỏ đăng ký (xem Chính sách Quyền riêng tư của chúng tôi để biết thêm chi tiết). Đối với các Dịch vụ Hỗ trợ, bên Đối tác cung cấp Dịch vụ Hỗ trợ có thể mời quý khách hoàn thành bài đánh giá liên quan đến Dịch vụ Hỗ trợ được cung cấp. Bài đánh giá đầy đủ của khách hàng Agoda (gồm cả các tệp tin đính kèm, nếu có) có thể được tải lên trang thông tin có liên quan trên Trang web với mục đích duy nhất là thông báo cho các khách hàng (tương lai) về ý kiến của quý khách về (mức) dịch vụ và chất lượng của Chỗ ở. Bằng việc đăng bài đánh giá và gửi kèm các nội dung như hình ảnh, quý khách cho Agoda các quyền đầy đủ, vĩnh viễn, miễn phí, có thể chuyển nhượng và không thể hủy ngang đối với tất cả các nội dung người dùng đã gửi, kể cả tên của quý khách. Agoda giữ quyền dịch, sửa, điều chỉnh, từ chối hoặc loại bỏ các bài đánh giá theo ý của riêng mình. Quý khách xác nhận quý khách sẽ tuân thủ <a href=\"/rewards/hotelreviewguidelines.html?cklg=1\">Nguyên Tắc Đánh Giá Của Khách</a>. Ngoài ra, quý khách tuyên bố và bảo đảm là (i) quý khách sở hữu và kiểm soát toàn bộ các quyền đối với nội dung người dùng mà quý khách đăng hoặc truyền tải, hoặc quý khách có quyền hợp pháp để đăng và truyền tải nội dung người dùng đó cho hoặc qua Trang web; (ii) nội dung đó là chính xác và không sai lệch; và (iii) việc sử dụng và đăng tải hoặc truyền dẫn nội dung đó không vi phạm các Điều khoản Sử dụng hoặc bất kỳ điều lệ và luật hiện hành nào và sẽ không vi phạm bất kỳ quyền nào của hoặc gây ra tổn hại cho bất kỳ người hoặc tổ chức nào. Quý khách cho Agoda thêm quyền khởi kiện bất kỳ người hay tổ chức nào vi phạm các quyền của quý khách hoặc của Agoda đối với nội dung do hành vi vi phạm Điều khoản Sử dụng. Quý khách đồng ý quý khách sẽ một mình chịu trách nhiệm về bất kỳ nội dung người dùng nào quý khách cung cấp hoặc gửi.</p>\n\n<p>Nội dung do người dùng gửi sẽ được coi là không bí mật và Agoda không có nghĩa vụ coi nội dung đó là thông tin sở hữu. Không làm hạn chế quy định nêu trên, Agoda giữ quyền sử dụng nội dung đó nếu xét thấy thích hợp, bao gồm nhưng không giới hạn ở, việc xóa bỏ, chỉnh sửa, sửa đổi, bác bỏ, hoặc từ chối đăng thông tin đó. Agoda không có nghĩa vụ thanh toán cho quý khách cho nội dung mà quý khách gửi hoặc cho quý khách cơ hội để chỉnh sửa, xóa bỏ hoặc sửa đổi nội dung một khi nội dung đó đã được gửi cho Agoda. Agoda sẽ không có nghĩa vụ phải ghi nhận quyền tác giả nội dung cho quý khách, và sẽ không có nghĩa vụ phải thực thi bất kỳ hình thức ghi nhận nào bởi các bên thứ ba. Vui lòng tham khảo các Chính sách Agoda trên Trang web để biết thêm chi tiết. </p>\n\n<p>Nếu xác định rằng quý khách giữ quyền luân lý (gồm cả quyền ghi tên tác giả hoặc tính nguyên vẹn) đối với nội dung thì quý khách xin tuyên bố rằng (a) quý khách không yêu cầu sử dụng bất kỳ thông tin nhận dạng cá nhân nào liên quan tới nội dung, hay bất kỳ sản phẩm phái sinh nào của nội dung hay việc nâng cấp hay cập nhật nội dung; (b) quý khách không phản đối việc Agoda hoặc các bên được cấp giấy phép, kế quyền và nhận chuyển nhượng của Agoda xuất bản, sử dụng, sửa đổi, xóa bỏ và khai thác nội dung; (c) quý khách vĩnh viễn từ bỏ và đồng ý không khiếu nại hoặc đòi bất cứ quyền lợi nào đối với bất kỳ và tất cả các quyền luân lý của một tác giả trong bất kỳ nội dung nào; và (d) quý khách vĩnh viễn miễn trách nhiệm cho Agoda, và các bên được cấp giấy phép, kế quyền và nhận chuyển nhượng của Agoda khỏi bất kỳ khiếu nại nào mà quý khách có thể đưa ra chống lại Agoda vì bất kỳ quyền luân lý nào.</p>\n\n<p class=\"fontsmallb\"><strong>9. Tư vấn về du lịch – Yêu cầu thị thực</strong></p>\n\n<p>Mặc dù hầu hết các chuyến đi đều được hoàn thành mà không có sự cố, việc đi đến một số điểm có thể có nhiều rủi ro hơn các điểm khác. Chúng tôi mong hành khách hãy xem lại các lệnh cấm, cảnh báo, thông báo và các tư vấn về du lịch do chính phủ sở tại ban hành trước khi đặt chuyến đi, đặc biệt là khi đi đến các điểm du lịch quốc tế.</p>\n\n<p>Bằng cách hiển thị các Chỗ ở tại các điểm cụ thể, Agoda không tuyên bố hoặc bảo đảm là việc đi đến các điểm đó được khuyến khích hoặc không có rủi ro và Agoda không bao giờ có thể chịu trách nhiệm bồi thường thiệt hại hoặc tổn thất có thể xảy ra do việc đi đến các điểm đó. Trong bất kỳ trường hợp nào, Agoda cũng không chịu trách nhiệm về bất kỳ sự cố nào xảy ra trong thời gian quý khách ở lại Chỗ ở. Chúng tôi thực sự khuyên quý khách nên kiểm tra các tư vấn về du lịch có liên quan do chính phủ của quý khách ban hành đối với bất kỳ quốc gia nào mà quý khách đang đến thăm và thực hiện các biện pháp phòng ngừa cần thiết. Chúng tôi cũng khuyên quý khách nên có bảo hiểm du lịch cá nhân.</p>\n\n<p>Agoda không thể chịu trách nhiệm về bất kỳ tổn thất nào phát sinh trong trường hợp quý khách không có hộ chiếu, thị thực và các tài liệu cần thiết cho chuyến đi của mình. Chúng tôi khuyên quý khách nên kiểm tra với các đại sứ quán, lãnh sự quán liên quan và/hoặc các phòng thị thực của các nước quý khách muốn tới thăm. Việc lấy bất kỳ giấy tờ đi lại nào là trách nhiệm của quý khách.</p>\n\n<p>Xin lưu ý rằng một số quốc gia có những quy định và điều lệ chặt chẽ về việc nhập khẩu hàng hoặc chất cấm hoặc hạn chế. Đây có thể bao gồm nhưng không nhất thiết phải giới hạn ở rượu, thuốc lá, nước hoa, ma túy, thuốc, sách, phim ảnh, DVD, tài liệu giải trí người lớn, thực phẩm, thực vật, các bộ phận động vật, v.v. Việc kiểm tra lại và tuân thủ các quy định hiện hành là trách nhiệm của quý khách. Việc không tuân thủ có thể bị phạt rất nặng.</p>\n\n<p class=\"fontsmallb\"><strong>10. Khiếu nại</strong></p>\n\n<p>Nếu quý khách có khiếu nại về dịch vụ của Agoda thì quý khách có thể liên hệ với <a href=\"/info/contact-agoda.html\">nhóm Dịch vụ Khách hàng</a> của chúng tôi qua một trong những phương pháp được miêu tả <a href=\"/info/contact-agoda.html\">ở đây</a>. Chúng tôi sẽ cố gắng hết mình để trợ giúp cho quý khách. Xin lưu ý rằng bất kỳ khiếu nại nào về Chỗ ở hoặc Dịch vụ Hỗ trợ (chính sách, tiêu chuẩn, dịch vụ, tiện nghi, trang trí, thức ăn, v.v.) rốt cuộc là vấn đề của Chỗ ở hoặc Đối tác đó. Agoda sẽ phối hợp trực tiếp với Chỗ ở hoặc Đối tác để cố gắng tìm một phương án giải quyết mà cả hai bên cùng chấp nhận nhưng chúng tôi không thể đảm bảo một kết quả như ý. Các khiếu nại về Dịch vụ Hỗ trợ phải tuân thủ các điều khoản và điều kiện của bên Đối tác cung cấp Dịch vụ Hỗ trợ.</p>\n<p dir=\"auto\"><strong><em>Chỉ áp dụng đối với các đơn đặt phòng</em></strong><em>&nbsp;<strong>Goa</strong></em></p>\n<p dir=\"auto\"><em>Để được trợ giúp với các đơn đặt phòng, vui lòng truy cập vào Trung tâm Hỗ trợ của chúng tôi:&nbsp;<a href=\"https://www.agoda.com/info/contact.html\" rel=\"noreferrer\">https://www.agoda.com/info/contact.html</a></em></p>\n<p dir=\"auto\"><em>Đối với các khiếu nại, quý khách có thể gửi vấn đề cho&nbsp;<a href=\"mailto:grievance.officer@agoda.com\" rel=\"noreferrer\">nhân viên giải quyết bất bình</a> của chúng tôi. Chỉ những bất bình liên quan đến những đơn đặt phòng cho chỗ nghỉ ở Goa đã được thực hiện trên Trang web của chúng tôi sẽ được trả lời.</em></p>\n\n<p class=\"fontsmallb\"><strong>11. Từ Chối Đảm Bảo</strong></p>\n\n<p>TẤT CẢ NỘI DUNG, GỒM CẢ PHẦN MỀM, SẢN PHẨM, DỊCH VỤ, THÔNG TIN, VĂN BẢN VÀ ĐỒ HỌA LIÊN QUAN NẰM TRONG HOẶC CÓ SẴN THÔNG QUA TRANG WEB ĐƯỢC CUNG CẤP CHO QUÝ KHÁCH TRÊN CƠ SỞ \"NGUYÊN TRẠNG\", \"CÓ SẴN\". AGODA KHÔNG ĐƯA RA BẤT CỨ TUYÊN BỐ HAY BẢO ĐẢM NÀO, RÕ RÀNG HAY NGỤ Ý, VỀ HOẠT ĐỘNG CỦA WEBSITE HOẶC THÔNG TIN, NỘI DUNG HOẶC TÀI LIỆU ĐƯỢC ĐƯA VÀO WEBSITE NÀY VÀ ĐƯỢC PHÉP Ở MỨC CAO NHẤT THEO ĐIỀU LUẬT HIỆN HÀNH, AGODA TỪ CHỐI BẤT CỨ TUYÊN BỐ, ĐIỀU KIỆN VÀ BẢO ĐẢM NÀO, RÕ RÀNG HAY NGỤ Ý, BAO GỒM, NHƯNG KHÔNG GIỚI HẠN Ở, CÁC ĐIỀU KIỆN HOẶC BẢO ĐẢM NGỤ Ý VỀ KHẢ NĂNG BÁN ĐƯỢC HAY NỖ LỰC CHUYÊN MÔN THỎA ĐÁNG, NỘI DUNG THÔNG TIN, TIÊU ĐỀ, HOẶC VIỆC KHÔNG XÂM PHẠM QUYỀN CỦA BÊN THỨ BA. AGODA KHÔNG BẢO ĐẢM HOẶC ĐƯA RA BẤT KỲ TUYÊN BỐ NÀO LÀ TRANG WEB SẼ HOẠT ĐỘNG KHÔNG CÓ LỖI HOẶC KHÔNG BỊ GIÁN ĐOẠN, CÁC SAI SÓT SẼ ĐƯỢC KHẮC PHỤC, HOẶC TRANG WEB VÀ/HOẶC CÁC MÁY CHỦ CỦA TRANG WEB SẼ KHÔNG CÓ VIRUS VÀ/HOẶC CÁC PHẦN TỬ GÂY HẠI KHÁC. AGODA KHÔNG BẢO ĐẢM HOẶC ĐƯA RA BẤT KỲ TUYÊN BỐ NÀO VỀ TÍNH PHÙ HỢP, TÍNH SẴN CÓ, ĐỘ CHÍNH XÁC, ĐỘ TIN CẬY, TÍNH ĐẦY ĐỦ, HOẶC TÍNH CHẤT HỢP THỜI CỦA BẤT KỲ TÀI LIỆU NÀO NẰM TRONG TRANG WEB CHO BẤT KỲ MỤC ĐÍCH NÀO, GỒM CẢ PHẦN MỀM, SẢN PHẨM, DỊCH VỤ, THÔNG TIN, VĂN BẢN VÀ ĐỒ HỌA LIÊN QUAN.</p>\n<p>TRỪ KHI AGODA CÓ LỖI VÌ HÀNH VI PHẠM PHÁP CỐ Ý, HOẶC CẨU THẢ, AGODA KHÔNG CHỊU TRÁCH NHIỆM VỀ BẤT CỨ LỖI HỎNG HÓC NÀO DO LỖI MÁY CHỦ GÂY RA, VIỆC TRUYỀN DẪN BỊ SAI HƯỚNG HOẶC BỊ CHUYỂN HƯỚNG, VIỆC KHÔNG KẾT NỐI ĐƯỢC INTERNET, GIÁN ĐOẠN TRONG VIỆC TRUYỀN DẪN HOẶC NHẬN ĐƠN ĐẶT PHÒNG HOẶC, BẤT KỲ VIRUS MÁY TÍNH NÀO HOẶC SAI SÓT KỸ THUẬT KHÁC, DÙ VỀ BẢN CHẤT LÀ DO CON NGƯỜI HAY KỸ THUẬT.</p>\n<p>THEO ĐIỀU LUẬT HIỆN HÀNH CÓ LIÊN QUAN, GIỚI HẠN HOẶC MIỄN TRÁCH NHIỆM NÓI TRÊN CÓ THỂ KHÔNG ĐƯỢC PHÉP. TRONG TRƯỜNG HỢP NHƯ VẬY, AGODA SẼ CHỊU TRÁCH NHIỆM PHÁP LÝ THEO PHẠM VI NÊU RA TRONG CÁC LUẬT CÓ LIÊN QUAN.</p>\n<p class=\"fontsmallb\"><strong>12. Giới Hạn Chung về Trách Nhiệm</strong></p>\n\n<p>TRONG PHẠM VI MÀ LUẬT CHO PHÉP, TRONG MỌI TRƯỜNG HỢP, AGODA VÀ CÁC CÔNG TY LIÊN QUAN, GỒM CẢ CÁC CÁN BỘ, GIÁM ĐỐC, NHÂN VIÊN, ĐẠI DIỆN, CÔNG TY CON, CÔNG TY LIÊN KẾT, NHÀ PHÂN PHỐI, NHÀ CUNG CẤP, BÊN NHƯỢNG QUYỀN, ĐẠI LÝ HOẶC CÁC ĐƠN VỊ KHÁC CỦA MÌNH THAM GIA VÀO VIỆC TẠO LẬP, TÀI TRỢ, QUẢNG BÁ, HOẶC CUNG CẤP TRANG WEB VÀ NỘI DUNG CỦA TRANG WEB (GỌI CHUNG LÀ \"CÁC BÊN ĐƯỢC BẢO ĐẢM\"), KHÔNG PHẢI CHỊU TRÁCH NHIỆM VỚI BẤT KỲ NGƯỜI HOẶC CƠ QUAN NÀO ĐỐI VỚI BẤT CỨ THIỆT HẠI TRỰC TIẾP, GIÁN TIẾP, NGẪU NHIÊN, ĐẶC BIỆT, ĐIỂN HÌNH, BỒI THƯỜNG, HẬU QUẢ HAY TRỪNG PHẠT NÀO HOẶC BẤT CỨ THIỆT HẠI HAY TỔN THẤT NÀO, BAO GỒM NHƯNG KHÔNG GIỚI HẠN Ở (NẾU PHÙ HỢP, GÂY RA BỞI): (I) TỔN THẤT KINH DOANH, TỔN THẤT LỢI NHUẬN, THẤT THOÁT DOANH THU, MẤT HỢP ĐỒNG, TỔN THẤT HOẶC TỔN HẠI ĐẾN UY TÍN HOẶC DANH TIẾNG, BẤT TIỆN, KHÓ CHỊU, PHIỀN MUỘN, TỔN THẤT DO KHIẾU NẠI, GIÁN ĐOẠN KINH DOANH, MẤT DỮ LIỆU HOẶC CÁC TỔN THẤT VÔ HÌNH KHÁC; (II) VIỆC QUÝ KHÁCH KHÔNG THỂ SỬ DỤNG, SỬ DỤNG TRÁI PHÉP, SỰ CHẬM TRỄ, TÌNH TRẠNG HOẠT ĐỘNG HOẶC KHÔNG HOẠT ĐỘNG CỦA TRANG WEB; (III) VIỆC TRUY CẬP TRÁI PHÉP VÀO HOẶC VIỆC LÀM GIẢ MẠO THÔNG TIN CÁ NHÂN HOẶC TRUYỀN DẪN CỦA QUÝ KHÁCH; (IV) VIỆC CUNG CẤP HOẶC KHÔNG CUNG CẤP BẤT KỲ DỊCH VỤ NÀO, KỂ CẢ DỊCH VỤ HAY SẢN PHẨM DO CHỖ Ở CUNG CẤP, VIỆC HỦY BỎ (TỪNG PHẦN) HAY PHÒNG ĐẶT NHIỀU HƠN SỐ PHÒNG; (V) CÁC LỖI HAY SỰ THIẾU CHÍNH XÁC NẰM TRONG TRANG WEB HOẶC BẤT KỲ THÔNG TIN NÀO (BAO GỒM NHƯNG KHÔNG GIỚI HẠN Ở THÔNG TIN (MÔ TẢ) (BAO GỒM GIÁ, TÌNH TRẠNG PHÒNG TRỐNG VÀ ĐÁNH GIÁ SAO) CỦA CHỖ Ở NHƯ ĐƯỢC CUNG CẤP TRÊN TRANG WEB), PHẦN MỀM, SẢN PHẨM, DỊCH VỤ, VÀ ĐỒ HỌA LIÊN QUAN THU ĐƯỢC QUA TRANG WEB; (VI) BẤT KỲ GIAO DỊCH NÀO ĐƯỢC GHI CHÉP THÔNG QUA TRANG WEB; (VII) BẤT KỲ THIỆT HẠI TÀI SẢN NÀO GỒM CẢ THIỆT HẠI CHO MÁY TÍNH HOẶC HỆ THỐNG MÁY TÍNH CỦA QUÝ KHÁCH DO VIRUS HAY CÁC PHẦN TỬ CÓ HẠI KHÁC GÂY RA, TRONG QUÁ TRÌNH HOẶC DO TRUY CẬP HOẶC SỬ DỤNG TRANG WEB HAY BẤT KỲ TRANG WEB NÀO CÓ SIÊU LIÊN KẾT TỪ TRANG WEB; HOẶC (VIII) CÁC THIỆT HẠI KHÁC PHÁT SINH TỪ VIỆC SỬ DỤNG TRANG WEB, TỪ BẤT KỲ VIỆC SỬ DỤNG, TRÌ HOÃN HOẶC KHÔNG THỂ SỬ DỤNG TRANG WEB, HOẶC TỪ BẤT KỲ THÔNG TIN, SẢN PHẨM, HAY DỊCH VỤ NÀO THU ĐƯỢC THÔNG QUA TRANG WEB; HOẶC (IX) BẤT KỲ THƯƠNG TÍCH (CÁ NHÂN), TỬ VONG, THIỆT HẠI TÀI SẢN NÀO, HAY CÁC THIỆT HẠI KHÁC DO CHỖ Ở (NHÂN VIÊN, GIÁM ĐỐC, CÁN BỘ, ĐẠI LÝ, ĐẠI DIỆN HOẶC CÁC CÔNG TY THÀNH VIÊN CỦA CHỖ Ở); (X) BẤT CỨ THIỆT HẠI NÀO DO MỘT SỰ KIỆN BẤT KHẢ KHÁNG GÂY RA. CÁC GIỚI HẠN TRÁCH NHIỆM SẼ ÁP DỤNG BẤT KỂ THỦ TỤC TỐ TỤNG, DÙ LÀ DỰA TRÊN CƠ SỞ HỢP ĐỒNG, NGOÀI HỢP ĐỒNG, SAI LẦM, CẨU THẢ, TRÁCH NHIỆM NGHIÊM NGẶT HOẶC CƠ SỞ KHÁC, NGAY CẢ KHI BÊN ĐƯỢC BẢO ĐẢM ĐÃ ĐƯỢC KHUYẾN CÁO VỀ NGUY CƠ BỊ THIỆT HẠI. </p>\n<p>Một sự kiện bất khả kháng là bất kỳ sự kiện nào ngoài tầm kiểm soát của các Bên được Bảo đảm và có thể bao gồm, nhưng không giới hạn ở, thiên tai, điều kiện thời tiết, hỏa hoạn, sự cố hạt nhân, xung điện từ, hành vi khủng bố, bạo động, chiến tranh, cuộc tấn công đốt phá, nổi dậy, nổi loạn, bất kỳ chiến tranh vũ trang thuộc nào, tranh chấp lao động, đình công bế xưởng, đình công, tình trạng thiếu hụt, hành động hoặc hạn chế của chính phủ, trộm cắp vặt, phá sản, hỏng hóc máy, gián đoán hoặc sập mạng lưới hoặc hệ thống, gián đoạn liên lạc và internet, kiểm dịch, dịch bệnh, đại dịch v.v. Không nhận trách nhiệm cho bất cứ chi phí bổ sung, thiếu sót, chậm trễ, tái định tuyến hoặc hành động của cơ quan chính phủ nào. Không có Bên được Bảo đảm nào sẽ phải chịu trách nhiệm cho bất kỳ vi phạm điều kiện hoặc bảo đảm nào của Chỗ ở, bao gồm, nhưng không giới hạn ở, các điều kiện hoặc bảo đảm ngụ ý về mức độ phù hợp với một mục đích cụ thể hoặc khả năng bán được, và bất kỳ Bên được Bảo đảm nào cũng sẽ không phải chịu trách nhiệm cho bất kỳ việc làm sai trái nào khác của Chỗ ở (bao gồm mọi thiệt hại do sơ suất), đối với mọi sản phẩm và/hoặc dịch vụ có sẵn thông qua Trang web. Agoda không bảo đảm khả năng truy cập liên tục không bị gián đoạn tới Trang web.</p>\n\n<p>Agoda sẽ chỉ chịu trách nhiệm theo quy định tại các luật có liên quan nếu Agoda có lỗi vì đã tham gia vào hành vi phạm pháp cố ý hoặc hết sức lơ là trong việc cung cấp dịch vụ có liên quan. Trong phạm vi được cho phép theo điều luật hiện hành có liên quan, mà không ảnh hưởng đến các giới hạn được quy định tại các Điều khoản Sử dụng, trách nhiệm pháp lý của Agoda, nhìn chung, sẽ không vượt quá khoản thấp hơn trong những khoản sau: (a) tổng chi phí đặt chỗ của quý khách được quy định trong thư điện tử xác nhận (dù là cho một sự kiện hoặc một loạt các sự kiện có liên quan với nhau) hoặc (b) hai trăm năm mươi đô la Mỹ (hay tương đương bằng đồng tiền địa phương). Trong trường hợp Agoda tính giá quá đắt hoặc tính sai, quý khách có thể khiếu nại liên quan đến tất cả các khoản phí sai lệch bất kể những gì được quy định ở trên.</p>\n<p> Ngoài ra, luật pháp có liên quan có thể không cho phép việc giới hạn hoặc miễn trừ trách nhiệm đã nêu trên. Trong trường hợp như vậy, Agoda sẽ chịu trách nhiệm pháp lý theo phạm vi nêu ra trong các luật có liên quan. Nên gửi khiếu nại càng sớm càng tốt sau khi xảy ra sự kiện hình thành nên khiếu nại. Khiếu nại được gửi chậm trễ quá đáng có thể được xem là vô hiệu căn cứ theo thời hiệu khởi kiện hiện hành. Chỉ những khiếu nại có thiện ý sẽ được xem xét.</p>\n\n<p class=\"fontsmallb\"><strong>13. Các Quy Định Khác</strong></p>\n\n<p>Agoda không (trực tiếp hoặc gián tiếp, độc lập hoặc kết hợp với bất kỳ bên nào) sở hữu, quản lý, điều hành hoặc kiểm soát các Chỗ ở, hoặc bất kỳ phòng nào trong các Chỗ ở đó về bất cứ phương diện nào. Các Chỗ ở có nghĩa vụ và chịu trách nhiệm cung cấp dịch vụ chỗ ở và tiếp đón những người đã đặt phòng thông qua Trang web như khách của mình.</p>\n\n<p>Quý khách đồng ý bảo đảm, bảo vệ và miễn cho Agoda, các công ty con và chi nhánh khác, và các đối tác của Agoda, các nhà cung cấp dịch vụ thanh toán và các bên thứ ba có áp dụng, khỏi bất kỳ trách nhiệm pháp lý, thiệt hại hay tổn thất nào gồm cả các chi phí và phí luật sư phải chi hay gánh chịu do (i) việc quý khách sử dụng Dịch vụ, (ii) quý khách vi phạm hoặc không tuân thủ bất kỳ luật, hoặc điều khoản nào của Điều khoản Sử dụng này hoặc các quyền của bên thứ ba, (iii) quý khách hành động, không hành động hoặc bỏ qua, hoặc (iv) bất kỳ việc tranh chấp hoặc tố tụng nào do quý khách hành động, không hành động hoặc bỏ qua, (v) nội dung quý khách gửi, đăng, truyền tải, hoặc cung cấp thông qua Rocket Travel hoặc việc quý khách sử dụng Dịch vụ hoặc (vi) việc sử dụng Dịch vụ của bất kỳ người nào sử dụng tài khoản và/hoặc mật khẩu của quý khách. Nếu quý khách sử dụng Trang web thay mặt cho một bên thứ ba (\"Bên thứ ba\"), chẳng hạn như một thành viên trong gia đình hoặc một người đồng hành, thì quý khách chịu trách nhiệm về bất kỳ sai sót nào trong tính chính xác của các thông tin được cung cấp liên quan đến việc sử dụng đó. Ngoài ra, quý khách phải thông báo cho Bên thứ ba về tất cả các điều khoản và điều kiện áp dụng. Mỗi khách hàng sử dụng Trang web thay mặt cho một Bên thứ ba đồng ý bảo đảm và miễn cho từng Công ty Agoda khỏi bị trách nhiệm pháp lý, mất mát, thiệt hại, việc kiện cáo và khiếu nại nào (bao gồm cả chi phí bào chữa), liên quan đến việc Bên thứ ba hoặc người sử dụng không thực hiện bất kỳ nghĩa vụ nào của mình như đã mô tả ở trên.</p>\n<p>Quý khách luôn luôn bị điều lệ và luật địa phương ràng buộc. Có những điều là hợp pháp ở một số quốc gia lại có thể là bất hợp pháp ở những quốc gia khác. Quý khách nên tìm hiểu về các hạn chế áp dụng. Agoda sẽ không chịu trách nhiệm trong trường hợp một Chỗ ở từ chối làm thủ tục cho quý khách hoặc yêu cầu quý khách rời khỏi Chỗ ở vì các lý do pháp lý hoặc theo quy định.</p>\n<p>Để thuận tiện cho quý khách, Trang web và các Điều khoản Sử dụng hiện có một số ngôn ngữ và phiên bản địa phương (được xác định bằng các tên miền cấp cao khác nhau trong một số trường hợp), nhưng ban đầu đã được soạn thảo bằng tiếng Anh. Trong trường hợp có sự mâu thuẫn giữa phiên bản tiếng Anh và một phiên bản dịch thì phiên bản tiếng Anh của các Điều khoản Sử dụng sẽ được áp dụng.</p>\n\n<p>Điều khoản Sử dụng sẽ được coi là riêng rẽ. Trong trường hợp có bất kỳ điều khoản nào được xác định là không có hiệu lực thi hành hoặc không hợp lệ, điều khoản đó vẫn sẽ được thi hành trong phạm vi tối đa được phép theo quy định của pháp luật hiện hành và việc xác định đó sẽ không ảnh hưởng đến giá trị hiệu lực và hiệu lực thi hành của bất kỳ điều khoản còn lại nào khác. Các quy định được tách ra sẽ được thay thế bởi một điều khoản gần nhất có thể với diễn đạt và ý định ban đầu.</p>\n\n<p>Agoda giữ quyền, theo ý của riêng mình, trong phạm vi cho phép của pháp luật có liên quan, tạm thời hoặc vĩnh viễn sửa đổi, tạm ngừng, hoặc chấm dứt Trang web và/hoặc bất kỳ phần nào của Trang web, gồm cả bất kỳ dịch vụ hoặc sản phẩm nào có sẵn thông qua Trang web, và/hoặc việc quý khách sử dụng Trang web, hoặc bất cứ phần nào của việc sử dụng đó. Trong trường hợp chấm dứt Trang web, các đơn đặt phòng đã thực hiện qua Agoda sẽ vẫn được công nhận trừ khi quý khách nhận được thông báo. Quý khách sẽ vẫn bị ràng buộc bởi các nghĩa vụ của quý khách theo các Điều khoản Sử dụng, bao gồm cả các đảm bảo do quý khách đưa ra, và theo các nội dung khước từ và giới hạn trách nhiệm. Ngoài ra, Agoda sẽ không chịu trách nhiệm với quý khách hoặc bất kỳ bên thứ ba nào về việc chấm dứt quyền truy cập của quý khách vào Trang web. Agoda giữ quyền sửa đổi hoặc hủy bỏ các Điều khoản Sử dụng (hoặc một phần của các Điều khoản Sử dụng) lúc thích hợp. Chỗ ở hoặc Đối tác có quyền thay đổi việc cung cấp của mình và việc này nằm ngoài tầm kiểm soát của Agoda.</p>\n\n<p>Chỉ có biên lai thuế địa phương từ chỗ nghỉ cho các đơn đặt phòng trả tiền tại chỗ nghỉ. Đối với các đơn đặt phòng trả trước (trả cho Agoda), Agoda có thể xuất hóa đơn địa phương cho các đơn đặt phòng ở Singapore vì Agoda đặt trụ sở đăng ký thuế ở Singapore và xuất biên lai Agoda cho các nơi khác.</p>\n<p>Các Điều khoản Sử dụng và việc cung cấp các dịch vụ của chúng tôi sẽ chịu sự điều chỉnh bởi và hướng dẫn theo đúng pháp luật của Singapore mà không tham chiếu đến các quy định về luật xung đột của Singapore, và bất cứ sự bất đồng nào nảy sinh ngoài các Điều khoản Sử dụng và các dịch vụ của Agoda sẽ chỉ được trình lên các tòa án có thẩm quyền tại Singapore. <em>Đạo luật Hợp đồng (Quyền của Bên thứ ba) 2001</em> (Chương 53B) bị loại trừ một cách rõ ràng và sẽ không áp dụng cho các Điều khoản Sử dụng.</p>\n<p>Việc Agoda không thực thi được một quyền không dẫn đến việc từ bỏ quyền đó. Quý khách không được chuyển nhượng hoặc chuyển giao các quyền của mình trừ khi được chúng tôi đồng ý. Chúng tôi giữ quyền tự do chỉ định các Điều khoản Sử dụng và quyền và nghĩa vụ dưới đây. Chúng tôi có thể sửa đổi các Điều khoản Sử dụng tại bất cứ thời điểm nào bằng việc đăng tải một bản thay đổi trên Trang web. Phiên bản mới nhất của các Điều khoản Sử dụng sẽ thay thế tất cả các phiên bản trước đó. Các đơn đặt phòng của quý khách sẽ chịu sự chi phối của Điều khoản Sử dụng hiện hành lúc đó tại thời điểm đặt phòng cụ thể của quý khách.</p>\n<p class=\"fontsmallb\"><strong>14. Luật Điều Chỉnh và Tranh Chấp</strong></p>\n<p class=\"fontsmallb\">(A) Các Điều khoản Sử dụng và việc cung cấp các dịch vụ sẽ chịu sự điều chỉnh bởi và hướng dẫn theo đúng pháp luật của Singapore mà không tham chiếu đến các quy định về luật xung đột của Singapore. Bất cứ sự bất đồng nào nảy sinh ngoài các Điều khoản Sử dụng hoặc có quan hệ với các dịch vụ của Agoda đều phải được trình riêng lên tòa án có thẩm quyền ở Singapore. <em>Đạo luật Hợp đồng (Quyền của Bên thứ ba) 2001</em> (Chương 53B) bị loại trừ một cách rõ ràng và sẽ không áp dụng cho các Điều khoản Sử dụng.</p>\n<p><u>(B)</u><strong><u> Chỉ dành cho khách hàng Hoa Kì:</u></strong>\n<p>Phần này trong Mục 14 chỉ áp dụng cho khách hàng Hoa Kì. Vui lòng đọc mục này một cách kỹ lưỡng. Nó ảnh hưởng đến quyền lợi mà quý khách có thể có. Nó quy định về việc giải quyết hầu hết các tranh chấp bằng trọng tài ràng buộc thay vì xét xử tại tòa và khởi tố tập thể. Điều khoản trọng tài này sẽ tồn tại khi chấm dứt Mục này.</p>\n<p>Quy định này nhằm đưa ra giải thích và ứng dụng rộng nhất cho tất cả các tranh chấp hoặc khiếu nại phát sinh từ hoặc liên quan đến mối quan hệ của quý khách với Agoda, gồm cả việc sử dụng website của chúng tôi, dịch vụ của chúng tôi và bất kỳ tương tác nào khác với chúng tôi. Agoda cam kết làm hài lòng khách hàng. Chúng tôi sẽ cố gắng giải quyết bất kỳ lo ngại hoặc vấn đề nào với các dịch vụ của chúng tôi mà quý khách có thể có. Nếu chúng tôi giải quyết bất thành thì bất kỳ tranh chấp hoặc khiếu nại nào phát sinh từ hoặc liên quan đến Mục này và mối quan hệ của quý khách với Agoda hoặc bất kỳ công ty con, công ty mẹ hoặc công ty liên kết nào (cho dù dựa trên hợp đồng, tra tấn, thời hiệu, lừa đảo, xuyên tạc hoặc bất kỳ học thuyết pháp lý nào khác) sẽ được giải quyết thông qua trọng tài ràng buộc, ngoại trừ việc một trong hai bên có thể gửi đơn kiện cho toà án xử các vụ kiện nợ nhỏ nếu đủ điều kiện để xét xử bởi một tòa án như vậy.</p>\n<p>Bất kể những điều trên, quý khách có thể không tham gia vào điều khoản trọng tài ràng buộc này trong vòng 30 ngày sau khi Mục này có hiệu lực (\"Hạn chót Không tham gia\"). Đây sẽ là ngày sớm nhất trong số (a) ngày quý khách sử dụng website của chúng tôi lần đầu tiên, (b) ngày quý khách sử dụng dịch vụ của chúng tôi lần đầu tiên hoặc (c) ngày quý khách bắt đầu mối quan hệ với chúng tôi. Quý khách có thể không tham gia vào thủ tục trọng tài này bằng cách gửi cho chúng tôi thông báo bằng văn bản bằng bất kỳ cách sau đây:</p>\n<ul>\n  <li>Bằng thư điện tử cho <a href=\"mailto:&quot;arbitration.optout@agoda.com&quot;\">arbitration.optout@agoda.com</a> với dòng tiêu đề: <strong>Terms of Use – US Opt Out Notice</strong>.</li>\n  <li>Qua thư thường hoặc chuyển phát nhanh đến địa chỉ đã đăng ký của chúng tôi tại Legal Department, Agoda Company Pte. Ltd., 30 Cecil Street, Prudential Tower #19-08, Singapore 049712.</li>\n  <li>Sử dụng <a href=\"https://www.agoda.com/info/contact.html\">biểu mẫu dịch vụ khách hàng</a> trực tuyến của chúng tôi tại liên kết này. Sự lựa chọn này được hỗ trợ nếu quý khách đã đặt phòng qua Agoda và có số xác nhận. </li>\n</ul>\n<p>Chúng tôi phải nhận được thông báo không tham gia của quý khách chậm nhất là 3 ngày sau Hạn chót Không tham gia để thông báo có hiệu lực. Quý khách đồng ý rằng quý khách phải theo đuổi bất kỳ khiếu nại nào tại tòa trọng tài hoặc toà án xử các vụ kiện nợ nhỏ nếu chúng tôi không nhận được thông báo không tham gia từ quý khách, hoặc nếu chúng tôi nhận được thông báo không tham gia từ quý khách quá 3 ngày sau Hạn chót Không tham gia. <br/> Đối với tất cả các tranh chấp, cho dù theo đuổi tại tòa trọng tài hay toà án xử các vụ kiện nợ nhỏ, trước hết quý khách phải gửi bản mô tả bằng văn bản về khiếu nại của quý khách cho chúng tôi để cho phép chúng tôi có cơ hội để giải quyết tranh chấp. Quý khách và chúng tôi mỗi bên đồng ý đàm phán khiếu nại của quý khách với ý tốt. Quý khách có thể yêu cầu trọng tài phân xử nếu khiếu nại hoặc tranh chấp của quý khách không thể được giải quyết trong vòng 60 ngày. Quý khách phải gửi cho chúng tôi thông báo bằng văn bản về khiếu nại bằng một trong các cách sau:</p>\n<ul>\n  <li>Bằng thư điện tử cho <a href=\"mailto:&quot;arbitration.optout@agoda.com&quot;\">arbitration.optout@agoda.com</a> với dòng tiêu đề: <strong>Terms of Use – US Dispute Notice</strong>.</li>\n  <li>Qua thư thường hoặc chuyển phát nhanh đến địa chỉ đã đăng ký của chúng tôi tại Legal Department, Agoda Company Pte. Ltd., 30 Cecil Street, Prudential Tower #19-08, Singapore 049712.</li>\n</ul>\n<p>Việc phân xử bất kỳ tranh chấp hoặc khiếu nại nào sẽ được tiến hành theo các quy tắc của Hội trọng tài Hoa Kỳ (\"AAA\"), gồm cả Quy tắc Trọng tài Người tiêu dùng của AAA (nếu có), như được điều chỉnh theo Mục này. Các quy tắc và thông tin AAA về trọng tài và lệ phí được cung cấp trực tuyến tại www.adr.org.&nbsp; Trong phạm vi của bất kỳ sự không nhất quán nào, Mục này sẽ thay thế và chi phối các Quy tắc AAA.</p>\n<p>Quý khách và chúng tôi đồng ý rằng Mục này làm bằng chứng cho một giao dịch trong thương mại liên bang và điều khoản trọng tài này sẽ được diễn giải và thi hành theo Đạo luật Trọng tài Liên bang Hoa Kỳ và luật trọng tài liên bang, và không chịu sự điều chỉnh của luật tiểu bang. Bất kỳ việc phân xử nào cũng sẽ được tổ chức tại một địa điểm thuận tiện hợp lý ở bang quý khách cư trú hoặc một địa điểm khác được thống nhất giữa hai bên. Việc phân xử sẽ được tiến hành bằng tiếng Anh. Trọng tài viên có thể phán quyết bất kỳ biện pháp đền bù nào có sẵn tại tòa án, gồm cả đền bù theo lệnh hoặc giải thích đến mức cần thiết để thu nợ cho quý khách, cũng như đủ khả năng trả tiền đền bù theo lệnh công khai trong trường hợp những yêu cầu bồi thường đó được cho phép và không thể được miễn theo luật hiện hành, và phải theo dõi và thực thi Mục này như cách tòa án làm.</p>\n<p>Bất kỳ việc phân xử nào cũng sẽ được giữ kín, và cả quý khách và chúng tôi đều không thể tiết lộ sự tồn tại, nội dung hoặc kết quả của bất kỳ việc phân xử nào, ngoại trừ có thể theo yêu cầu của pháp luật hoặc cho các mục đích thi hành phán quyết trọng tài. Việc xét xử bất kỳ phán quyết trọng tài nào có thể được đưa vào bất kỳ tòa án nào có thẩm quyền phù hợp.</p>\n<p>Chúng tôi đồng ý rằng chúng tôi sẽ thanh toán tất cả các khoản phí nộp đơn, quản lý và trọng tài ngoài phí nộp đơn ban đầu mà quý khách phải trả để nộp yêu cầu trọng tài ban đầu, và nếu yêu cầu bồi thường của quý khách dưới $1.000 thì chúng tôi sẽ hoàn phí nộp đơn cho quý khách nếu quý khách cung cấp một yêu cầu hoàn trả bằng văn bản. Nếu không, mỗi bên sẽ chịu phí và chi phí luật sư, chuyên gia, nhân chứng tương ứng của mình và chuẩn bị và trình bày bằng chứng tại tòa trọng tài. </p>\n<p>Ngoài những điều trên, quý khách và chúng tôi mỗi bên đều đồng ý rằng mọi thủ tục tố tụng, dù là trọng tài hay tại tòa án, sẽ chỉ được tiến hành trên cơ sở cá nhân chứ không phải trong một vụ khởi tố tập thể, hợp nhất hoặc đại diện, ngoại trừ các vụ khởi tố để đền bù theo lệnh như được mô tả bên dưới. Nếu, trong một vụ khởi tố giữa quý khách và chúng tôi, tòa án hoặc trọng tài xác định rằng việc khước từ khởi tố tập thể này là không thể thực thi được thì Mục trọng tài sẽ không có giá trị đối với quý khách. Nếu quý khách không tham gia điều khoản trọng tài được ghi cụ thể ở trên thì điều khoản khước từ khởi tố tập thể này sẽ không áp dụng cho quý khách. Cả quý khách và bất kỳ khách hàng nào khác đều không thể là đại diện của tập thể, thành viên của tập thể, hoặc tham gia vào vụ kiện tập thể, hợp nhất hoặc đại diện mà không tuân thủ quy trình không tham gia đã nêu trên. Bất kể các Điều khoản Sử dụng ở trên, không có nội dung gì trong Mục này sẽ được hiểu là từ bỏ bất kỳ quyền lợi nào quý khách có theo luật hiện hành để theo đuổi yêu cầu đền bù theo lệnh với mục đích chính và tác động cấm các hành vi trái pháp luật đe dọa thương tích đến công chúng trong tương lai. Mọi đền bù theo lệnh công khai như vậy không bị mất và sẽ lệ thuộc vào trọng tài. Trong phạm vi cho phép của luật áp dụng, mọi việc xác định mức độ đủ điều kiện của yêu cầu mong được đền bù theo lệnh công khai sẽ được trọng tài xét xử và quyết định. Nếu vì bất kỳ lý do nào, yêu cầu bồi thường tiến hành tại tòa án thay vì thông qua trọng tài, thì quý khách và chúng tôi mỗi bên đều từ bỏ mọi quyền lợi đối với phiên xét xử.</p>\n\n<p class=\"fontsmallb\"><strong>15. Về Agoda</strong></p>\n\n<p>Tất cả các dịch vụ đặt chỗ trực tuyến của chúng tôi cung cấp thông qua Trang web đều được cung cấp bởi Công ty TNHH Tư nhân Agoda, là một công ty trách nhiệm hữu hạn tư nhân, được thành lập theo luật của Singapore, có địa chỉ đã đăng ký tại số 30 đường Cecil, tháp Prudential #19-08, Singapore 049712 và được đăng ký với Cơ quan Quản lý Kế toán và Doanh nghiệp Singapore theo số đăng ký công ty 200506877R.</p>\n<p>Hồng Kông</p>\n<p>Đối với đơn đặt phòng có nguồn gốc từ Hồng Kông, dịch vụ liên quan đến hỗ trợ đặt phòng sẽ do Công ty TNHH Quốc tế Agoda (Hồng Kông), một công ty được thành lập theo luật pháp của đặc khu hành chính Hồng Kông, Trung Quốc, có địa chỉ đăng ký tại Flat/RM 2008-2010, 20/F, Tower 6 The Gateway, Harbour City, Kowloon, Hong Kong và được đăng ký với Cơ quan Công nghiệp Du lịch Hồng Kông theo Giấy phép Du lịch số 354673 cung cấp và các giao dịch sẽ được điều chỉnh theo luật pháp của Hồng Kông.</p>\n<p>Đặt phòng của quý khách bắt nguồn từ Hồng Kông nếu chúng tôi xác nhận địa chỉ IP của quý khách là từ Hồng Kông khi quý khách đặt chỗ nghỉ trên trang của chúng tôi. Quý khách hiểu và thừa nhận rằng</p>\n<ol type=\"a\">\n  <li>Theo giới hạn của các giao dịch trực tuyến, địa chỉ IP là tiêu chí hợp lý và chính xác nhất để Agoda xác nhận khách Hồng Kông và </li>\n  <li>Nếu thực tế quý khách đang ở Hồng Kông nhưng vì bất cứ lý do gì, sử dụng VPN (hoặc các công cụ hoặc công nghệ tương tự khác dẫn đến địa chỉ IP được ngụy trang) để kết nối với trang web của chúng tôi và thực hiện đơn đặt phòng chỗ nghỉ từ địa chỉ IP được ngụy trang đó, đơn đặt phòng của quý khách sẽ không được xem là có nguồn gốc từ Hồng Kông và giao dịch đó sẽ không chịu sự điều chỉnh theo luật pháp của Hồng Kông.</li>\n</ol>\n<p>Mọi hoạt động tiếp thị, quảng bá và chiến dịch khác nhắm mục tiêu đến công chúng Hồng Kông, cho dù trên trang web của chúng tôi hoặc thông qua nền tảng bên thứ ba khác, đều được thực hiện bởi, hoặc thay mặt cho Công ty TNHH Quốc tế Agoda (Hồng Kông).</p>\n\n<p>Agoda được một số công ty thành viên hỗ trợ trong việc cung cấp các dịch vụ cho quý khách ở các địa điểm khác nhau liên quan đến việc đặt phòng (“các Công ty Hỗ trợ Khách hàng”). Các dịch vụ đó bao gồm chấp nhận và xử lý thanh toán cho đặt phòng, cung cấp dịch vụ chăm sóc khách hàng, liên lạc với các Chỗ ở và xử lý khiếu nại và hoàn tiền.</p>\n\n<p>Các Công ty Hỗ trợ Khách hàng chỉ cung cấp các dịch vụ liên quan đến đơn đặt phòng của quý khách, nhưng không sở hữu, kiểm soát, làm chủ, quản lý hoặc duy trì website agoda.com (hay bất kỳ website nào khác). Website Agoda.com cư trú tại trụ sở đã đăng ký ở Singapore và không phải ở văn phòng của bất kỳ Công ty Hỗ trợ Khách hàng nào trên toàn thế giới. Các Công ty Hỗ trợ Khách hàng không được uỷ quyền để hành động như nhân viên dịch vụ hoặc quy trình của Agoda, không có bất cứ quyền lực hay thẩm quyền nào để đại diện cho Agoda hoặc để ký kết bất cứ hợp đồng nào nhân danh, hoặc thay mặt cho Agoda. Quý khách cũng sẽ không thể đặt phòng tại hoặc qua bất kỳ văn phòng nào trong số này vì chỉ có thể đặt phòng qua Trang web.</p>\n\n<p>Ngoài ra, Agoda và các công ty liên quan có những công ty con, chi nhánh và văn phòng khác trên thế giới, cung cấp các dịch vụ nhất định không liên quan đến khách hàng và mang vai trò hỗ trợ nội bộ (sau đây gọi là \"Các công ty Hỗ trợ Agoda\"). Các Công ty Hỗ trợ Agoda không có bất cứ quyền lực hay thẩm quyền nào để đưa ra các dịch vụ của chúng tôi, để đại diện cho Agoda hoặc để ký kết bất cứ hợp đồng nào nhân danh, hoặc thay mặt cho Agoda và không được uỷ quyền để hành động như nhân viên dịch vụ hoặc quy trình của Agoda, nếu không được Agoda ủy quyền đích danh. </p>\n\n<p>Agoda và các công ty thành viên (bao gồm tất cả các Công ty Hỗ trợ Khách hàng và tất cả các Công ty Hỗ trợ Agoda) không hoạt động như một đại lý du lịch trừ phi có giải thích khác trên Trang web. Để biết thêm thông tin về các Đối tác có thể cung cấp Dịch vụ Hỗ trợ (chuyến bay, ô tô cho thuê) vui lòng tham khảo các trang web tương ứng của họ.</p>\n\n<p>Đối với tất cả các câu hỏi về agoda.com, các dịch vụ hoặc Trang web, hoặc nếu quý khách muốn gửi hoặc tống đạt bất kỳ tài liệu, thư từ, thông báo hoặc các trao đổi khác liên quan đến agoda.com, Trang web hoặc những thứ khác, thì vui lòng liên hệ trực tiếp với Công ty TNHH Tư nhân Agoda.</p>\n\n<p class=\"fontsmallb\"><strong>16. Cách thức hoạt động</strong></p>\n<a name=\"ranking\"></a>\n<p class=\"fontsmallb\"><strong>Danh sách chỗ ở được xếp hạng và có tài trợ là gì</strong></p>\n<p>Xếp hạng mặc định dựa trên một thuật toán tự động có thể được cập nhật hoặc sửa đổi định kỳ. Xếp hạng này xem xét nhiều yếu tố, bao gồm nhưng không giới hạn các yếu tố sau:</p>\n<ul>\n  <li>Tình trạng phòng trống</li>\n  <li>Chương trình khuyến mại và giá</li>\n\t<li>Lịch sử phổ biến</li>\n\t<li>Tiền kiếm được từ Agoda</li>\n\t<li>Tỉ lệ chuyển đổi (tỉ lệ giữa đơn đặt phòng so với lượt truy cập trang web)</li>\n\t<li>Số lượng đêm phòng bán </li>\n\t<li>Hủy đặt phòng</li>\n\t<li>Chất lượng nội dung</li>\n\t<li>Điểm đánh giá của khách</li>\n\t<li>Xếp hạng sao</li>\n</ul>\n<p>Các đối tác chỗ nghỉ có nhiều cơ hội, chẳng hạn như Chương trình Đối tác Ưu tiên hoặc danh sách được tài trợ (có nghĩa là trả tiền để có vị trí ưu tiên trong kết quả tìm kiếm), để cải thiện khả năng hiển thị của mình trên Trang web. Các chỗ nghỉ như vậy sẽ được đánh dấu rõ ràng và/hoặc chứa tin nhắn bổ sung để ghi nhận sự tham gia của các chỗ nghỉ đó.</p>\n<p class=\"fontsmallb\"><a name=\"mbaph\"></a><strong>Chủ nhà tư nhân và Thương nhân chuyên nghiệp</strong></p>\n<p>Những chủ nhà đã đăng ký làm chủ nhà tư nhân với Agoda là những bên cho thuê một chỗ nghỉ hoặc các chỗ nghỉ của mình cho các mục đích ngoài thương mại, kinh doanh, hoặc nghề nghiệp của mình. Họ không phải là thương nhân chính thức (giống như một chuỗi khách sạn toàn cầu) và do đó có thể không thuộc cùng các quy tắc bảo vệ người tiêu dùng theo luật của EU.</p>\n<p>Các chỗ nghỉ do chủ nhà tư nhân quản lý sẽ hiển thị \"Do chủ nhà tư nhân quản lý\". Trừ khi có thông báo khác, trong trường hợp các chỗ nghỉ được quản lý bởi chủ nhà chuyên nghiệp (thương nhân), sẽ không có thông tin bổ sung nào được hiển thị.</p>\n<ul>\n\t<li><strong>Chủ nhà chuyên nghiệp (thương nhân)</strong>: Bất kỳ bên nào đang cho thuê một chỗ nghỉ hoặc các chỗ nghỉ cho các mục đích liên quan đến ngành nghề kinh doanh chính hoặc nghề nghiệp (ví dụ khi chỗ nghỉ là hoạt động kinh doanh chính hoặc trang thông tin chỗ nghỉ do một công ty quản lý nơi lưu trú quản lý).</li>\n\t<li><strong>Chủ nhà tư nhân (không phải thương nhân)</strong>: Bất kỳ bên nào đang cho thuê một chỗ nghỉ hoặc các chỗ nghỉ cho các mục đích liên quan đến ngành nghề kinh doanh chính hoặc nghề nghiệp (ví dụ khi chỗ nghỉ là hoạt động kinh doanh phụ hoặc khi chỗ nghỉ chỉ được đăng theo mùa/thỉnh thoảng).</li>\n</ul>\n<p class=\"fontsmallb\"><strong>Về Bài đánh giá của chúng tôi</strong></p>\n<p>Chỉ khách được xác thực đã đặt phòng qua Agoda và không hủy đặt phòng của họ mới được Agoda mời gửi bài đánh giá.</p>\n<p>Cho dù tích cực hay tiêu cực, chúng tôi sẽ đăng tải nhanh nhất có thể toàn bộ bài đánh giá sau khi chỉnh sửa để tuân thủ với Nguyên tắc Đánh giá của Khách. Một số bài đánh giá có thể bị cắt bớt tạm thời vì mục đích ngắn gọn nhưng bất kỳ ai trên trang của chúng tôi vẫn có thể xem toàn bộ bài đánh giá. Thỉnh thoảng, bài đánh giá cũng có thể được tóm tắt để ngắn gọn và dễ đọc. Chúng tôi cũng cung cấp tính minh bạch về trạng thái của nội dung đã gửi.</p>\n<p>Từng bài đánh giá sẽ có điểm từ 1 đến 10. Khách có thể cho \"điểm phụ\" riêng ở từng hạng mục quan trọng chẳng hạn như địa điểm, độ sạch sẽ, nhân viên, sự thoải mái, cơ sở vật chất, sự đáng đồng tiền và Wifi miễn phí. Điểm tổng được tính chỉ đơn giản là trung bình của các điểm phụ. Khi một bài đánh giá chỉ được gửi một phần, chúng tôi sẽ bỏ qua dữ liệu của mọi điểm phụ không được cho điểm.</p>\n<p>Để giữ cho điểm đánh giá và nội dung đánh giá có liên quan đến chuyến đi tiếp theo của quý khách, chúng tôi có thể chỉ chấp nhận bài đánh giá được gửi trong vòng 12 tháng kể từ ngày trả phòng và chúng tôi có thể dừng hiển thị bài đánh giá cũ hơn 36 tháng hoặc nếu chỗ nghỉ có thay đổi về chủ sở hữu.</p>\n<p>Chúng tôi cũng có thể hiển thị một số điểm đánh giá từ những trang web du lịch nổi tiếng khác. Chúng tôi sẽ nói rõ khi chúng tôi thực hiện việc này. Ví dụ, bài đánh giá từ Booking.com sẽ hiển thị tại một phần riêng biệt trên trang web của chúng tôi. Chúng tôi không đăng bài đánh giá được tài trợ trong phần đánh giá của chúng tôi.</p>\n<p>Theo mặc định, bài đánh giá có nhận xét được sắp xếp dựa trên sự kết hợp các tiêu chí để hiển thị bài đánh giá liên quan nhất, bao gồm nhưng không hạn chế ngôn ngữ của quý khách, hồ sơ du lịch của quý khách, tính dễ đọc của bài đánh giá, ngày gửi v.v... Còn có các lựa chọn sắp xếp bổ sung như theo ngày, theo điểm đánh giá v.v...</p>\n<p>Nếu chúng tôi tìm thấy bài đánh giá giả, chúng tôi sẽ xóa bài đánh giá đó và nếu cần thiết, thực hiện hành động đối với người chịu trách nhiệm. Ví dụ, nếu có một khiếu nại được đưa ra đối với một bài đánh giá cụ thể, chúng tôi sẽ xem xét bài đánh giá được đề cập và có thể quyết định bài đánh giá đó không phù hợp nếu không đáp ứng nguyên tắc đánh giá của chúng tôi hoặc nếu bài đánh giá đó có vẻ không phải là một bài đánh giá thật.</p>\n<p>Những ý kiến được thể hiện trong phần đóng góp là từ khách hàng và chỗ nghỉ của Agoda và không phải từ Agoda. Agoda không chịu trách nhiệm hoặc trách nhiệm pháp lý đối với mọi bài đánh giá hoặc phản hồi. Agoda là nhà phân phối (không có nghĩa vụ xác minh) và không phải là người xuất bản những nhận xét và phản hồi này.</p>\n<p>Tại Agoda, chúng tôi tin rằng những nhận xét thực tế từ một vài khách hàng, cung cấp một số thông tin tốt nhất để giúp quý khách và những người khác thực hiện đặt phòng trong tương lai. Để đảm bảo mọi đánh giá trên Agoda có liên quan, hữu ích và xác thực, chúng tôi áp dụng những nguyên tắc nghiêm ngặt. Để biết thêm thông tin, vui lòng xem Nguyên tắc Đánh giá của Khách.</p>\n<p class=\"fontsmallb\">\n  <a name=\"right-of-withdrawal\"></a> <strong>Quyền Rút lui</strong>\n</p>\n<p>Thời gian rút lại 14 ngày được quy định theo luật tiêu dùng của Liên minh châu Âu không áp dụng với các đơn đặt phòng được thực hiện qua Agoda. Thay vào đó, khả năng chỉnh sửa và/hoặc hủy đơn đặt phòng sẽ được chi phối bởi quyền hủy và chỉnh sửa được đính kèm trong loại chính sách hủy.</p>\n\n<p class=\"fontsmallb\"><strong>Số khách truy cập</strong></p>\n<p>Theo các nghĩa vụ của Công ty TNHH Tư nhân Agoda (\"\"Agoda\"\") theo Đạo luật Dịch vụ Kỹ thuật số của Liên minh Châu Âu, chúng tôi ước tính rằng, số người nhận trung bình hằng tháng* của dịch vụ Agoda tại Liên minh Châu Âu từ ngày 1 tháng 8 năm 2022 đến ngày 31 tháng 1 năm 2023 là dưới 45 triệu. </p>\n<p>Đây chỉ là con số ước tính và dựa trên dữ liệu hiện được cung cấp cho Agoda vào thời điểm này, và hướng dẫn hạn chế trong Đạo luật Dịch vụ Kỹ thuật số (\"\"DSA\"\"). Số liệu ước tính này được yêu cầu công bố theo DSA và không được sử dụng cho bất kỳ mục đích nào khác. Những phương pháp được sử dụng để ước tính số người nhận trung bình hàng tháng như được định nghĩa trong yêu cầu đầu vào thiết kế và phán đoán quan trọng của DSA, tùy thuộc vào dữ liệu và các hạn chế khác, và vốn dĩ phải chịu các phương sai về thống kê và sự khác biệt. Số liệu ước tính này có thể được sửa đổi giảm hoặc tăng khi Agoda điều chỉnh cách tiếp cận của mình và để đáp lại với việc công bố phương pháp luận của Ủy ban châu Âu.  Theo yêu cầu của DSA, chúng tôi dự kiến sẽ công bố số liệu ước tính mới vào cuối năm 2023. \nVui lòng tham khảo trang web <a href=\"\"https://urldefense.com/v3/__https:/ir.bookingholdings.com/overview/default.aspx__;!!Hj9Y_P0nvg!XtDVS9St2vJz8wIvt6dgfeiE_Jh9bafl4Os-xQoMUMk6lMTtWlwZDQUvl9cxzQOmw-XgkKGmuRnlA0DN3B7SSmt75MbH$\"\" target=\"\"_blank\"\"> Booking Holdings Inc. Investor Relations</a> để biết các thông số chúng tôi cho rằng có liên quan đến hoạt động kinh doanh của Agoda.</p>\n<p>* \"\"người nhận dịch vụ\"\" được định nghĩa theo DSA có nghĩa là \"\"bất kỳ thể nhân hoặc pháp nhân sử dụng dịch vụ trung gian, đặc biệt là cho mục đích tìm kiếm và truy cập thông tin. Điều này yêu cầu phải đếm số người dùng đã được dịch vụ Agoda hiển thị thông tin ngay cả khi người dùng đó không thực hiện giao dịch.</p>\n\n<p class=\"fontsmallb\"><strong>Cần biết thêm chi tiết hoặc có thắc mắc?</strong></p>\n\n<p>Để có thêm thông tin và để tìm hiểu thêm về Agoda, vui lòng tham khảo cả <a href=\"/info/agoda_faq.html\">Câu hỏi thường gặp</a> của chúng tôi trên Trang web.</p>"},{"id":260048,"message":"<p style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;text-align:center;'><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">Điều khoản và Điều kiện: Hopper Hủy bỏ vì bất cứ lý do gì™ cho đơn đặt chỗ chuyến bay&nbsp;</span></strong></p>\n<p style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;'><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">&nbsp;</span></p>\n<p style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;margin-bottom:10.0pt;'><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">Hopper (USA), Inc. và các chi nhánh (\"<strong>Hopper</strong>\") cung cấp Hopper Hủy bỏ vì bất cứ lý do gì™ (Hopper Cancel For Any Reason™) cho</span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">&nbsp;</span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">đơn đặt chỗ chuyến bay&nbsp;</span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">(\"<strong>Hopper CFAR</strong>\") thông qua các Nền tảng bao gồm trang web, trang web dành cho thiết bị di động và ứng dụng dành cho thiết bị di động (gọi chung là \"<strong>Nền tảng</strong>\") thuộc Công ty TNHH Tư nhân Agoda (\"<strong>Agoda</strong>\").&nbsp;</span></p>\n<p style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;margin-bottom:10.0pt;'><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">Hopper CFAR được cung cấp theo và phù hợp với các Điều khoản và Điều kiện quy định dưới đây (\"<strong>Điều khoản dịch vụ CFAR</strong>\"), &nbsp;</span><a href=\"https://www.hopper.com/legal/terms-and-conditions/\"><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:#1155CC;\">Điều khoản dịch vụ&nbsp;</span></a><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">của Hopper áp dụng cho tất cả dịch vụ và ứng dụng của Hopper cũng như &nbsp;</span><a href=\"https://www.hopper.com/legal/privacy-notice/\"><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:#1155CC;\">Chính sách bảo mật</span></a><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\"> của Hopper. Bằng việc mua Hopper CFAR, quý khách đồng ý với Điều khoản Dịch vụ của Hopper CFAR, Điều khoản Dịch vụ và Chính sách Quyền riêng tư.</span></p>\n<p style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;margin-bottom:10.0pt;'><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">Dịch vụ Hopper CFAR do Hopper cung cấp; KHÔNG phải do Agoda cung cấp. Điều khoản Dịch vụ CFAR chỉ áp dụng cho Hopper CFAR, và KHÔNG áp dụng cho việc quý khách sử dụng Nền tảng hoặc bất kỳ dịch vụ nào do Agoda cung cấp.</span></p>\n<p style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;margin-bottom:10.0pt;'><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">Việc quý khách sử dụng các Nền tảng và các dịch vụ của Agoda tùy thuộc vào&nbsp;</span><a href=\"https://www.agoda.com/info/termsofuse.html\"><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:#1155CC;\">Điều khoản Sử dụng</span></a><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">&nbsp;và&nbsp;</span><a href=\"https://www.agoda.com/info/privacy.html\"><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:#1155CC;\">Chính sách Quyền riêng tư</span></a><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\"> của Agoda.</span></p>\n<ol style=\"margin-bottom:0in;margin-top:0in;\" start=\"1\" type=\"1\">\n    <li style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;color:black;margin-bottom:10.0pt;'><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">Cách thức hoạt động</span></strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">. Việc mua Hopper CFAR thông qua Nền tảng cung cấp cho người mua, nhằm đổi lấy phí CFAR, quyền hủy chuyến bay qua Nền tảng và nhận toàn bộ khoản hoàn tiền hoặc hoàn tiền một phần như được mô tả bên dưới. &nbsp;Không yêu cầu cung cấp tài liệu hoặc lý do cho việc hủy bỏ. Sau khi khung thời gian được chỉ định trong Mục 3 của Điều khoản CFAR này đã qua, Hopper CFAR sẽ hết hạn và mọi thay đổi hoặc hủy đơn đặt chỗ của quý khách sẽ tuân theo các điều kiện về giá vé do hãng hàng không áp dụng cho vé của quý khách.&nbsp;</span></li>\n    <li style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;color:black;margin-bottom:10.0pt;'><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:windowtext;\">Phí mua Hopper CFAR&nbsp;</span></strong><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\"></span></strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">. Phí mua Hopper CFAR là phí dịch vụ (\"<strong>Phí CFAR</strong>\").&nbsp;</span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:windowtext;\">Ngoại trừ trường hợp quý khách hủy đặt vé trong vòng 24 giờ sau khi mua,&nbsp;</span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">&nbsp;(\"<strong>Thời hạn hủy vé</strong>\"),&nbsp;</span><span style=\"font-size:15px;font-family:     &quot;Proxima Nova&quot;;color:windowtext;\">phí CFAR luôn không được hoàn lại</span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">&nbsp;, ngay cả khi hãng hàng không của quý khách hủy một hoặc nhiều chuyến bay trong đơn đặt chỗ của quý khách.</span></li>\n    <li style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;color:black;margin-bottom:10.0pt;'><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">Hủy bỏ hợp lệ</span></strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">. Trừ khi được quy định trong Mục 6 và 7, để đủ điều kiện nhận hoàn tiền từ Hopper, quý khách phải hủy đặt chỗ của mình qua Nền tảng, ít nhất 24 giờ trước giờ khởi hành theo lịch trình của chuyến bay đầu tiên trong đơn đặt chỗ mà quý khách đã mua Hopper CFAR.</span></li>\n    <li style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;color:black;margin-bottom:10.0pt;'><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">Hình thức và số tiền hoàn trả</span></strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">. Sau khi hủy hợp lệ đơn đặt chỗ của quý khách trong khung thời gian được chỉ định trong Mục 3 của Điều khoản CFAR này, Hopper sẽ hoàn lại cho quý khách phần trăm chi phí quý khách đã chọn cho chuyến bay đã mua, nhưng không bao gồm bất kỳ dịch vụ bổ sung nào, như được nêu trong lựa chọn Hopper CFAR mà quý khách đã mua. Khoản hoàn trả đó sẽ ở hình thức được mô tả trong Mục 5 của Điều khoản CFAR này. Việc thực hành hợp lệ các lựa chọn CFAR chỉ cho phép quý khách nhận được khoản hoàn tiền được mô tả bên trên trong điều khoản này. Không có chi phí bổ sung nào khác ngoài phần trăm chi phí đi lại bằng đường hàng không được mua thông qua Nền tảng sẽ được hoàn trả (bao gồm, ví dụ như phí CFAR hoặc mọi sản phẩm đã mua khác, chẳng hạn như bảo hiểm du lịch). Số tiền hoàn trả của quý khách dựa trên vé chuyến bay ban đầu của quý khách; và không tính đến bất kỳ thay đổi nào quý khách đã thực hiện đối với đơn đặt chỗ của mình.</span></li>\n    <li style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;color:black;margin-bottom:10.0pt;'><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">Nhận hoàn tiền từ Hopper</span></strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">.&nbsp;</span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:#1D1C1D;\">Hopper sử dụng dịch vụ thanh toán Hyperwallet của PayPal để chuyển khoản thanh toán cho quý khách. Các dịch vụ thanh toán như vậy tùy thuộc vào&nbsp;</span><span style=\"color:windowtext;\"><a href=\"https://pay.hyperwallet.com/hw2web/consumer/page/legalAgreement.xhtml\"><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:#1155CC;\">Điều khoản Dịch vụ và Chính sách Quyền riêng tư của Hyperwallet</span></a></span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">. Các khoản thanh toán số tiền hoàn trả từ Hopper sẽ được xử lý trong vòng mười (10) ngày làm việc. Hyperwallet là dịch vụ được cung cấp bởi bên thứ ba, không liên kết với Hopper hoặc Agoda. Để sử dụng Hyperwallet để nhận tiền hoàn trả, quý khách cần ký kết hợp đồng trực tiếp với Hyperwallet và đồng ý tuân thủ với Điều khoản và Điều kiện hiện hành được liên kết bên trên. Những lựa chọn thanh toán hiện được cung cấp cho quý khách sẽ được chọn theo quyết định riêng của Hyperwallet; và tùy thuộc vào các lựa chọn hiện được cung cấp, quý khách có thể được yêu cầu tạo một tài khoản với Hyperwallet, (nếu chưa có tài khoản) để nhận tiền hoàn trả. Trước khi thanh toán khoản hoàn trả, Hyperwallet có thể được yêu cầu thu thập một số thông tin nhất định từ quý khách để tuân thủ các yêu cầu chống rửa tiền, trừng phạt và các yêu cầu khác. Vì quý khách sẽ ký kết hợp đồng trực tiếp với Hyperwallet, mọi trách nhiệm pháp lý hoặc nghĩa vụ mà Hyperwallet nợ quý khách, liên quan đến việc quý khách sử dụng Hyperwallet sẽ được xác định theo thỏa thuận của quý khách với Hyperwallet, không phải với Agoda hoặc Hopper.</span><span style=\"font-size:13px;font-family:&quot;Proxima Nova&quot;;\">&nbsp;</span></li>\n    <li style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;color:black;margin-bottom:10.0pt;'><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">Miễn trừ</span></strong><span style=\"font-size:15px;font-family:     &quot;Proxima Nova&quot;;color:black;\">. Hopper CFAR không áp dụng, và sẽ hết hạn vào thời điểm xảy ra sớm hơn bất kỳ sự kiện nào sau đây:</span></li>\n</ol>\n<ul>\n    <ul>\n        <li><span style=\"font-family:&quot;Proxima Nova&quot;;font-size:11.0pt;color:black;background:white;\">việc hãng hàng không hủy bất kỳ chuyến bay nào vì bất kỳ lý do gì, kể cả do sự kiện bất khả kháng; &nbsp;</span></li>\n        <li><span style=\"font-family:&quot;Proxima Nova&quot;;font-size:11.0pt;color:black;\">bất kỳ sự hủy bỏ tự nguyện hoặc bất kỳ thay đổi nào do quý khách yêu cầu trực tiếp vào bất kỳ lúc nào với mọi hãng hàng không đối với mọi vé tuân theo Hopper CFAR;&nbsp;</span></li>\n        <li><span style=\"font-family:&quot;Proxima Nova&quot;;font-size:11.0pt;color:black;\">tuyên bố về \"các biện pháp đặc biệt\" hoặc \"khẩn cấp\" tương tự được thực hiện bởi bất kỳ cơ quan chính phủ nào tại thành phố, khu vực hoặc quốc gia điểm đến trong chuyến đi Hopper của quý khách; hoặc việc Bộ Ngoại giao Hoa Kỳ ban hành Cảnh báo An toàn và An ninh hoặc Cảnh báo Thông báo Sức khỏe Du lịch của Trung tâm Kiểm soát Bệnh tật Hoa Kỳ (CDC) cho điểm đến đó; hoặc</span></li>\n        <li><span style=\"font-family:&quot;Proxima Nova&quot;;font-size:11.0pt;color:black;\">chỉ định của Tổ chức Y tế Thế giới (WHO) rằng thành phố, quốc gia hoặc khu vực điểm đến trong chuyến đi Hopper của quý khách có nguy cơ bị lây nhiễm COVID-19.</span></li>\n    </ul>\n</ul>\n<p style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;margin-left:.5in;text-align:justify;'><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">Trong trường hợp hủy bỏ, hoặc thay đổi, tuyên bố tình trạng khẩn cấp, cảnh báo, thông báo, chỉ định hoặc hành động tương tự khác của chính phủ, Hopper CFAR đã mua của quý khách sẽ hết hạn ngay lập tức và quý khách phải gửi yêu cầu hoàn tiền cho chuyến bay đã mua cho hãng hàng không (thông qua bộ phận Hỗ trợ Khách hàng trên Nền tảng) và sẽ tuân theo các quy định và điều kiện về giá vé và điều kiện của hãng hàng không đối với vé của quý khách. &nbsp;</span></p>\n<p style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;'><span style=\"font-family:&quot;Times New Roman&quot;,serif;\">&nbsp;</span></p>\n<ol style=\"margin-bottom:0in;margin-top:0in;\" start=\"7\" type=\"1\">\n    <li style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;color:black;margin-bottom:10.0pt;text-align:justify;border:none;'><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">Hạn chế khác.&nbsp;</span></strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">Hopper CFAR phải được mua cho tất cả hành khách có chuyến bay trong cùng một đơn đặt chỗ và cho tất cả các chặng hoặc chặng của đơn đặt chỗ đó. Việc thực hiện Hopper CFAR của quý khách cho bất kỳ chuyến bay nào trong đơn đặt chỗ sẽ dẫn đến việc hủy tất cả các chuyến bay đã mua cho tất cả các chặng hoặc chặng bay, bao gồm các chuyến bay đi và về cho tất cả hành khách trong cùng một đơn đặt chỗ. Nếu có nhiều hơn một hành khách trong đơn đặt chỗ, hành khách thực hiện đặt chỗ sẽ xác định cách sử dụng Hopper CFAR; và điều này sẽ áp dụng cho bất kỳ và mọi</span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">&nbsp;hành khách</span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">&nbsp;trong cùng đơn đặt chỗ đó. &nbsp;Hopper CFAR có thể không được cung cấp trên mọi đơn đặt chỗ chuyến bay và Hopper&nbsp;</span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">giữ</span><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">&nbsp;quyền từ chối mua Hopper CFAR cho bất kỳ khách hàng nào vì bất cứ lý do gì. Hopper CFAR chỉ có hiệu lực trong đơn đặt chỗ đã mua Hopper CFAR. Hopper CFAR không được chuyển nhượng và không được chuyển sang bất kỳ đơn đặt chỗ nào trong tương lai.&nbsp;</span></li>\n    <li style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;color:black;margin-bottom:10.0pt;'><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">Thông tin bổ sung</span></strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">. Một số khu vực pháp lý, bao gồm Liên minh Châu Âu, đã thông qua luật và/hoặc quy định yêu cầu các hãng hàng không phải bồi thường cho hành khách trong một số trường hợp hủy chuyến, chậm trễ hoặc gián đoạn khác đối với chuyến bay theo lịch trình (<strong>\"Chế độ Quyền của hành khách</strong>\"). Quý khách có thể có các quyền theo chế độ này và chế độ về Quyền của hành khách ngay cả khi Quý khách không mua Hopper CFAR. Giá trị mà Hopper CFAR cung cấp là cách nhanh chóng và dễ dàng để quý khách được hoàn tiền trong trường hợp quý khách quyết định hủy chuyến bay mà không cần phải thông qua hãng hàng không. Để biết thêm thông tin chi tiết về chính sách hủy hiện tại của quý khách từ hãng hàng không tương ứng, vui lòng truy cập vào trang web của hãng hàng không. Để biết thêm thông tin chi tiết về Chế độ Quyền của hành khách EU, vui lòng tham khảo Quy định của Liên minh Châu Âu (EC) 261/2004.</span></li>\n    <li style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;color:black;margin-bottom:10.0pt;'><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">Không bảo hiểm</span></strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">. Theo các hạn chế và loại trừ được mô tả bên trên, Hopper CFAR cho phép hủy vé máy bay đã mua trên Nền tảng vì bất kỳ lý do gì mà không phải trả thêm phí. Hopper cung cấp Hopper CFAR cho khách hàng của mình để mang lại trải nghiệm liền mạch và linh hoạt hơn. Các Điều khoản CFAR không nhằm mục đích cấu thành một đề nghị bảo hiểm, không cấu thành bảo hiểm hoặc hợp đồng bảo hiểm và không thay thế bảo hiểm mà quý khách có được hoặc có thể có được, chẳng hạn như bảo hiểm du lịch hoặc bảo hiểm có thể nhận được thông qua giao dịch mua được thực hiện với một thẻ tín dụng.</span></li>\n    <li style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;color:black;margin-bottom:10.0pt;text-align:justify;'><strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">Liên hệ</span></strong><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;\">. Nếu quý khách có bất kỳ câu hỏi nào, vui lòng liên hệ với bộ phận Hỗ trợ Khách hàng thông qua Nền tảng.</span></li>\n</ol>\n<p style='margin:0in;font-size:16px;font-family:\"Calibri\",sans-serif;'><span style=\"font-size:15px;font-family:&quot;Proxima Nova&quot;;color:black;\">Phiên bản 1.0. Lần cập nhật mới nhất của Điều khoản: ngày 26<sup></sup> tháng 7 năm 2023</span></p>"},{"id":97117,"message":"Để xem các điều khoản sử dụng Chuyến Bay của chúng tôi, vui lòng bấm vào đây"},{"id":96843,"message":"Hiện tại, chỉ có thể xem các đơn đặt chỗ chuyến bay trên trang web Agoda. Vui lòng đăng nhập trên máy tính để xem đặt chỗ chuyến bay của mình. Chúng tôi xin lỗi về những phiền phức này."},{"id":124948,"message":"Chuyến bay này được Agoda.com Guarantee bảo vệ!"},{"id":124949,"message":"{click_here} để tìm hiểu cách đảm bảo của chúng tôi bảo vệ chuyến đi của quý khách."},{"id":124950,"message":"Bấm vào đây"},{"id":124970,"message":"<div> <div> <p><strong style=\"font-size: 24px\">Agoda.com Guarantee</strong></p><br/> <p>Các Điều khoản và Điều kiện sau chi phối mối quan hệ ràng buộc bằng pháp lý giữa chúng tôi, Công ty TNHH Tư nhân Agoda và các công ty liên quan của chúng tôi (dưới đây gọi là <strong>“Chúng tôi”</strong>, <strong>“của Chúng tôi”</strong><strong></strong>), và quý khách (dưới đây gọi là <strong>“Quý khách”</strong>, <strong>“của Quý khách”</strong>, <strong>“chính Quý khách”</strong>) về Agoda.com Guarantee. </p><br/> <p><strong style=\"font-size: 20px\">Điều A. Agoda.com Guarantee – Gián đoạn Chuyến bay</strong></p> <p>Tùy theo các Điều khoản và Điều kiện này, Agoda.com Guarantee cung cấp sự trợ giúp miễn phí cho Quý khách trong trường hợp sự Gián đoạn Chuyến bay ảnh hưởng đến Chuyến bay của Quý khách.</p><br/> <p><strong>1. Agoda.com Guarantee – Cho hành trình đang tiếp diễn</strong></p> <p>Hành trình đang tiếp diễn – Agoda.com Guarantee chỉ áp dụng với sự Gián đoạn Chuyến bay do Hãng vận tải được chọn tương ứng hoặc Chúng tôi thông báo cho Quý khách ít hơn hoặc bằng 1 tiếng trước khi khởi hành và/hoặc bất cứ lúc nào sau khi khởi hành Chuyến bay đầu tiên bị ảnh hưởng bởi sự Gián đoạn Chuyến bay (dưới đây gọi là <strong>“Trường hợp”</strong>). </p> <p>Nếu biết tin về sự Gián đoạn Chuyến bay thuộc Trường hợp, Quý khách buộc phải thông báo cho Chúng tôi thông qua điện thoại hoặc thư điện tử, không được chậm trễ quá đáng. Nếu Quý khách không thông báo cho Chúng tôi về sự Gián đoạn Chuyến bay (không được chậm trễ quá đáng) thì Quý khách sẽ không được hưởng Agoda.com Guarantee. Nếu Chúng tôi được thông báo về sự Gián đoạn Chuyến bay trước khi Quý khách thông báo cho Chúng tôi thì Chúng tôi sẽ liên lạc với Quý khách trong một thời gian hợp lý sau khi Chúng tôi được thông báo. </p> <p>Sau khi Chúng tôi được thông báo về sự Gián đoạn Chuyến bay thuộc Trường hợp, Quý khách sẽ được đề nghị giải pháp sau:</p> <p>Chúng tôi sẽ tìm kiếm phương tiện vận chuyển thay thế tới Điểm đến và nếu Chúng tôi có thể tìm ra phương tiện vận chuyển thay thế hợp lý thì Chúng tôi sẽ đề nghị Chuyến bay thay thế tới Điểm đến cho Quý khách hoàn toàn do Chúng tôi trả tiền phí tổn. Trong trường hợp Chúng tôi không thể mua Chuyến bay thay thế được đề nghị cho Quý khách trên mạng, sau khi Chúng tôi xác nhận với Quý khách, Quý khách có thể mua vé tương ứng để vận chuyển thay thế tới điểm đến cuối cùng ban đầu của Quý khách, như Chúng tôi và Quý khách đã thỏa thuận. Theo thỏa thuận đó, Chúng tôi sẽ hoàn trả cho Quý khách mức giá đã được đồng ý trước của vé như vậy theo các điều kiện tại Điều B của tài liệu này. Trong trường hợp Chúng tôi không thể tìm ra Chuyến bay thay thế hợp lý thì chúng tôi có thể thỏa thuận với Quý khách về phần góp tương xứng của Chúng tôi vào chi phí liên quan đến phương tiện vận chuyển thay thế như đã thỏa thuận. Phương án này sẽ được xác định và thỏa thuận trong từng trường hợp cụ thể. Xin lưu ý rằng Quý khách luôn luôn buộc phải liên hệ với Chúng tôi và có được xác nhận của Chúng tôi trước khi tự mua vé cho phương tiện di chuyển thay thế, nếu không Quý khách sẽ không được hoàn giá vé dưới đây. Xin lưu ý rằng Chúng tôi sẽ không chi trả bất kỳ dịch vụ phụ thêm hoặc nâng cấp nào đối với vé thay thế đã thỏa thuận.</p> <p>Quý khách buộc phải trả lời Chúng tôi về quyết định của Quý khách ngay sau khi nhận được thông tin về giải pháp được đề nghị từ phía Chúng tôi, nhưng trong mọi trường hợp là trong vòng 24 giờ bắt đầu từ thời điểm theo lịch khởi hành của Chuyến bay đầu tiên trong hành trình của Quý khách. Xin lưu ý rằng lời đề nghị của Chúng tôi có thể thay đổi do tình trạng chỗ có sẵn của các giải pháp được đề nghị. Sau khoảng 24 giờ kể trên, lời đề nghị hết hạn và Quý khách không còn được hưởng Agoda.com Guarantee trong vấn đề này. </p> <p><strong>2. Liên lạc và thông báo.</strong> Trong trường hợp không có bất kỳ chứng cứ gì ngược lại, mỗi thông báo của Chúng tôi hoặc tin tức truyền đạt khác được gửi đến Quý khách được coi là Quý khách đã nhận được vào ngày và giờ truyền thông báo với xác nhận việc truyền không bị gián đoạn nếu thông báo được gửi thông qua thư điện tử, hoặc vào ngày và giờ mà xác nhận gửi lại bị từ chối sai (chẳng hạn như tình huống thư điện tử được chuyển đến thư mục thư rác hoặc yêu cầu báo là đã nhận được bị từ chối), nhưng bất luận thế nào cũng không muộn hơn 24 giờ sau khi Chúng tôi gửi thông báo bằng cách sử dụng địa chỉ thư điện tử do Quý khách cung cấp. Nếu Quý khách không trả lời thông báo của Chúng tôi đúng với Điều A này thì việc Quý khách đòi hỏi Agoda.com Guarantee sẽ không có hiệu lực.</p> <p><strong>3. Dịch vụ Đặc biệt.</strong> Những dịch vụ được xác định trong đoạn này sẽ có thể áp dụng cho Trường hợp đúng với Agoda.com Guarantee, hoặc trường hợp Chúng tôi chọn để cung cấp những dịch vụ này. Những dịch vụ này có thể được phòng dịch vụ khách hàng của Chúng tôi kích hoạt khi Quý khách liên hệ với họ về sự Gián đoạn Chuyến bay. Việc cung cấp những dịch vụ này là hoàn toàn theo ý muốn của Chúng tôi và sẽ cần được phòng dịch vụ khách hàng của Chúng tôi đồng ý trước và xác nhận, nếu không Quý khách không có quyền yêu sách hợp pháp đối với những dịch vụ đã nêu. Xin lưu ý rằng nếu Chúng tôi nhất trí là sẽ cung cấp những dịch vụ này cho Quý khách, trước tiên Quý khách sẽ cần phải trả tiền cho các dịch vụ này và yêu cầu Chúng tôi hoàn trả bằng cách cung cấp cho Chúng tôi biên lai, chứng minh việc quý khách đã thanh toán cho những dịch vụ như vậy. Tùy theo việc thỏa mãn các điều kiện đã nói ở đây, chúng tôi sẽ trả lại chi phí những dịch vụ mà Quý khách phải chịu trên cơ sở biên lai, lên đến số tiền cụ thể dưới đây:</p> <ol style=\"margin-left: 40px;\" type=\"disc\"> <li>Chỗ ở Qua đêm – Tùy theo các điều kiện nêu ra dưới đây, Chúng tôi sẽ cung cấp chỗ ở cho Quý khách nếu Chuyến bay đã bị hoãn hoặc hủy mà không báo sớm khiến Quý khách lâm vào cảnh khó khăn tại sân bay, bến xe buýt hoặc nhà ga trong đêm, và Chuyến bay thay thế sẽ nối tiếp sau nửa đêm (12h đêm) và Quý khách sẽ cần ở lại sân bay, nhà ga hoặc bến xe buýt trong hơn 8 tiếng. Chúng tôi cũng có thể cung cấp chỗ ở nếu quý khách chấp nhận: (i) Chuyến bay thay thế khởi hành ngày hôm sau do Chúng tôi đề nghị; và (ii) Lời đề nghị đặt phòng khách sạn thay mặt Quý khách do Chúng tôi trả tiền phí tổn.</li> <li>Phương tiện vận chuyển Thay thế – Nếu Chúng tôi không thể đặt Chuyến bay Nối tiếp vì a) tất cả các Chuyến bay hợp lý đã bán hết và/hoặc b) không có sẵn hành trình như vậy trong ngày được nói đến, Chúng tôi có thể xem xét các sân bay, nhà ga hoặc bến xe buýt khác trong khu vực để tìm các phương án Chuyến bay thay thế. Nếu điều này xảy ra, với điều kiện là tất cả các chi phí đã được phòng dịch vụ khách hàng của Chúng tôi đồng ý trước, thì Chúng tôi sẽ đóng góp vào chi phí vận chuyển của Quý khách do Quý khách sắp xếp cho việc trung chuyển của Quý khách giữa các sân bay và/hoặc nhà ga và/hoặc bến xe buýt. Việc trung chuyển có thể bao gồm tàu hỏa, xe buýt, xe khách hoặc taxi và sẽ bao gồm tất cả các hành khách đã đặt chỗ trên cùng một hành trình thông qua Chúng tôi. Giới hạn tối đa cho phương tiện vận chuyển thay thế này sẽ tương đương với €100 (một trăm Euro), bao gồm tất cả các hành khách đã đặt chỗ trên cùng một hành trình thông qua Chúng tôi.</li> <li>Bồi thường Bữa ăn và Đồ uống – Nếu Chuyến bay Nối tiếp bị hoãn hơn 4 tiếng thì Chúng tôi sẽ trả phí đồ ăn thức uống với tổng tương đương €10 (mười Euro) mỗi hành khách đã đặt chỗ trên cùng một hành trình thông qua Chúng tôi.</li> </ol> <p>Những chi phí được đề cập trong đoạn 3(2) – Phương tiện vận chuyển Thay thế – và đoạn 3(3) – Bồi thường Bữa ăn và Đồ uống – ở trên sẽ được Chúng tôi quy đổi theo Tỉ giá Hàng ngày Oanda có thể được tìm thấy tại <a href=\"https://www.oanda.com\" target=\"_blank\">www.oanda.com.</a></p> <p>Nếu bất kỳ giải pháp thay thế nào đã nói trên là do Hãng vận tải được chọn đề nghị thì Chúng tôi được miễn tất cả trách nhiệm bồi thường và/hoặc hoàn tiền thêm cho Quý khách.</p> <p><strong>4. Thời gian xử lý việc đặt chỗ tối thiểu của Chuyến bay Thay thế.</strong> Xin lưu ý rằng tình huống Chúng tôi đặt Chuyến bay thay thế cho Quý khách theo Agoda.com Guarantee, Chúng tôi chỉ có thể sắp xếp Chuyến bay trong tình huống có ít nhất 8 tiếng kể từ lần liên lạc ban đầu của Quý khách với dịch vụ khách hàng của Chúng tôi đến giờ khởi hành Chuyến bay. Nếu chúng tôi cung cấp quyền lựa chọn Chuyến bay thay thế thì Chúng tôi sẽ dốc hết sức mình để sắp xếp việc đặt chỗ này trong thời gian hợp lý ngắn nhất, tuy nhiên, Chúng tôi không thể đặt bất kỳ Chuyến bay thay thế nào khởi hành ít hơn 8 tiếng sau khi lần liên lạc ban đầu của Quý khách với dịch vụ khách hàng của Chúng tôi.</p> <p><strong style=\"font-size: 20px\">Điều B. Agoda.com Guarantee – Hoàn tiền, Ngoại lệ, Hạn chế, Đòi bồi thường </strong></p> <p><strong>1. Chính sách Agoda.com Guarantee.</strong> Agoda.com Guarantee có hiệu lực tùy theo các điều kiện sau:</p> <ol style=\"margin-left: 40px;\" type=\"disc\"> <li>Vé Chuyến bay phải dành cho Chuyến bay mà Chúng tôi đề nghị cho Quý khách. Nếu bất cứ thay đổi nào đối với lịch trình Chuyến bay đã đặt thông qua Chúng tôi được thực hiện mà không có sự trợ giúp của Chúng tôi thì Agoda.com Guarantee sẽ không áp dụng và sẽ không có bất kỳ biện pháp khắc phục nào từ phía Chúng tôi;</li> <li>Chúng tôi phải nhận được yêu cầu của Quý khách về việc đóng góp một phần cho giá vận chuyển thay thế do Quý khách mua và đã được Chúng tôi đồng ý trước, phù hợp với Điều A này, trong vòng 14 ngày kể từ ngày Quý khách tới Điểm đến theo lịch trình Chuyến bay ban đầu;</li> <li>Cùng với yêu cầu đóng góp, Quý khách phải trình cho Chúng tôi (a) bản sao rõ ràng và dễ hiểu của biên lai thanh toán, và (b) vé cho Chuyến bay thay thế, một trong số đó phải có ngày và giờ của Chuyến bay và địa điểm khởi hành và đến và dữ liệu liên quan đến các phương tiện vận chuyển khác (nếu có), thông tin về giá và tên của hành khách. </li> </ol> <p><strong>2. Agoda.com Guarantee – Ngoại lệ.</strong> Nếu xảy ra bất kỳ điều nào sau đây:</p> <ol style=\"margin-left: 40px;\" type=\"disc\"> <li>bất cứ thay đổi nào đối với lịch trình Chuyến bay đã mua do Quý khách thực hiện (không thông qua Chúng tôi); và/hoặc </li> <li>Quý khách thay đổi chi tiết liên lạc với bất kỳ một trong những Hãng vận tải được chọn liên quan đến Đơn đặt chỗ; </li> </ol> <p>Agoda.com Guarantee được mô tả trong Điều A sẽ không áp dụng và Quý khách sẽ không có quyền đòi bồi thường về mặt này. Điều khoản này không ngăn cản Quý khách mua Chuyến bay thay thế miễn là nó phù hợp với Điều khoản và Điều kiện Agoda.com Guarantee. Ngược lại, nếu Quý khách sửa đổi hoặc thay đổi lịch trình Chuyến bay ban đầu trong Đơn đặt chỗ mà không có sự đồng ý trước của phòng dịch vụ khách hàng của Chúng tôi thì Agoda.com Guarantee sẽ không áp dụng cho Quý khách và Chúng tôi sẽ được miễn tất cả trách nhiệm trong trường hợp có bất kỳ vấn đề nào có thể xảy ra trong hành trình tương ứng. </p> <p><strong>3. Hạn chế của Agoda.com Guarantee – Trường hợp bất khả kháng.</strong> Xin thông báo là Agoda.com Guarantee không áp dụng cho các trường hợp Gián đoạn Chuyến bay do các biến cố không thể tránh được ngay cả khi đã thực hiện tất cả các biện pháp hợp lý. Đặc biệt, những hoàn cảnh như vậy có thể xảy ra trong các trường hợp bất ổn chính trị, các điều kiện khí tượng học, các hạn chế và khuyến nghị của chính phủ không hợp với hoạt động của chuyến bay liên quan, các rủi ro về an ninh và sức khỏe, các thiếu sót về an toàn giao thông bất ngờ và các cuộc đình công tác động tới sự vận hành của một công ty hàng không đang vận hành, các hạn chế đáng kể trong vận hành sân bay và/hoặc nhà ga và/hoặc bến xe buýt, cũng như tình trạng phá sản, vỡ nợ hoặc chấm dứt từ 50% tất cả các chuyến bay trở lên của Hãng vận tải được chọn hoặc bất kỳ ảnh hưởng nào khác làm hạn chế hoặc vô hiệu hóa đáng kể khả năng cung cấp dịch vụ của Hãng vận tải được chọn hoặc đang vận hành (dưới đây gọi là <strong>“Trường hợp bất khả kháng”</strong>). Xin lưu ý rằng trong những trường hợp này Chúng tôi sẽ cố gắng hết sức mình để đề nghị Chuyến bay thay thế và/hoặc phương tiện vận chuyển thay thế khác. Tuy nhiên, Chúng tôi không có nghĩa vụ cung cấp cho Quý khách Agoda.com Guarantee hay trang trải các chi phí cho Chuyến bay thay thế và/hoặc phương tiện vận chuyển khác cho Chuyến bay chịu ảnh hưởng của Trường hợp bất khả kháng cũng như Chuyến bay chuyển tiếp khác, nếu không được sử dụng do ảnh hưởng của Trường hợp bất khả kháng. <p> Hạn chế của Agoda.com Guarantee – Chuyến bay và Chuyến bay Nối tiếp được xuất trong một vé máy bay điện tử (PNR).Agoda.com Guarantee của chúng tôi không áp dụng cho một Chuyến bay và/hoặc Chuyến bay Nối tiếp có trong một vé máy bay điện tử (PNR). Hãng vận tải phục vụ những Chuyến bay và Chuyến bay Nối tiếp này hoàn toàn chịu trách nhiệm về tất cả vấn đề có liên quan. Trong những trường hợp này, vui lòng liên hệ trực tiếp với Hãng vận tải được chọn hoặc những hãng hàng không khai thác những Chuyến bay này. Xin lưu ý rằng nếu Quý khách lỡ bất kỳ Chuyến bay nào có Chuyến bay Nối tiếp nằm trong vé máy bay điện tử (PNR) thì vé của Quý khách cho Chuyến bay tiếp theo có thể bị hủy bỏ đúng với chính sách của Hãng vận tải được chọn. Quý khách có trách nhiệm kiểm tra chính sách của từng Hãng vận tải được chọn. Chúng tôi không chịu trách nhiệm về những bất tiện có thể xảy ra. </p> <p><strong>4. Quy trình hoàn tiền và hình thức hoàn tiền.</strong> Nếu Quý khách có quyền nhận bất kỳ khoản đóng góp tài chính nào từ Chúng tôi thì khoản đóng góp đó sẽ được hoàn trả bằng các phương thức sau: </p> <ol style=\"list-style-type: lower-roman; margin-left: 40px;\" type=\"disc\"> <li><u>Đối với khoản hoàn trả liên quan đến Chuyến bay:</u> Phương thức thanh toán giống như phương thức Quý khách đã sử dụng để trả Giá đầy đủ cho Chúng tôi (vd: nếu quý khách đã trả tiền cho Đơn đặt chỗ qua thẻ trả tiền thì khoản hoàn tiền sẽ được trả lại vào tài khoản được liên kết với cùng một thẻ trả tiền của Quý khách. Nếu Quý khách đã trả tiền cho Đơn đặt chỗ của mình bằng nhiều phương thức thanh toán thì tiền sẽ được hoàn trả vào tài khoản được liên kết với cùng các phương thức thanh toán của Quý khách theo tỉ lệ tương ứng với tỉ lệ mà Quý khách đã trả Giá đầy đủ ban đầu; và</li> <li><u>Đối với khoản hoàn trả không liên quan đến Chuyến bay:</u> Tiền sẽ được hoàn trả cho Quý khách bằng chuyển khoản ngân hàng bằng việc ghi có vào tài khoản tiền gửi của Quý khách. Quý khách sẽ nhận được một thư điện tử từ chúng tôi yêu cầu cung cấp chi tiết tài khoản ngân hàng mà quý khách sẽ cần cung cấp cho Chúng tôi. Việc này có thể mất đến 10 ngày làm việc.</li> </ol> <p>Chúng tôi không chịu trách nhiệm liên quan đến việc chuyển tiền tới Quý khách, vì quá trình chuyển tiền và trách nhiệm hoàn tiền chỉ thuộc về những tổ chức tài chính chịu trách nhiệm chuyển giao dịch từ Chúng tôi tới Quý khách. Xin lưu ý rằng Chúng tôi có thể đề nghị cho Quý khách các Dịch vụ Bổ sung bao gồm việc xử lý hủy bỏ tất cả các Chuyến bay trong hành trình của Quý khách và yêu cầu hoàn tiền đối với giá của các Chuyến bay này với Hãng vận tải được chọn do Gián đoạn Chuyến bay (vd: nếu Quý khách quyết định không sử dụng bất kỳ phương án nào nói trên được đề nghị cho Quý khách theo Agoda.com Guarantee). Xin lưu ý rằng giá vé Chuyến bay có các yếu tố khác nhau và không phải tất cả đều có thể hoàn tiền, vì vậy ngay cả khi đáp ứng các yêu cầu của Hãng vận tải được chọn về việc hoàn tiền, số tiền được hoàn trả sẽ không giống với Giá đầy đủ đã trả cho Đơn đặt chỗ. Trong trường hợp Quý khách muốn hủy hoặc đổi Chuyến bay không hoàn tiền và không thay đổi được, và Chuyến bay đó sẽ không được sử dụng, thì Quý khách vẫn có thể yêu cầu hoàn các khoản thuế sân bay nhất định được tính vào giá vé cho Chuyến bay cụ thể. </p> <p><strong style=\"font-size: 20px\">Điều C. Sắp xếp Chuyến bay Nối tiếp</strong></p> <ol style=\"margin-left: 40px;\" type=\"disc\"> <li>Trong một vài trường hợp Chuyến bay có Chuyến bay Nối tiếp, hoặc vận chuyển tới Điểm đến và quay lại, việc vận tải tới Điểm đến được sắp xếp để xuất vé một chiều liên quan cho từng phần của đường bay, tức từng đường bay tới Điểm đến (hoặc trở về từ Điểm đến). Nếu sự thể là như thế thì xin lưu ý rằng: <ol style=\"margin-left: 40px;\" type=\"disc\"> <li>Mỗi Chuyến bay có thể phải theo các quy tắc khác nhau, đặc biệt nếu được khai thác bởi một Hãng vận tải được chọn khác; </li> <li>Khi thay đổi máy bay, xe buýt hoặc tàu hỏa, Quý khách Phải lấy hành lý của mình và đích thân ký gửi hành lý cho Chuyến bay tiếp theo; nếu một Chuyến bay một chiều riêng biệt được sử dụng thay vì một Chuyến bay trung chuyển/quá cảnh, nên chú ý rằng đôi khi Chuyến bay đó được khai thác bởi một Hãng vận tải được chọn khác.</li> </ol> </li> </ol> <p>Một khi Quý khách ở sân bay, nhà ga hoặc bến xe buýt, Chúng tôi không chịu trách nhiệm bảo đảm rằng Quý khách có thể thực hiện Chuyến bay Nối tiếp có liên quan dựa trên tất cả thông tin sẵn có tại sân bay, nhà ga hoặc bến xe buýt về việc thay đổi cổng, nhà ga, thời gian chuyển tiếp đến cổng, v.v. Chúng tôi không chịu trách nhiệm về bất kỳ vấn đề nào phát sinh từ việc lỡ Chuyến bay Nối tiếp và/hoặc đi một chuyến bay không chính xác.</p> <p><strong style=\"font-size: 20px\">Điều D. Định nghĩa và Cách diễn giải</strong></p> <p>Định nghĩa Trừ khi ngữ cảnh có quy định gì trái lại, c
