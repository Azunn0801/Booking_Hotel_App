":226741,"message":"Your booking will be discounted, and a Regional Coupon of JPY {0} will also be provided upon check-in.{1}1.You have checked the terms and conditions of the destination prefecture.2.You will present proof of your residence and identification upon check-in. 3.You will present proof of vaccination or a negative Covid-19 test result at check-in.4.Agoda will automatically cancel your booking in the event that your prefecture of residence or your destination prefecture suspends the campaign.5. If you cancel this booking, any cancellation fee will be calculated based on the price before the discount is applied, which may result in an additional amount."},{"id":226742,"message":"To qualify for this discount and Regional Coupon provided by the Japan Travel Support Campaign, you must agree to the following five points."},{"id":226740,"message":"Vui lòng đọc trước khi tiếp tục sang trang tiếp theo"},{"id":120026,"message":"{0} - {1}"},{"id":120028,"message":"Bên trong trung tâm thành phố"},{"id":102037,"message":"Điểm đánh giá vị trí"},{"id":122854,"message":"Giúp tôi đặt phòng"},{"id":123672,"message":"Đang chuẩn bị cuộc gọi"},{"id":122855,"message":"Sự giúp đỡ sẽ sớm được cung cấp!"},{"id":122856,"message":"Cần giúp đặt phòng ư?"},{"id":122857,"message":"Hãy để lại tên và số điện thoại của quý khách và một nhân viên Agoda trực tuyến sẽ gọi lại để trợ giúp quý khách đặt phòng trong vòng 10 phút!"},{"id":122858,"message":"Tên quý khách muốn được gọi (bằng tiếng Anh)"},{"id":122859,"message":"Số điện thoại của quý khách"},{"id":47746,"message":"Chỉ nhập thông tin bằng ký tự tiếng Anh."},{"id":45874,"message":"Vui lòng nhập tên."},{"id":81481,"message":"Cần điền số điện thoại di động."},{"id":122860,"message":"Gửi"},{"id":122861,"message":"Sự giúp đỡ sẽ sớm được cung cấp!"},{"id":122862,"message":"Yêu cầu của quý khách đã được gửi đi."},{"id":122863,"message":"Một nhân viên dịch vụ sẽ liên lạc lại với quý khách trong vòng 10 phút. Không cần làm gì thêm tại th ện ph&aacute;p an to&agrave;n v&agrave; vệ sinh. C&aacute;c đối t&aacute;c n&agrave;y đ&atilde; x&aacute;c nhận việc tu&acirc;n thủ c&aacute;c biện ph&aacute;p an to&agrave;n v&agrave; vệ sinh cụ thể v&agrave; c&oacute; thể cập nhật danh s&aacute;ch của họ bất cứ l&uacute;c n&agrave;o &ndash; cung cấp cho qu&yacute; kh&aacute;ch th&ocirc;ng tin cập nhật để gi&uacute;p qu&yacute; kh&aacute;ch đưa ra lựa chọn c&oacute; hiểu biết nhất.&nbsp;</p>\n<p>Th&ecirc;m Vệ Sinh kh&ocirc;ng phải l&agrave; một sự đảm bảo từ Agoda rằng mọi chỗ ở đều kh&ocirc;ng c&oacute; rủi ro. Ch&uacute;ng t&ocirc;i dựa v&agrave;o c&aacute;c chỗ nghỉ để khẳng định c&aacute;c biện ph&aacute;p an to&agrave;n v&agrave; tiện nghi của ri&ecirc;ng họ. L&agrave; du kh&aacute;ch, tr&aacute;ch nhiệm của qu&yacute; kh&aacute;ch l&agrave; l&agrave;m theo lời khuy&ecirc;n của ch&iacute;nh phủ, thi h&agrave;nh những biện ph&aacute;p vệ sinh c&aacute; nh&acirc;n, v&agrave; &aacute;p dụng gi&atilde;n c&aacute;ch tiếp x&uacute;c v&agrave; vật l&yacute; trong thời gian qu&yacute; kh&aacute;ch ở lại đ&acirc;y. Agoda lu&ocirc;n lu&ocirc;n khuyến kh&iacute;ch đi lại an to&agrave;n v&agrave; cảnh gi&aacute;c với c&aacute;c điều kiện thay đổi.</p>\n<p>&nbsp;</p>\n<p>C&aacute;c biện ph&aacute;p an to&agrave;n v&agrave; vệ sinh hiện nay được bao gồm trong Th&ecirc;m Vệ Sinh l&agrave;:</p>\n<p>&nbsp;</p>\n<p><strong>C&aacute;c quy định an to&agrave;n</strong></p>\n<ul>\n<li>Khử tr&ugrave;ng th&ecirc;m to&agrave;n bộ khu c&ocirc;ng cộng v&agrave; tất cả c&aacute;c ph&ograve;ng d&agrave;nh cho kh&aacute;ch, ch&uacute; &yacute; đến khu vực thường bị chạm v&agrave;o như n&uacute;t bấm trong thang m&aacute;y, tay vịn, c&ocirc;ng tắc, v.v.</li>\n<li>Thu xếp đ&agrave;o tạo để đảm bảo nh&acirc;n vi&ecirc;n chỗ nghỉ thực hiện đồng bộ với c&aacute;c quy tr&igrave;nh an to&agrave;n v&agrave; vệ sinh.</li>\n<li>Kiểm tra th&acirc;n nhiệt hằng ng&agrave;y cho nh&acirc;n vi&ecirc;n v&agrave; kh&aacute;ch khi v&agrave;o t&ograve;a nh&agrave; hoặc cơ sở</li>\n<li>Cung cấp dịch vụ nhận ph&ograve;ng trực tuyến, tự động, hoặc tự phục vụ để hạn chế tiếp x&uacute;c với con người để tr&aacute;nh l&acirc;y nhiễm ch&eacute;o.</li>\n<li>Lắp đặt l&aacute; chắn bảo vệ trong suốt ở nơi c&ocirc;ng cộng giữa người nọ với người kia trong c&aacute;c giao dịch mặt đối mặt.</li>\n</ul>\n<p><strong>Thiết bị bảo hộ </strong></p>\n<ul>\n<li>Nước rửa tay được đặt trong tất cả c&aacute;c khu c&ocirc;ng cộng của chỗ nghỉ.</li>\n<li>Nh&acirc;n vi&ecirc;n chỗ nghỉ mang đồ che mặt/khẩu trang hoặc c&aacute;c thiết bị bảo hộ kh&aacute;c.</li>\n<li>Khử tr&ugrave;ng thiết bị để loại bỏ, ti&ecirc;u diệt, hoặc khử hoạt t&iacute;nh mọi vi khuẩn, virus, v.v.&nbsp;</li>\n</ul>\n<p><strong>Gi&atilde;n c&aacute;ch tiếp x&uacute;c </strong></p>\n<ul>\n<li>Gi&atilde;n c&aacute;ch vật l&yacute; &iacute;t nhất 1 m&eacute;t ở nơi c&ocirc;ng cộng.</li>\n<li>Bố tr&iacute; lại b&agrave;n v&agrave; chỗ ngồi trong khu vực ăn uống để đảm bảo gi&atilde;n c&aacute;ch tiếp x&uacute;c.</li>\n</ul>\n<p><strong>Sức khỏe v&agrave; y tế</strong></p>\n<ul>\n<li>C&oacute; trang thiết bị d&ugrave;ng để điều trị y học tại chỗ nghỉ.</li>\n</ul>\n<p>&nbsp;</p>\n<p><strong>Điều khoản v&agrave; tuy&ecirc;n bố miễn trừ tr&aacute;ch nhiệm</strong></p>\n<ul>\n<li>Khi qu&yacute; kh&aacute;ch đặt ph&ograve;ng với kh&aacute;ch sạn hoặc chỗ ở (&ldquo;Chỗ nghỉ&rdquo;) c&oacute; nh&atilde;n hiệu hiển thị ngoại vi hoặc c&aacute;c biện ph&aacute;p Th&ecirc;m Vệ Sinh (&ldquo;Th&ecirc;m Vệ Sinh&rdquo;), ch&uacute;ng t&ocirc;i muốn n&oacute;i r&otilde; l&agrave; Chỗ nghỉ đ&atilde; tự chứng nhận rằng họ c&oacute; c&aacute;c cơ sở vật chất v&agrave; biện ph&aacute;p tại Chỗ nghỉ. Như vậy, một m&igrave;nh Chỗ nghỉ x&aacute;c nhận rằng họ c&oacute; c&aacute;c cơ sở vật chất (v&agrave;/hoặc c&aacute;c chứng nhận &aacute;p dụng) v&agrave; họ đang thực hiện c&aacute;c biện ph&aacute;p Th&ecirc;m Vệ Sinh được liệt k&ecirc; li&ecirc;n quan đến độ sạch sẽ, an to&agrave;n v&agrave; vệ sinh tại thời điểm qu&yacute; kh&aacute;ch đặt ph&ograve;ng.</li>\n</ul>\n<ul>\n<li>Thỉnh thoảng Chỗ nghỉ c&oacute; thể cập nhật c&aacute;c biện ph&aacute;p Th&ecirc;m Vệ Sinh được x&aacute;c định l&agrave; c&oacute; sẵn v&agrave; c&oacute; thể chọn kh&ocirc;ng tham gia chương tr&igrave;nh Th&ecirc;m Vệ Sinh n&agrave;y nếu họ kh&ocirc;ng c&ograve;n duy tr&igrave; đầy đủ hoặc một phần c&aacute;c cơ sở vật chất v&agrave;/hoặc biện ph&aacute;p như vậy. Trước khi nhận ph&ograve;ng, qu&yacute; kh&aacute;ch n&ecirc;n kiểm tra lại t&igrave;nh trạng của c&aacute;c biện ph&aacute;p được cung cấp tại Chỗ nghỉ v&igrave; c&aacute;c biện ph&aacute;p n&agrave;y c&oacute; thể thỉnh thoảng thay đổi.</li>\n</ul>\n<ul>\n<li>Nếu qu&yacute; kh&aacute;ch gặp bất kỳ vấn đề n&agrave;o sau khi đ&atilde; nhận ph&ograve;ng th&igrave; qu&yacute; kh&aacute;ch n&ecirc;n li&ecirc;n hệ trực tiếp với Chỗ nghỉ.</li>\n</ul>\n<ul>\n<li>Xin lưu &yacute;, qu&yacute; kh&aacute;ch c&oacute; thể bị từ chối nhận ph&ograve;ng tại Chỗ nghỉ do th&acirc;n nhiệt cao hoặc bệnh truyền nhiễm.</li>\n</ul>\n<ul>\n<li>Agoda muốn l&agrave;m s&aacute;ng tỏ rằng c&aacute;c dịch vụ lưu tr&uacute; bao gồm c&aacute;c biện ph&aacute;p Th&ecirc;m Vệ Sinh do Chỗ nghỉ cung cấp th&ocirc;ng qua nền tảng Agoda sẽ l&agrave; tr&aacute;ch nhiệm ph&aacute;p l&yacute; v&agrave; tr&aacute;ch nhiệm của ri&ecirc;ng Chỗ nghỉ.</li>\n</ul>\n<ul>\n<li>Trừ phi c&oacute; chỉ định kh&aacute;c ở đ&acirc;y, tất cả c&aacute;c điều khoản kh&aacute;c của Điều khoản Sử dụng v&agrave; Ch&iacute;nh s&aacute;ch Quyền ri&ecirc;ng tư của Agoda vẫn được &aacute;p dụng.</li>\n</ul>\n<p>&nbsp;</p>\n</div>"},{"id":117885,"message":"<div class=\"bcard-terms-txt\">\n\t<p>\n\t\tAgoda cho phép chỗ nghỉ tự tuyên bố với khách tiềm năng rằng chỗ nghỉ đã có các tiện nghi, biện pháp, và/hoặc nỗ lực nhất định (gọi chung là “tiện nghi”), bao gồm nhưng không giới hạn ở những tiện nghi có lợi cho môi trường sạch sẽ hơn hoặc vệ sinh hơn tại cơ sở của họ. Những chỗ nghỉ tự tuyên bố các tiện nghi nhất định liên quan đến độ sạch sẽ hoặc vệ sinh cũng có thể chọn hiển thị mác Thêm Vệ Sinh.\n\t</p>\n\t<p>\n\t\t<u>Mác Thêm Vệ Sinh hay bất kỳ thông tin liên quan nào đến tiện nghi được hiển thị trên Agoda đều không phải là sự đảm bảo từ Agoda rằng chỗ ở không có rủi ro hay rủi ro đó đã được kiểm soát ở một mức độ nhất định.</u> Đơn giản là mỗi chỗ nghỉ chủ động tự tuyên bố với khách tiềm năng rằng chỗ nghỉ đã có các tiện nghi nhất định, như được liệt kê trên trang chỗ nghỉ Agoda của họ. Agoda <u>không</u> xác minh hay chứng nhận bản tuyên bố đó. \n\t</p>\n\t<p>\n\t\tLà du khách, quý khách có trách nhiệm làm theo lời khuyên của chính phủ, thi hành những biện pháp vệ sinh cá nhân, và áp dụng giãn cách tiếp xúc và vật lý trong thời gian quý khách ở lại đây. Agoda khuyến khích quý khách tham gia vào việc đi lại an toàn một cách có trách nhiệm và giữ cảnh giác với các điều kiện thay đổi.\n\t</p>\n\t<h4>\n\t\tĐiều khoản Người dùng\n\t</h4>\n\t<ul>\n\t\t<li>\n\t\t\t\tTất cả thông tin được hiển thị trên Agoda về bất kỳ tiện nghi, biện pháp, và/hoặc nỗ lực nào liên quan đến chỗ nghỉ (gọi chung là <b>“tiện nghi”</b>) – bao gồm nhưng không giới hạn ở các tiện nghi liên quan đến độ sạch sẽ và vệ sinh – là thông tin do chỗ nghỉ <u>tự tuyên bố</u>. Quý khách thừa nhận rằng Agoda <u>không</u> xác minh hay chứng nhận bất kỳ bản tự tuyên bố nào như vậy và một mình chỗ nghỉ đang trình bày cho quý khách rằng, tại thời điểm đặt phòng, họ đã có các tiện nghi được hiển thị.\n\t\t</li>\n\t\t<li>\n\t\t\t\tQuý khách thừa nhận rằng mác Thêm Vệ Sinh hay bất kỳ thông tin liên quan nào đến tiện nghi được hiển thị trên Agoda đều không phải là sự đảm bảo từ Agoda rằng chỗ ở không có rủi ro hay rủi ro đó đã được kiểm soát ở một mức độ nhất định.\n\t\t</li>\n\t\t<li>\n\t\t\t\tThỉnh thoảng, chỗ nghỉ có thể thay đổi bản tự tuyên bố của mình về những tiện nghi mà chỗ nghỉ có, và có thể chọn loại bỏ mác Thêm Vệ Sinh. Trước khi nhận phòng, quý khách nên liên hệ trực tiếp với chỗ nghỉ để xác nhận tình trạng của bất kỳ tiện nghi nào tại chỗ nghỉ, vì khả năng cung cấp hoặc triển khai các tiện nghi có thể thỉnh thoảng thay đổi.\n\t\t</li>\n\t\t<li>\n\t\t\t\tNếu quý khách gặp bất kỳ vấn đề nào sau khi nhận phòng thì quý khách nên chuyển tải trực tiếp bất kỳ mối quan tâm nào với chỗ nghỉ.\n\t\t</li>\n\t\t<li>\n\t\t\t\tQuý khách thừa nhận rằng nếu quý khách biểu hiện bất kỳ dấu hiệu nào về thân nhiệt cao hoặc bệnh truyền nhiễm thì chỗ nghỉ có thể ngăn cản quý khách nhận phòng.\n\t\t</li>\n\t\t<li>\n\t\t\t\tQUÝ KHÁCH THỪA NHẬN VÀ ĐỒNG Ý RẰNG RIÊNG CHỖ NGHỈ VÀ CHỦ VÀ BAN QUẢN LÝ CHỖ NGHỈ SẼ CÓ TRÁCH NHIỆM PHÁP LÝ VÀ TRÁCH NHIỆM VỚI QUÝ KHÁCH VỀ MÁC THÊM VỆ SINH, BẤT KỲ DỊCH VỤ NÀO ĐƯỢC CUNG CẤP TẠI CHỖ NGHỈ, HOẶC BẤT KỲ BẢN TUYÊN BỐ HOẶC TRÌNH BÀY NÀO LIÊN QUAN THÊM VÀO ĐÓ. AGODA SẼ KHÔNG CÓ TRÁCH NHIỆM PHÁP LÝ HAY TRÁCH NHIỆM VỚI QUÝ KHÁCH HAY BẤT KỲ BÊN THỨ BA NÀO VỀ MÁC THÊM VỆ SINH, BẤT KỲ DỊCH VỤ NÀO ĐƯỢC CUNG CẤP TẠI CHỖ NGHỈ, HOẶC BẤT KỲ BẢN TUYÊN BỐ HOẶC TRÌNH BÀY NÀO LIÊN QUAN THÊM VÀO ĐÓ.\n\t\t</li>\n\t\t<li>\n\t\t\t\tTrừ phi có chỉ định khác ở đây hoặc được Agoda thông báo, Điều khoản Sử dụng và Chính sách Quyền riêng tư của Agoda vẫn áp dụng cho quý khách. Trong trường hợp có bất kỳ sự mơ hồ nào trong các điều khoản này, sẽ áp dụng theo cách giải thích hợp lý của Agoda. Thỉnh thoảng Agoda có thể sửa đổi các điều khoản này, và bằng cách sử dụng nền tảng đặt phòng của Agoda, quý khách chấp nhận bất kỳ việc sửa đổi nào như vậy.\n\t\t</li>\n\t\t<li>\n\t\t\t\tQuý khách sẽ trình bất kỳ tranh chấp nào liên quan đến các điều khoản này, bất kỳ tiện nghi nào, hoặc mác Thêm Vệ Sinh lên thẩm quyền chuyên thuộc của các tòa án có thẩm quyền ở Singapore, nếu (các) tranh chấp như vậy không thể được giải quyết nhẹ nhàng.\n\t\t</li>\n\t\t<li>\n\t\t\t\tNếu bất cứ phần nào của các điều khoản này được phát hiện là không hợp lệ hoặc không thể thi hành được thì phát hiện như vậy sẽ không ảnh hưởng bất lợi đến phần còn lại của các điều khoản này sẽ không bị ảnh hưởng bất lợi, và phần không hợp lệ hoặc không thể thi hành được sẽ được thay thế bằng một điều khoản mới, hợp lệ và có thể thi hành được, có hiệu lực tương tự ở mức tối đa có thể.\n\t\t</li>\n\t</ul>\n</div>"},{"id":124326,"message":"Thông tin pháp lý"},{"id":124140,"message":"Chỗ nghỉ này do một chủ nhà tư nhân quản lý."},{"id":124141,"message":"Luật của EU liên quan đến chủ nhà chuyên nghiệp có thể không áp dụng ở đây."},{"id":124142,"message":"Những chủ nhà đã đăng ký làm chủ nhà tư nhân với Agoda là những bên cho thuê một chỗ nghỉ hoặc các chỗ nghỉ của mình cho các mục đích ngoài thương mại, kinh doanh, hoặc nghề nghiệp của mình. Họ không phải là thương nhân chính thức (giống như một chuỗi toàn cầu) và do đó có thể không thuộc cùng các quy tắc bảo vệ người tiêu dùng theo luật của EU, nhưng đừng lo lắng. Agoda cung cấp cho quý khách dịch vụ khách hàng giống như với bất kỳ thời gian ở nào. Điều này không có nghĩa là thời gian ở hoặc trải nghiệm của quý khách sẽ khác gì so với việc đặt phòng với một chủ nhà chuyên nghiệp."},{"id":124489,"message":"Thông tin pháp lý"},{"id":130852,"message":"Chính phủ New South Wales đã ban hành {0} bắt buộc áp dụng cho các chỗ ở cho thuê ngắn hạn (“STRA”). Quy tắc ứng xử này bao gồm các quyền và nghĩa vụ của những STRA tiếp khách và những người được phép sử dụng STRA với tư cách là khách, ngoài quá trình khiếu nại."},{"id":130853,"message":"quy tắc ứng xử"},{"id":59781,"message":"Đã Nhận Đặt Phòng"},{"id":59782,"message":"LỆNH ĐẶT PHÒNG CỦA BẠN CHƯA ĐƯỢC HOÀN TẤT."},{"id":59783,"message":"Mã số đặt phòng tham chiếu của bạn là: {1}"},{"id":59784,"message":"<p>Cần thêm thông tin để bảo vệ chủ thẻ.</p><p>Xin tiếp tục sang trang kế tiếp để chúng tôi tiếp tục xử lý lệnh đặt phòng của bạn.</p>"},{"id":223233,"message":"Điểm nổi bật"},{"id":123497,"message":"Điểm nổi bật nhất về chỗ nghỉ"},{"id":123498,"message":"Chỗ nghỉ này đã tự lựa chọn và tự chứng nhận các biện pháp vệ sinh"},{"id":123499,"message":"Trải nghiệm nhận phòng trên cả tu ới hạn COVID-19 nào có thể ảnh hưởng đến kế hoạch du lịch của quý khách. Thông tin này được cập nhật thường xuyên, nên hãy thường xuyên kiểm tra lại!"},{"id":136593,"message":"<u>THÔNG BÁO:</u>"},{"id":136594,"message":"<b>Quan trọng:</b> Các giới hạn đi lại thay đổi liên tục. “Cẩm nang Giới hạn đi lại thế giới” trên đây chỉ cho mục đích thông tin và nội dung của nó được cung cấp bởi một bên thứ ba là Sherpa. Agoda không chịu trách nhiệm về tính chính xác, đầy đủ hoặc cách trình bày của nó. Không nên phụ thuộc hoàn toàn vào công cụ này, và quý khách được khuyến khích xác nhận bất kỳ thông tin nào do Cẩm nang cung cấp với các quy định của địa phương tại điểm đến và điểm về của quý khách. Cả Agoda và Sherpa đều không chịu trách nhiệm về bất kỳ bản dịch thông tin Cẩm nang nào của quý khách hoặc một bên thứ ba.<br><br><b>Các tư vấn và giới hạn đi lại của chính phủ:</b> Với tầm ảnh hưởng toàn cầu liên tục của COVID-19, việc đi lại không cần thiết có thể không được phép hoặc bị giới hạn ở những nơi khác nhau trên thế giới. Do đó, chúng tôi đặc biệt khuyến khích quý khách kiểm tra mọi giới hạn đi lại áp dụng trước khi đặt chỗ ở (hoặc dịch vụ khác liên quan đến du lịch).<br>Bằng cách sử dụng Cẩm nang này, quý khách thừa nhận rằng mình đã đọc Thông báo ở trên này và đồng ý với Điều khoản Sử dụng, Chính sách Quyền riêng tư và Chính sách Cookie của Agoda (các đường liên kết bên dưới).<br>Agoda tiếp tục làm mọi việc có thể để bảo vệ, điều chỉnh và tạo điều kiện thuận lợi cho kế hoạch du lịch của quý khách trong thời đại chưa từng có này."},{"id":141068,"message":"Thông báo:"},{"id":141069,"message":"Quan trọng:"},{"id":141070,"message":"{0} Các giới hạn đi lại thay đổi liên tục. Cẩm nang trên đây chỉ cho mục đích thông tin và nội dung của nó được cung cấp bởi một bên thứ ba là Sherpa. Agoda không chịu trách nhiệm về tính chính xác, đầy đủ hoặc cách trình bày của nó. Quý khách không nên phụ thuộc hoàn toàn vào công cụ này và được khuyến khích xác nhận bất kỳ thông tin nào do Cẩm p cung cấp. Nên đặt chỗ trước đối với một số Tín dụng Trải nghiệm 100 $ và quý khách nên liên hệ trực tiếp khách sạn để biết thêm thông tin và để đặt chỗ được, nếu cần. Nếu quý khách không thể sử dụng Tín dụng Trải nghiệm 100 $ hoặc không sử dụng hoàn toàn thì sẽ không hoàn tiền, và số dư còn lại sẽ bị mất. Các lần ở kề nhau trong vòng 24 giờ tại cùng một khách sạn được coi là một lần ở. Các lợi ích sẽ được trao một lần cho mỗi lần ở. Nếu Tín dụng Trải nghiệm 100 $ và các lợi ích khác không được tiêu dùng trong thời gian ở đủ tiêu chuẩn thì sẽ không hoàn tiền hoặc bồi thường cho quý khách.</p><br/> <p><strong>Nâng Hạng Phòng (thành viên Thẻ Premier<span>®</span> và Thẻ Prestige<span>®</span>)</strong></p> <p>Nâng Hạng Phòng dựa trên tình trạng phòng sẵn có và chỉ những loại phòng khách sạn nhất định mới có thể sẵn sàng để nâng hạng.</p><br/> <p><strong>Bữa sáng Hằng ngày cho Hai người (Mọi thẻ thành viên đủ tiêu chuẩn)</strong></p> <p>Bữa sáng Hằng ngày cho Hai người được bao gồm trong giá phòng và có thể được khách sạn cung cấp trực tiếp hoặc dưới dạng thẻ quà tặng hoặc tín dụng.</p><br/> <p><strong>Miễn phí Wi-Fi (Mọi thẻ thành viên đủ tiêu chuẩn)</strong></p> <p>Miễn phí Wi-Fi được cung cấp, trừ các khách sạn chọn lọc, nơi Wi-Fi được bao gồm như là một phần của phí khu nghỉ dưỡng hằng ngày bắt buộc hoặc không có sẵn. Nếu Wi-Fi và bữa sáng được bao gồm như một tiện nghi tiêu chuẩn của khách sạn thì sẽ không cung cấp thêm tiện nghi hoặc bồi thường cho quý khách.</p><br/> <p><strong>Nhận Phòng/Trả Phòng (Mọi thẻ thành viên đủ tiêu chuẩn)</strong></p> <p>Tiêu chuẩn Nhận Phòng Sớm được quyết định tại thời điểm nhận phòng và lệ thuộc vào khả năng cung cấp.</p> <p>Tiêu chuẩn Trả Phòng Muộn được quyết định tại thời điểm nhận phòng và lệ thuộc vào khả năng cung cấp.</p><br/> <p><strong>Tổng quát</strong></p> <p>Cả Lợi ích của Bộ sưu tập Sang trọng và Lợi ích của Bộ sưu tập Khách sạn đều có thể thay đổi, tùy vào tình trạng phòng sẵn có, và có thể khác nhau tùy theo khách sạn và các lợi ích không thể được quy đổi thành tiền mặt và không được kết hợp với bất kỳ ưu đãi nào khác. Các lợi ích phải được sử dụng trong thời gian ở đã đặt và không thể được sử dụng vào một ngày sau này. Các lợi ích chỉ được cấp khi quý khách đặt thông qua cổng thông tin Citi Travel<span>℠</span> bằng thẻ Citi đủ tiêu chuẩn của mình. Tất cả các đơn đặt phòng Bộ sưu tập Sang trọng và Bộ sưu tập Khách sạn cũng phải theo Điều khoản và Điều kiện Sử dụng của Rocket Travel, Inc. đối với Khách sạn, Ô tô, và Điểm thu hút, ở trên.</p> </div>"},{"id":229775,"message":"Enjoy additional benefits when you select a highlighted rate for one of these collections at this stay."},{"id":229466,"message":"Điều khoản & Điều kiện Bổ sung và Lợi ích của Bộ sưu tập Sang trọng và Bộ sưu tập Khách sạn"},{"id":229469,"message":"Đóng"},{"id":229776,"message":"Xem ưu đãi"},{"id":229773,"message":"LUXURY COLLECTION"},{"id":229774,"message":"HOTEL COLLECTION"},{"id":238412,"message":"Các quyền lợi bổ sung được bao gồm trong mức giá này"},{"id":238413,"message":"$100 hotel credit, or similarly valued benefit"},{"id":238414,"message":"Bữa sáng hàng ngày cho hai người"},{"id":238415,"message":"Nâng hạng phòng, tùy vào tình trạng phòng trống"},{"id":238416,"message":"Miễn phí Wifi"},{"id":238417,"message":"Nhận phòng sớm, nếu có"},{"id":238418,"message":"Trả phòng trễ, đảm bảo đến 16:00"},{"id":237790,"message":"Lợi ích của Bộ sưu tập Sang trọng (thành viên Premier Card® và Prestige Card®):"},{"id":237791,"message":"<div><ul><li>- Tín dụng Trải nghiệm 100 $ (USD)</li><li>- Nâng Hạng Phòng, tùy theo tình trạng phòng sẵn có</li><li>- Bữa sáng Hằng ngày cho Hai người</li><li>- Miễn phí Wi-Fi</li><li>- Nhận Phòng Sớm, tùy theo tình trạng phòng sẵn có</li><li>- Trả Phòng Muộn, tùy theo tình trạng phòng sẵn có</li></ul></div>"},{"id":237792,"message":"Lợi ích của Bộ sưu tập Khách sạn (Mọi thẻ thành viên đủ tiêu chuẩn):"},{"id":237793,"message":"<div><ul><li>- Bữa sáng Hằng ngày cho Hai người</li><li>- {"id":316391,"message":"Cơ sở lưu trú này được quản lý, cấp phép hoặc đại diện bởi một Doanh nghiệp."},{"id":316602,"message":"Xem thông tin chi tiết."},{"id":316605,"message":"Thông tin pháp lý"},{"id":311193,"message":"Chủ nhà chuyên nghiệp"},{"id":316699,"message":"Những chủ nhà đã đăng ký làm chủ nhà chuyên nghiệp là những bên cho thuê một cơ sở lưu trú hoặc các cơ sở lưu trú của mình cho các mục đích liên quan đến kinh doanh hoặc nghề nghiệp chính của mình. Chủ nhà được xem là một chủ nhà chuyên nghiệp chứ không phải là một chủ nhà tư nhân nếu: việc cho thuê cơ sở lưu trú là hoạt động kinh doanh chính của họ; họ đại diện cho công ty quản lý cơ sở lưu trú; họ thu thuế giá trị gia tăng; hoặc họ có tên kinh doanh."},{"id":311195,"message":"Thông tin chi tiết về chủ nhà"},{"id":311196,"message":"Đây là thông tin liên hệ và thông tin đăng ký của chủ nhà. Cơ sở lưu trú có thể có các thông tin chi tiết khác. Chủ nhà này đã cam kết chỉ cung cấp các sản phẩm và dịch vụ tuân thủ luật pháp hiện hành của EU."},{"id":387775,"message":"Cơ sở lưu trú này được quản lý, cấp phép hoặc đại diện bởi một Doanh nghiệp."},{"id":387776,"message":"Một \"Doanh nghiệp\" thường là một bên cung cấp chỗ ở có thể đặt trên nền tảng của chúng tôi như hoạt động kinh doanh chính hoặc là nguồn thu nhập thứ cấp đáng kể của họ; hoặc là một bên đã ký hợp đồng với Agoda.com để mang lại lợi ích cho một nhóm chỗ ở do bên thứ ba độc lập sở hữu hoặc điều hành (chẳng hạn như chuỗi khách sạn hoặc đơn vị quản lý cơ sở lưu trú quản lý danh mục lớn các nhà nghỉ cho thuê). Chỗ ở này hoạt động dưới thương hiệu được sở hữu, cấp phép hoặc đại diện bởi Doanh nghiệp được đề cập bên dưới. Xin lưu ý, chính chỗ ở mà quý khách có thể đặt sẽ chịu trách nhiệm cho kỳ lưu trú của quý khách. Vì vậy, vui lòng kiểm tra xác nhận đặt phòng của quý khách để biết thông tin chi tiết cụ thể của chỗ ở, bao gồm địa chỉ của chỗ ở. Doanh nghiệp này và/hoặc các chi nhánh của họ chứng nhận hoặc đã đạt được chứng nhận rằng chỗ ở này cam k Benefits must be used during the stay booked and may not be used at a later date. Benefits are available only when you book with Citi Travel® using your eligible Citi card. All bookings in the Hotel Collection and The Reserve are also subject to Rocket Travel by Agoda’s Terms and Conditions of Use for Hotels, Cars, and Attractions, above.\n  </p>"},{"id":421479,"message":" <h2>Daily Breakfast for Two (Hotel Collection rates)</h2>\n  <p>\n    Daily Breakfast for Two is included and may be provided directly by the hotel or in the form of a gift card or credit. If breakfast is included as a standard amenity of the hotel, no additional compensation or amenity will be provided to you.\n  </p>\n\n  <h2>Complimentary Wi-Fi (Hotel Collection rates)</h2>\n  <p>\n    Complimentary Wi-Fi is provided, with the exception of select hotels where Wi-Fi is included as part of a mandatory daily resort fee or is not available. If Wi-Fi is included as a standard amenity of the hotel, no additional compensation or amenity will be provided to you.\n  </p>\n\n  <h2>Check-In/Check-Out (Hotel Collection rates)</h2>\n  <p>\n    Early Check-In eligibility is determined at time of check-in and is subject to availability.\n  </p>\n  <p>\n    Late Check-Out eligibility is determined at time of check-in and is subject to availability.\n  </p>\n\n  <h2>General</h2>\n  <p>\n    Hotel Collection Benefits are subject to change, availability, may vary by hotel and benefits cannot be redeemed for cash and may not be combined with any other offers. Benefits must be used during the stay booked and may not be used at a later date. Benefits are available only when you book with Citi Travel® using your eligible Citi card. All bookings in the Hotel Collection and The Reserve are also subject to Rocket Travel by Agoda’s Terms and Conditions of Use for Hotels, Cars, and Attractions, above.\n  </p>"},{"id":421455,"message":"Quyền lợi du lịch và Điều khoản & Điều kiện bổ sung của The Reserve by Citi"},{"id":4214 RW trở lên bằng Naver Pay.\n                </p>\n                <p>\n                                <strong>Thời gian sự kiện:</strong> 13/05/2024 (Thứ Hai) – 31/05/2024 (Thứ Sáu)\n                </p>\n                <p>\n                                <strong>Thông tin chi tiết sự kiện:</strong> Nếu quý khách thanh toán từ 300.000 KRW trở lên bằng Naver Pay trên Agoda trong suốt thời gian diễn ra sự kiện, quý khách sẽ nhận được 3.000 KRW trong điểm Naver Pay (giới hạn một người một lần trong suốt thời gian chương trình và yêu cầu xác thực tên thật)\n                </p>\n                <p>\n                                <strong>Thời gian cập nhật điểm Naver Pay:</strong> Điểm Naver Pay sẽ được cập nhật lên tên người dùng Naver Pay của quý khách theo khung thời gian như sau: <br/>Thứ Tư, 26/06/2024 (cho những trường hợp không bị hủy trước thứ Hai, 24/06/2024)\n                </p>\n                <p>\n                                <strong>Lưu ý:</strong>\n                </p>\n                <ul>\n                                <li>Sự kiện có thể kết thúc sớm hơn mà không thông báo trước theo điều kiện của chúng tôi.</li>\n                                <li>Chương trình khuyến mại này áp dụng cho các giao dịch từ 300.000 KRW trở lên trong suốt thời gian diễn ra chiến dịch và không áp dụng cho các giao dịch cộng dồn.</li>\n                                <li>Quý khách có thể xem điểm Naver Points đã được ghi có vào tài khoản của mình hay chưa bằng cách truy cập vào trình đơn [Naver Pay → Points (Điểm)]</li>\n                                <li>Mọi hành vi tham gia thông qua các phương pháp không phù hợp sẽ bị hủy bỏ và có thể dẫn đến hình phạt pháp lý.</li>\n                                <li>Điểm Naver Pay sẽ được tải lên một lần nhưng có thể thay đổi mà không cần báo trước.</li>\n                                <li>Phiếu giảm giá điện tử/giftishow/gifticons/thẻ quà tặng không đủ điều kiện để nhận điểm.</li>\n                                <li>Nếu quý khách thực hiện đơn mới sau khi hủy và nếu đơn đặt mới đó cũng phù hợp với điều kiện chương trình, quý khách sẽ đủ tiêu chuẩn nhận thưởng.</li>\n                                <li>Tính đủ điều kiện nhận điểm thưởng của quý khách có thể khác nhau tùy thuộc vào thời điểm giao dịch và có thể thay đổi theo điều kiện của chúng tôi.</li>\n                </ul>\n</div>"},{"id":309312,"message":"Nhận 3.000 KRW trong điểm Naver Pay nếu quý khách thanh toán từ 300.000 KRW trở lên bằng Naver Pay."},{"id":309315,"message":"Thời gian sự kiện: 03/06/2024 (Thứ Hai) – 30/06/2024 (Chủ nhật)(một người một lần trong suốt thời gian chương trình và yêu cầu xác thực tên thật)"},{"id":309318,"message":"<div> <p> <strong>Sự kiện:</strong> Nhận 3.000 KRW trong điểm Naver Pay nếu quý khách thanh toán từ 300.000 KRW trở lên bằng Naver Pay. </p> <p> <strong>Thời gian sự kiện:</strong> 03/06/2024 (Thứ Hai) – 30/06/2024 (Chủ nhật) </p> <p> <strong>Thông tin chi tiết sự kiện:</strong> Nếu quý khách thanh toán từ 300.000 KRW trở lên bằng Naver Pay trên Agoda trong suốt thời gian diễn ra sự kiện, quý khách sẽ nhận được 3.000 KRW trong điểm Naver Pay (giới hạn một người một lần trong suốt thời gian chương trình và yêu cầu xác thực tên thật) </p> <p> <strong>Thời gian cập nhật điểm Naver Pay:</strong> Điểm Naver Pay sẽ được cập nhật lên tên người dùng Naver Pay của quý khách theo khung thời gian như sau: <br/>Thứ Ba, 30/07/2024 (cho những trường hợp không bị hủy trước Chủ nhật, 28/07/2024) </p> <p> <strong>Lưu ý:</strong> </p> <ul> <li>Sự kiện có thể kết thúc sớm hơn mà không thông báo trước theo điều kiện của chúng tôi.</li> <li>Chương trình khuyến mại này áp dụng cho các giao dịch từ 300.000 KRW trở lên trong suốt thời gian diễn ra chiến dịch và không áp dụng cho các giao dịch cộng dồn.</li> <li>Quý khách có thể xem điểm Naver Points đã được ghi có vào tài khoản của mình hay chưa bằng cách truy cập vào trình đơn [Naver Pay → Points].</li> <li>Mọi hành vi tham gia thông qua các phương pháp không khách đến quầy làm thủ tục (hoặc nơi gửi hành lý) cho chuyến bay tiếp theo.</p> </li> <li> <p>Đi qua khu vực kiểm tra an ninh và làm thủ tục hải quan để đến cổng của chuyến bay tiếp theo.</p> </li> </ul> </div> </div> <div> <h4>Làm thủ tục cho chuyến bay tiếp theo</h4> <p>Nếu quý khách không có thẻ lên máy bay cho chuyến bay tiếp theo thì quý khách sẽ cần ra khỏi khu vực quá cảnh để làm thủ tục.</p> </div> <div> <h4>Nhập cảnh</h4> <p>Quý khách có thể cần phải rời khỏi khu vực quá cảnh ngay cả khi quý khách không có hành lý ký gửi và quý khách đã làm thủ tục cho chuyến bay tiếp theo. Đôi khi quý khách cần phải đi qua khu vực kiểm soát hộ chiếu và nhập cảnh ngay sau khi đến nơi. Nếu quý khách cần thị thực để nhập cảnh vào một nước, thì quý khách cũng sẽ có thể cần thị thực để quá cảnh qua nước đó.</p> </div> <div> <h4>Di chuyển giữa các nhà ga khác nhau trong sân bay</h4> <p>Tại một số sân bay lớn, quý khách sẽ cần di chuyển đến nhà ga khác. Các nhà ga có thể không được kết nối với nhau.</p> </div>"},{"id":372006,"message":"Không thể hủy"},{"id":372007,"message":"Có thể hủy, tốn phí"},{"id":372008,"message":"Không có phí hủy"},{"id":372011,"message":"Không thể thay đổi"},{"id":372009,"message":"Có thể thay đổi, tốn phí"},{"id":372010,"message":"Không có phí thay đổi"},{"id":372013,"message":"Không có phí hủy và thay đổi"},{"id":372012,"message":"Có thể hủy và thay đổi, tốn phí"},{"id":372014,"message":"Không thể hủy hoặc thay đổi"},{"id":372015,"message":"{0} • {1}"},{"id":371367,"message":"{quantity}x{weight} {unit}"},{"id":371368,"message":"{weight} {unit}"},{"id":371602,"message":"Không có hành lý xách tay miễn phí"},{"id":371603,"message":"Không có hành lý ký gửi miễn phí"},{"id":371604,"message":"Có hành lý xách tay miễn phí"},{"id":371605,"message":"Có hành lý ký gửi miễn phí"},{"id":372674,"message":"Hoàn toàn bộ tiền! Quý khách sẽ nhận lại toàn bộ {0}"},{"id":372675,"message":"Chúng tôi sẽ hoàn trả toàn bộ tiền thanh toán của đơn đặt phòng ban đầu. Xin lưu ý,
